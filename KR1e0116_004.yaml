body:
  text: 春秋左傳補註卷四元和惠棟撰廿二年傳焉用聖人風俗通曰聖者聲也言聞聲知情故曰聖家語顔回曰武仲世稱聖人何休膏肓曰說左氏傳者春秋之志非聖人孰能脩之言夫子聖人乃能脩之御叔謂臧武仲爲聖人是非獨孔子𤣥箴之曰武仲者述聖人之道魯人稱之曰聖今使如晉過御叔御叔不説學見武仲而雨行敖之云焉用聖人爲左氏傳載之者非御叔不說學不謂武仲聖與孔子同與執燔焉釋文云燔又作膰案僖廿四年傳及成十三年傳皆作膰說文曰㸋宗廟火孰肉从炙番聲春秋傳曰天子有事㸋焉以饋同姓諸矦此傳燔字當从㸋轉寫誤爲燔耳執事實重圖之高誘曰重深貴而能貧能猶耐也未益祿而有馬數十椉荀卿子曰大功已立士大夫益爵官人益秩庶人益祿未益祿而有馬士庶同于卿三日棄疾請尸周禮掌戮曰凡殺人者肆之三日廿三年傳禮爲鄰國闕服虔曰鄰國尚爲之闕樂况甥舅之國乎顧氏補正用其說而不稱服註右撫劒案古制舞劒于左軍禮從右斐豹廣韻引作奜甫微切戍郫邵棟案郫邵晉二邑文六年傳云趙孟殺公子樂于郫說文曰郫晉邑司馬彪郡國志曰河東垣縣有邵亭張華博物志曰垣縣東九十里有郫邵之阨晏氂徐邈音來棟案外傳作萊古字通徐音是也新樽絜之釋文云本亦作尊又昭十五年傳樽以魯壼釋文云樽本或作尊又作罇棟案曹憲文字指歸云檢字無此从缶从木者說文云字从酋寸酒官法度也今之尊卑從此得名故尊亦爲君父之稱禍福無門唯人所召無門言同一門出入也荀卿子曰禍與福鄰莫知其門管子禁藏篇曰福不擇家禍不索人美疢不如惡石服虔曰砭石也戰國策曰扁鵲怒而投其石高誘曰石砭所以砭彈人癰腫也砭石見山海經娶于鑄注鑄國樂記曰武王未及下車封帝堯之後于祝康成云祝或爲鑄髙誘曰鑄讀作祝古音通故或作鑄或作祝盍以其犯門斬闗周禮司盟曰盟萬民之犯命者故孟椒欲用之當其罪季孫用之疾疢之言騐矣下妾不得與郊弔子惠子曰賤者野受弔謂之郊弔所謂君遇柩於路使人弔者庶人則然士喪君視斂則郊弔非士也注與正義皆失之不穴於寢廟子惠子曰廟日祭月祀朝聘饗燕皆行之於廟故鼠不穴疏以爲廟幽静失之廿四年傳旣殁其言立髙誘呂覽注曰立猶見也恕思以明德周書程典曰愼德必躬恕恕以眀德李登聲類曰恕人心度物也文選輔躒說文引作䟏釋文曰本又作櫟部婁無松栢説文引作附婁云小土山也應邵風俗通曰部者阜之類也今齊魯之間田中少髙卭名之為部矣周伯琦六書正誤从􅎧仅聲俗用培塿非皆居轉而鼔琴傅遜曰轉當為軫棟案文選注引許愼淮南子注曰軫轉也或是古軫字有作轉耳方言曰軫謂之枕郭璞曰車後横木敢問降階何由君禮臣有降階之儀程鄭下人非所宜問故云惑也廿五年經諸侯同盟于重丘應劭地理風俗記曰安德縣北五十里有重邱鄉故縣也傳困于石往不濟也據于蒺藜所恃傷也往不濟謂九四為石所情傷謂九二為蒺藜初至四互未濟故往不濟公拊楹而歌服虔曰公為姜氏不知已在外故歌以命之也一日公自知見欺恐不得出故歌以自悔陪臣干掫史記作爭趣棟案左傳掫字亦有作趣者昭廿年傳云賔將掫杜子春注周禮引此作趣史記本作干趣徐廣云後人改為爭趣非也掫趣二字古皆从取聲故君為社稷死則死之為社稷亾則亾之服虔曰謂以公義為社稷死亾也如是者臣亦隨之死亾案杜義未完若為己死而為己亾非其私暱誰敢任之服虔曰言君自以己之私欲取死亾之禍則私近之臣所當任也南史氏新序云南史氏是其族也執簡以往服虔曰古文篆書一簡八字案齊崔杼弑其君光則一簡之文也四翣高誘呂覽注曰翣棺飾也畫黼黻之狀如扇於僂邊天子八諸侯六大夫四也又淮南子注曰翣狀如今要扇畫文揷置棺車箱以為飾多少之差各從其爵命之數也翣本作歰古文也周禮縫人云衣翣桞之材注云故書翣柳作接櫍鄭司農云接讀為歰櫍讀為柳皆棺飾檀弓曰周人牆置翣春秋傳曰四歰不蹕先鄭引檀弓作翣引左傳作歰明古文春秋傳本作歰杜氏改為翣失之矣當陳隧者高誘曰隧道也司空治軍隧道王肅以為墓道非也昔虞閼父陳球碑作遏髙誘曰閼讀曰遏止之遏然則閼遏同音故或作遏也為周陶正王應麟曰有虞氏上陶舜陶河濵器不苦窳周陶正猶以虞閼父為之以備三恪說文引作愙从心客聲敬也義雲章亦以愙為恪魏封孔羡碑又作愘焦弱侯以為恪卽古客字未詳禮記正義熊氏云周之三恪越少昊髙辛逺存黄帝者取其制作之人故易繫辭云神農氏没黄帝堯舜氏作授手于我手古首字士喪禮云載魚左首進鬐注云古文首為手成二年經曹公子首公羊作手是字通之證天子之地一圻鄭康成引作畿髙誘曰方千里為畿方百里為同周禮大司馬九近之籍先鄭司農云近當言畿葢古圻字或作近禮記相近于坎檀王肅讀近為祈齊侯鎛鐘云用眉壽本古文近字通為祈詩有祈父尚書酒誥作祈父鄭康成詩箋云祈圻畿同書曰愼始而敬終終以不困注逸書案周書常訓解云愼微以始而敬終乃不困正義以蔡仲之命云云證之此晉時偽古文襲左傳而為之者也徐榦中論引書云愼始而敬終以不困廿六年傳頷之而已説文引作顉云低頭也玉篇引杜氏注亦作顉又音欽曲頤也列子云巧夫顉其頤而歌合律注云顉猶搖頭也子産其將知政矣吕覽仲冬紀曰申矦伯如鄭三年而知鄭國之政髙誘曰知猶為也乃立囚子惠子曰立囚為證也赤而毛服䖍曰其身色赤而生毛也平公入夕服䖍曰視夕也而視之尤服䖍曰尤過也意悦之視之過也姬納諸御服䖍曰納之平公之御嬖生佐惡而婉大子痤美而很服䖍曰婉順也佐貌惡心順太子貎美而心很很戾不從教案後傳云元公無信多私不得如服注惡而婉謂內惡而外婉也美而很謂內美而外很也以伊戾之讒慝小人而不爲太子所寵而元公獨嬖寺人桞則二人之賢不肖顯然矣寺人惠牆伊戾服䖍曰寺人宋閹士惠牆皆發聲實爲伊戾以公寺人爲太子內師掌內官過宋服䖍曰楚客道過宋夫不惡女乎服䖍曰夫謂太子伊戾無寵於太子故曰夫不惡女縱有共其外莫共其內服䖍曰言我內師也當共內使加書徵之服䖍曰以書爲之徵騐也書盟書欲速服䖍曰速疾也欲疾代公得位故與楚客謀弑其父也固聞之服䖍曰固久也久聞太子欲爲亂唯佐也能免我佐內惡而外婉太子不知而謂其能免我實不然也左師聞之服䖍曰聞太子與佐期日中乃縊而死服䖍曰經書宋公殺其世子痤平公用伊戾之譖信夫人左師之言世子無罪而死故稱宋公殺罪之也左師見夫人之歩馬者廣韻曰馬習馬孫愐案左傳步馬字不从馬君夫人氏也正義曰夫人氏者氏猶家也棟案正義非也弃本芮司徒女與宋同姓故不云某氏始言君夫人氏後言君之妾弃也公羊傳曰宋三世無大夫三世內娶也君與夫人不善是也唐石經云君與大夫下云君大夫謂椒舉石經是也案林堯叟本仍作夫人知傳譌已久韋昭曰是理也楚之良在其中軍王族而已唐固國語注云族親族同姓也韋昭曰族謂部屬棟案韋説是也成十六年傳云欒范以其族夾公行劉光伯曰族者屬也非謂公族之兵欒范易行以誘之鄭衆曰易行中軍與上下軍易䘚伍也中軍之䘚良故易之賈逵又一説見正義皆勝杜注廿七年傳皆取其邑而歸諸侯諸侯是以睦于晉劉光伯云晉宋古本皆不重言諸侯則唯謂齊魯宋三國睦耳棟案不重言諸侯是也謂唯三國睦非也上文云使諸侯偽效烏餘之封者是時三國皆在故下云皆取其邑而歸為絶句重言諸侯者衍文也唯卿備百邑注此一椉之邑正義曰一椉之邑毎邑方十里棟案熊安生禮記義疏云卿備百邑者鄭志以為邑方二里與百乘别欲弭諸侯之兵弭亦彌周禮小祝彌烖兵杜子春讀弭如彌兵之彌康成云彌讀如敉敉安也仲尼使舉是禮也以為多文辭服䖍曰以其多文辭故特舉而用之後世謂之孔氏聘辭以孔氏有其辭故傳不復載也此與公羊昭二十五年齊侯唁公于野井以遇禮相見孔子曰其禮與其辭足觀矣皆仲尼之所取者也楚氛甚惡王逸楚辭章句曰氛惡氣也晉楚争先子恵子曰楚人衷甲為争先也以誣道蔽諸侯陸氏曰服䖍王肅董遇竝作弊婢世反云踣也正義曰服本作弊云斃踣也一曰罷也棟案蔽與弊通昭十四年傳云叔魚蔽罪邢侯周禮大司宼職云以邦成弊之鄭衆曰敝之㫁其獄訟也是蔽與弊通何以恤我我其收之顧炎武云見周頌棟案頌云假以溢我説文及廣韻引詩云誐以謐我誐與何音相近伏生尚書云維刑之謐哉古文作恤恤慎也故毛傳亦訓溢為慎釋詁文今傳作恤與毛傳義合古謐溢字通荘子齊物曰以言其老洫也釋文云洫本亦作溢古書篆作立心與水相近故恤誤為洫又為溢也鄭氏訓為盈溢失之杜氏訓恤為憂尤誤説文云誐嘉善也毛傳訓假為嘉義亦同齊崔杼生成及彊而寡墨子辭過篇曰内無拘女外無寡夫又云天下之男多寡無妻女多拘無夫顧炎武案小尒疋云凡無夫無妻通謂之寡棠無咎唐石經無作无棟案无字見衛宏古文竒字今易无咎字皆从此釋文云本亦作无崔宗邑也案宰相世系表崔氏之先齊丁公之嫡子季子讓國叔乙食采于崔遂為崔氏故曰宗邑猶晉之曲沃也崔明來奔宰相世系表曰子明奔魯生良十五世孫意如為秦大夫封東萊侯廿八年傳歲在星紀而淫于𤣥枵注星紀在丑斗牛之次𤣥枵在子虚危之次漢律厯志星紀在子𤣥枵在丑正以嵗星右行于天星紀為子而貞于丑故丑其次𤣥枵貞于丑則在子如是則十二辰皆合合樂用焉漢法陽左行隂右行右行者毎退一辰以次為貞故星紀貞于丑時俗以星紀為丑𤣥枵為子失之合辰合樂本坤彖喪朋之説子雅子尾注二子皆恵公孫棟案髙誘吕覽注云子雅恵公之孫公子欒堅之子竈也子尾恵公之孫公子高祈之子蠆也杜氏髙氏皆據世本唐時世本已非全書故正義不詳所出韓非子日子夏子尾者景公之二弟也夏與雅古字通得慶氏之木百車于荘注六軌之道下云反陳于嶽注云嶽里名案荘亦里名昭十年傳云又敗諸荘哀六年戰于荘孟子曰荘嶽之閒趙岐曰荘嶽齊街里名欒髙陳鮑之徒注欒子雅髙子尾案欒堅髙祈以字為氏故日欒髙慶封汜祭鄭康成讀汜與窆同補鄧反吴句餘注句餘吴子夷末也司馬貞曰計餘祭襄十九年卒則二十八年賜慶封邑不得是夷末棟案服䖍以句餘為餘祭是也朱方顧夷吴地記曰朱方秦改曰丹徒在外不得宰吾一邑得罪出亡在外則不得宰一邑故下云恐失富也正義以宰為益失之夫民生厚而用利于是乎正徳以幅之使無黜嫚子恵子曰此夏書九歌中三事之義疏也武王有亂臣十人唐石經無臣字石經論語亦然又昭二十四年傳引大誓亦無臣字後人皆據晉時所出古文大誓以益之非也辨見論語考榮成伯王符曰榮氏魯公族韋昭曰成伯魯大夫聲伯之子名灓以徵過也子恵子日徵讀從楚辭不清徵其然否之徵廿九年傳璽書追而予之髙誘曰璽讀如移徙之徙印也韋昭曰古者大夫之印亦稱璽璽書璽封書也應劭漢官儀曰封太山以金泥銀澠印之以璽璽施也信也古者尊卑共之月令曰固封璽春秋傳璽書追而與之是也秦漢以來尊者以為名乃使避衛宏漢舊儀曰秦已前民皆以金銀銅犀象為方寸璽各服所好漢以來天子獨稱璽又以玉羣臣莫敢用也棟案璽惟周禮月令及此傳有明文餘無聞焉唐六典引周書曰湯放桀大㑹諸矦取天子之璽置天子之座云云據此則商以前已有璽名矣祗見疏也棟謂疏當為字之誤也吕覽先識篇云無由接而言見髙誘曰讀為誣妄之誣下云欺其君何必使余明疏為誣欲之而言叛非誣乎杜氏好改古文故古文古義存者少矣固辭鄭康成曰固之言如故也言如故辭者重辭也投壺注唐石經云辭固疑非不尚取之服䖍曰不尚尚也尚當取女叔矦殺之武獻以下兼國多矣吕覽曰獻公即位五年兼國十九毋寧夫人而焉用老臣服䖍曰毋寧寧也寧自取夫人将焉用老臣乎劉炫是服説請觀于周樂服䖍曰周樂魯所受四代之樂猶未也賈逵曰言未有雅頌之成功也服同吾聞衛康叔武公之徳如是賈逵曰康叔遭管叔蔡叔之難武公罹幽王褒姒之憂故曰康叔武公之徳如是為之歌王服䖍曰王室當在雅衰微而列在風故國人猶尊之故稱王猶春秋之王人子惠子曰王者采風畿内故有王風周官六詩比賦興風雅頌安得謂王者無風後儒以詩亡為雅亡失之甚矣其細已甚民弗堪也服䖍曰其風細弱已甚攝乎大國之閒亡逺慮持乆之風故曰民不堪将先亡也泱泱乎大風也哉服䖍曰泱泱鈎緩深逺有大和之意其詩風刺辭約而義微體疏而不切故曰大風國未可量也服䖍曰國之興衰世數長短未可量也此之謂夏聲服䖍曰與諸夏同風故曰夏聲棟按後世言秦夏本此大而婉險而易行賈逵曰其志大直而有曲體歸中和之徳難成而易行按史記險作儉古文也漢劉脩碑云動乎儉中今易作險則明主也史記作盟主按古盟字从囧賈侍中説讀與明同嘯堂集古錄載齊矦鏄鐘曰繼命于外内之事中敦􅰀㓝􅰀㓝即明刑也毛詩黄鳥曰此邦之人不可與明箋云明當為盟釋名盟明也吿其事于神明也怨而不言王肅曰非不能言畏罪咎也其周徳之衰乎服䖍曰此歎變小雅也自鹿鳴至菁菁者莪道文武脩小政定大亂致太平樂且有儀是為正小雅陳文王之徳武王之功自文王以下至鳬鷖是為正大雅遷而不淫服䖍曰遷徙也文王徙酆武王居鄗若有他樂吾不敢請已服䖍曰周用六代之樂堯曰咸池黄帝曰雲門魯受四代下周二等故不舞其二季札知之故曰有他樂吾不敢請子速納邑與政服䖍曰入邑與政職于公不與國家之事子惠子曰古者有政便有邑邑者田邑也古禄以田慎之以禮服虔曰禮所以經國利社稷也辨而不徳必加於戮服虔曰辨若鬭辨也夫以辨爭不以徳居之必加於刑戮也吾子好直服虔曰直不能曲橈以從衆禆諶古今人表作卑湛師古曰卑音脾湛音諶風俗通曰卑氏鄭大夫卑湛之後漢有卑躬為北地太守杜改卑為禆俗又改湛為諶古文盡亡矣釋文猶作湛卅年傳正月甲子朔四百有四十五甲子矣其季於今三之一也熊朋來曰魯襄公三十年歳次戊午二月辛酉朔初四日甲子二十三日癸未日其季於今三之一者言甲子數至癸未日正得二十日是三分六十甲子之一也季者餘數也積四百四十四甲子零二十日算得二萬六千六百六十日除五十三日在本年正二月戊午正月大該三十日二月二十三日止有二萬六千六百零七日逆推得絳縣老人是魯文公十一年乙丑歳三月生故曰臣生之歳正月甲子朔注謂夏正月若以周正則三月也本合云七十四年此時方是二月若夏正則十二月故除本年不算曰七十三年也亥有二首六身子惠子曰史趙以亥字推算其年者葢以亥乃絳縣人之名即孟子之亥唐韓非子言晉平公於唐亥云云或孟子傳寫倒其名氏也或叫于宋大廟曰譆譆出出叫説文引作訆云大呼也唐石經作傳遜曰説文云譆痛也案説文引傳云誒誒出出云誒然从言矣聲説文訓譆為痛與此傳無渉傅氏非也鄭氏周禮注引作譆譆出出公焉在士喪禮曰升公卿大夫繼主人東上鄭注云公大國之孤四命也賈疏典命云公之孤四命鄭為伯爵不命言孤但良宵鄭之公族大夫貴重之極比于大國之孤故家臣尊其主亦號為公耳印段説文作碫字子石介于襄庫案介甲也取襄庫之甲以入代襄廿六年齊烏餘襲髙魚介其庫注云入髙魚之庫而介其甲是也襄廿七年傳云介慶氏之甲上下有服高誘曰服法服也君子小人各有制斗城案水經注斗城在陳留沙水所經也吾其與之髙誘曰與猶助也卅一年傳古之道也何休膏肓曰若其以卜隠桓以禍皆由此作乃曰古制固亦謬矣鄭箴之曰立長以嫡不以賢固立長矣立子以貴不以長固以貴矣若長均貴均何以别之故須卜禮有詢立君卜立君是有卜也是謂不度顔籀曰不度不遵禮度也棟案孝經援神契云天子之孝曰就諸侯曰度抂戚而有嘉容故謂之不度猶有童心服虔曰言其無成人之志案士冠禮曰弃爾㓜志順爾成徳㓜志猶童心也諸侯十二而冠昭公十九年矣猶有童心故不終荀子曰天子諸侯十九而冠弃爾㓜志今有童心故不終也髙其閈閎注閎門也匡謬正俗曰下文云門不容車杜元凱云門庭之内廹迮又有牆垣之限尒疋云所以止扉謂之閎郭景純云門辟旁長橛也左傳曰髙其閈閎案若館門實髙而直庭内廹迮者即當云庭不容車不應云門也又髙為門戸非闗止盜之方文伯所稱不應云以無憂客使若門得車入則子産止須引車入門何勞壞垣云不可踰越葢是門既不大而止扉又髙以牢固扞禦寇賊子産為其不容車入故壞垣耳㝷文究理郭説得之繕完葺牆李涪刋誤曰案文當云繕宇葺牆書云峻宇彫牆足以為比圬人以時塓館宫室劉逵引此傳塓作冪云墁也館宫室諸侯傳也夭厲不戒正誤曰夭厲注疏及臨川本作天地之天興國本及建本作夭閼之夭據注當作天然經中有言厲疾夭札則夭厲亦不為非姑示達者子太叔美秀而文案説苑政理篇亦載此事葢本左傳乃云子太叔善決而文善決訛為美秀公孫揮能知四國之為而辨於其大夫之族姓班位説苑政理篇作族姓變立愚案變立即古文班位字也古讀變為辨辨為班古文位作立劉歆傳曰春秋傳多古字古言乃知向所據者皆古字也故委政焉倉頡篇曰委任之也文選令尹似君矣正義曰服虔云言令尹動作以君儀故云以君矣服言以君儀者明年傳云二執戈者前矣是用君儀也俗本作似君若云似君不須言矣今定本亦作似君恐非棟案古以字作㠯與似通故誤作似此條正義見宋槧本故備録之衛詩曰十九年傳歌弼鄘衛季札曰是其衛風乎知弼鄘衛皆為衛詩詩序亦云紂囚文王七年諸侯皆從之囚汲郡古文曰帝辛廿三年囚西伯于羑里廿九年釋西伯諸侯逆西伯歸于周周書程典商王用宗讒震怒無彊諸侯闕娱逆諸文王昭元年傳伍舉為介孫叔敖碑作五舉案唐石經初刻亦作五後改从人非也伍尚伍員字同古今人表伍子胥亦不从人梁其踁孫愐曰梁其踁魯伯禽子梁其之後牆之隙壞韓非子曰牆之壞也必通隙周有徐奄案周書周公相天子殷東徐奄从三叔為亂又汲郡古文云成王二年奄人徐人及淮夷入于邶以叛賈景伯杜元凱皆云徐即淮夷失之趙孟欲一獻鄭𤣥曰一獻士飲酒之禮具五獻之籩豆於幕下注朝聘之制大國之卿五獻禮記正義曰卿大夫俱三獻故昭六年傳云得貺不過三獻五獻者亂世之法非禮之正也大國省穯而用之周書程典曰生穯省用不濫其度弁冕端委注弁冕冠也案釋文云弁端委無冕字石經及正義皆云弁冕端委説文云㝸古弁字冕也故杜訓為冕冠弁冕之冕衍文也子盍亦逺績禹功而大庇民乎周譜云定王五年河徙故道及穀雒鬬後河勢愈甚劉子以治河事委趙孟故有是言齊人城郟晉未聞焉鄭大叔曰晉國不恤宗周之闕是也諺所謂老將知而耄及之者大雅抑詩曰借曰未知亦聿既耄葢當時之語云亦然徐吾犯廣韻曰鄭公子有食采於徐吾之鄉後以為氏據此則子南子晳爭同姓以為室也及衝擊之以戈説文引云及衝以戈擊之將行子南鄭康成詩箋云行亦放也下文子將行之同周公殺管叔而蔡蔡叔注蔡放也釋文云上蔡字音素葛反説文作􅔁从殺下米玉篇云􅔁䊝􅔁散也書作蔡字正義同漢書宣帝元康三年詔曰骨肉之親粲而不殊稽康琴賦云新衣翠粲李善云子虚賦翕呷翠粲張揖曰翠粲衣聲也案子虚賦又作萃蔡愚謂漢書文選粲字皆􅔁字之誤􅔁本與蔡通故又作蔡禹貢曰二百里蔡鄭康成注云蔡之言殺鄭注尚書大傳云蔡衰也衰猶殺也減殺其賦減殺者猶末減也叔非首謀慮从未減之科故不殺而囚之如此則不必改字而義亦得矣上文云余不女忍殺宥女以逺亦謂从末減小尒疋曰蔡法也造舟于河徐堅曰在蒲反夏陽津今蒲津浮橋是其處鮮不五稔王充曰王者有過異見於國不改災見草木不改災見於五糓不改災至身若年榖和孰不至及身而亡故云鮮不五稔兩於前伍於後専為右角參為左角偏為前拒服䖍引司馬法曰五十椉為兩百二十椉為伍八十一椉為専二十九椉為參二十五椉為偏阮逸謂荀呉用車法雖舍車而法在其中服氏之説未可非也實沈臺駘為祟説文曰祟神禍也曠林賈逵曰曠大也遷閼伯於商丘賈逵曰商邱在漳南主辰服䖍曰主祀也及成王滅唐而封太叔焉史記封作國鄭世家棟案尚書序云武王既勝殷邦諸侯又康誥序云以殷餘民邦康叔孔氏云國康叔為衛侯此傳依史記當云邦太叔古字邦封同見書正義漢諱邦改為國故云國太叔也論語邦域之中今作封域是字同之騐下文封諸汾川同宣汾洮正義曰洮水闕子惠子曰洮即涑川酈氏以為涑水一名洮水水出河東聞喜縣黍葭谷俗謂之華谷至周陽與洮水合司馬彪曰洮水出聞喜縣故王莽以縣為洮亭山川之神則水旱癘疫之災於是乎榮之日月星辰之神則雪霜風雨之不時於是乎榮之鄭康成注周禮引此傳云日月星辰之神則雪霜風雨之不時於是乎禜之山川之神則水旱癘疫之災於是乎禜之賈公彦曰鄭君所讀春秋先日月與賈服不同説文曰榮者設緜蕝為營以禳風雨雪霜水旱癘疫於日月星辰山川也是許君所讀春秋亦與鄭同史記所載同於服賈中聲以降荀卿子曰詩者中聲之所止也楊倞曰詩謂樂章所以節聲音至乎中而止不使流淫也風淫末疾賈逵以末疾為首疾謂風眩也逸周書曰元首曰末易卦初為本上為末故上為首為角杜據素問以四支為四末故謂未疾為四支然不及賈注之當榖之飛亦為蠱釋器云康謂之蠱郭璞曰米皮簸之揚之康秕在前故云榖之飛外傳云蠱之慝榖之飛實生之將㑹孟子餘史記趙世家云趙夙生共共生孟孟生衰古今人表云趙孟夙子生衰世本云公明生共孟及夙案文當云共孟及衰史記分共孟為兩人傳寫之誤孟子餘謂共孟及衰甲辰朔烝于温服䖍曰甲辰朔夏十一月朔也祭人君用孟月人臣用仲月二年經叔弓注叔老子世本曰叔肸生聲伯嬰齊齊生叔老老生叔弓傳見易象與魯春秋曰周禮盡抂魯矣吾乃今知周公之徳與周之所以王也古謂易為象故曰易象九家説卦云乾為衣坤為裳繫曰黄帝堯舜垂衣裳而天下治葢取諸乾坤尚書皋陶謨帝曰予欲觀古人之象古人之象即易也法乾坤而制衣裳觀象方知故欲觀古人之象古人當謂黄帝伏羲畫八卦神農重之黄帝通之杜子春以歸藏為黄帝易有以也在天成象伏羲法之作八卦故謂之象商謂之坤乾周謂之易左氏稱易象猶不失古意觀書于太史氏上自易象下至魯春秋中與周禮而周禮一書于宣子口中叙出此左氏行文之妙也周禮為周公致治之書觀周禮故知周公之徳易為聖人贊化育之書故觀易象而知周之所以王謂文王也讀者不考周禮一語遂謂易象爻辭乃周公所作以實周公之徳一語失之逺矣季氏有嘉樹焉宣子譽之注譽其好也服䖍曰譽游也宣子游其下夏諺曰一游一譽為諸侯度今孟子作豫趙岐章句曰豫亦遊也春秋傳曰季氏有嘉樹宣子豫焉周易序卦曰豫必有隨鄭康成注引孟子吾君不豫以為證則知此傳譽字本作豫故服趙互引為證孫子兵法曰人效死而上能用之雖優游暇譽令猶行也外傳作暇豫李善曰譽與豫古字通三年經北燕伯欵出奔齊此與衛侯衎出奔齊一例杜注謬傳張趯宰相世系表曰周宣王時有卿士張仲其後裔事晉為大夫張侯生老老生趯趯生骼豆區釜鍾顧氏補正云毛晃曰豆當為斗後人誤作俎豆之豆用之考工記一獻而三酬則一豆矣豆古斗字棟案考工梓人云爵一升觚三升獻以爵而酬以觚一獻而酬則一豆矣一獻三酬則十升不得為四升之豆故鄭注云豆當為斗陶人云庾實二觳先鄭云觳讀為斛觳受三斗聘禮記有斛案聘禮記云十斗曰斛案得云觳受三斗故鄭據旊人云豆實三而成觳則觳受斗二升明觳不得為斛豆不得為斗矣三老凍餒注三老謂上夀中夀下夀皆八十已上不見養遇服䖍云三老者工老商老農老棟案杜説是也晉姜鼎銘云保其子孫三夀是利魯頌曰三夀作朋三代養老之法于國老中取三人焉謂之三老于庶老中取五人焉謂之五更道殣相望荀悦曰道瘞謂之殣亦作墐韋昭依毛傳曰道冢為墐女富溢尤周書酆保十敗所謂女貨速禍也君日不悛以樂慆憂注慆藏也棟案慆過也言君不思悛改可憂而樂與日俱慆訓慆為過見毛詩傳劉光伯云慆慢也好音樂而慢易憂禍義亦通讒鼎之銘韓非子説林曰齊伐魯索讒鼎魯以其鴈徃齊人曰鴈也魯人曰真也是古鼎之名已見困學紀聞葢當時鼎已在齊故晏子述之公事有公利無私己韓非子曰私怨不入公門一説忌忌日故云私忌小人糞除先人之敝廬聘禮卿館于大夫游吉卿也張趯大夫也吉送少姜𦵏館焉故今云糞除先人敝廬舍廟中故云先人春秋左傳補註卷四
