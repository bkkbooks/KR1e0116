body:
  text: 春秋左傳補註卷三元和惠棟撰成元年傳瑕嘉周禮典瑞注引作叚嘉葢古文止作叚讀為遐也今文亦作瑕唯陸氏周禮釋文猶存古字二年傳隕子辱矣説文引云抎子辱矣抎有所失也戰國䇿齊宣王曰寡人愚陋守齊國唯恐夫抎之墨子天志曰國家滅亡抎失社稷廣雅亦云抎失也案呂覽季夏紀云昭王抎于漢中高誘曰抎隊音曰顛隕之隕史記東越列傳曰不戰而抎此抎字之誤漢書作殞知抎與隕通抎古字也隕今字也徐廣曰耘義當取耘除失之朝夕釋憾唐石經憾作感案古本左傳憾字皆作感从省文師之耳目在吾旗鼓進退從之孫子引軍政曰言不相聞故為之金鼓視不相見故為之旌旗夫金鼓旌旗所以一人之耳目也人既專一則勇者不得獨進怯者不得獨退此用衆之法也荀卿子云將死鼓御死轡將及華泉京相璠曰華泉華不注山下泉水也韓厥執縶馬前縶説文引作馽從馬口其足讀若輒或從系執聲穀梁傳云踂者何也曰兩足不能過齊謂之綦楚謂之踂衞謂之縶辟女子注使避君棟謂下云乃奔則辟當讀為䟆與五年伯宗辟重同周禮大司冦云使其屬䟆康成曰故書䟆作避杜子春云避當為辟𤣥謂䟆止行也古䟆字有作辟注訓為避非也蕭同叔子于寶曰蕭同叔子惠公之妾頃公之母史記作桐物土之宜而布其利注播殖之物各從土宜棟謂物讀如既夕禮冢人物土之物鄭氏云物猶相也大司徒職云以土宜之法辨十有二土之名物周書大聚曰因其土宜以為民資司馬司空輿帥候正亞旅司馬司空軍司馬軍司空也輿衆也輿帥領其衆在軍之後者候正軍候主候望者高誘説如此殺御叔韋昭曰御叔陳公子夏之子靈公之從祖父媯姓也王曰止高誘曰止禁止也誰居註居辭也釋文云居音基案檀弓云何居我未之前聞也注云居讀為姬姓之姬齊魯之閒語助也列子黄帝篇云闗尹謂列子曰姬魚語女張湛云姬音居魚當作吾是居姬互訓葢古音同也侵敗王略注法度案略封也昭七年傳曰天子經略天子謂之略諸侯謂之封三年傳伐廧咎如討赤狄之餘焉案僖廿三年傳狄人伐廧咎如賈逵曰赤狄之别種隗姓杜注亦同赤狄種類已盡惟廧咎猶在故復討其餘劉炫以為廧咎之國即是赤狄之餘杜以為餘民散入其國豈其然乎成十三年注云季隗廧咎如赤狄之女也是杜自相矛盾荀騅案世本騅諡文子齊侯朝于晉將授玉史記晉世家云齊頃公如晉欲上尊晉景公為王景公讓不敢王劭案張衡曰禮諸侯朝天子執玉既授而反之若諸侯自相朝則不授玉齊頃公戰敗朝晉而授玉是欲尊晉侯為王太史探其㫖而言子惠子曰授玉古文左傳作授王司馬子長謂齊欲尊晉為王葢晉作六軍擬於王矣故齊欲尊之猶戰國東帝西帝之例也古文不可見存之以備異説棟案古玉字皆作王左氏傳多古字古言故玉从王定五年傳云改步改玉晉語作改玉改行荀卿王霸篇又云改玉改行是古玉作王之證西漢劉子駿治左氏始改王為玉周禮九嬪職云凡祭祀贊玉齍註云故書玉為王杜子春讀為玉是古文皆以王為玉之證上文云晉作六軍擬于王矣故史記以授玉為尊晉為王諸侯相朝授玉此僭禮也下年傳云鄭伯如晉授玉于東楹之東是有授玉之事平子之説未允六年傳沃饒而近盬服䖍曰土平有溉曰沃有汾澮以流其惡周書曰地有五行不通曰惡七年傳讒慝貪惏子惠子曰方言曰貪殺也楚謂之貪惏殘也又云殺人而取其財曰惏二子殺巫臣之族而分其室故曰貪惏八年經晉侯使韓穿來言汶陽之田聘禮云若有言則以束帛如享禮注引此傳為證又云無庭實也宋公使公孫夀來納幣服䖍曰不稱主人母命不通故稱使婦人無外事傳祁奚高誘呂覽注云祈奚高梁伯之子祈黄羊也又云黄羊祈奚字九年傳執諸銅鞮劉昭案上黨記曰銅鞮晉别宫墟闗猶存有北城去晉宫二十里羊舌所邑操南音劉逵曰商角徴羽各有引鍾儀楚人思在楚故操南音南音始于塗山之女見吕氏春秋雖有絲麻無棄菅蒯蒯玉篇引作菽云與蒯同李登聲類曰蒯草中為索苦怪切雖有姬姜無棄蕉萃淮南説林曰有榮華者必有憔悴有羅紈者必有麻蒯蕉萃猶憔悴也十年傳大子州蒲應劭舊君諱議引作州滿陸氏云本或作滿劉子𤣥曰州滿今春秋左氏本皆作州蒲誤也當為州滿事見王邵續書志棟謂王氏當據仲逺説晉侯夢大厲李頤莊子解云死而無後曰厲忠為令徳非其人猶不可况不令乎陸粲曰非其人謂叔申本非賢者雖欲效忠不見信於君適以自害耳棟案陸氏此言是教人慎勿為善非君子之言也吕覽曰賢主之所悦不肖之所誅髙誘引此傳以為證杜氏之説未可非也近代李厚菴亦以于忠肅事况之十二年傳道路無壅唐石經作雍棟案古壅字皆作雍説文作雝無从土者十三年傳民受天地之中以生所謂命也以五行言則五六為天地之中以爻位言則二五為天地之中以四時言則春秋為天地之中天地之中命也民受之以生即所謂性也性為中情為和中庸之中和卽天地之中也故曰天命之謂性易曰各正性命保合太和在易又謂之利貞故曰利貞者情性也戮力同心唐石經及宋本皆作勠說文曰勠并力也从力翏聲戰國䇿曰勠力同憂髙誘曰勠力勉力也其字从力詛楚文又作繆力葢古字假借蔑死我君唐石經初刻云蔑我先君後改从今本陸氏曰本或以我字在死上案僖卅三年傳欒枝曰其為死君乎尋文義當云蔑我死君鄭康成易注云蔑輕慢也十四年傳宗卿之嗣注同姓之卿國之宗臣故曰宗卿書曰記宗功是也宗臣兼同異姓故漢之蕭曹亦為宗臣衛侯饗苦城叔王符曰郤犨食采于苦號苦成叔又曰苦城城名也在河東鹽池東北十五年經宋華元自晉歸于宋傳止華元于河上則華元未至晉時在晉境耳而云自晉者魚石以華元有平晉楚之功懼以晉討為復之故書法亦曰自晉著其所自復耳蔣杲云傳盜憎主人民惡其上子惠子曰盜憎主人民怨其上周廟金人銘也其詞曰古之慎言人也無多言多言多敗故云子好直言必及于難十六年傳瀆齊盟崔憬易注云瀆古黷字傳皆以瀆為黷范文子曰我若羣臣輯睦以事君多矣唐石經云我若退羣臣輯睦以事君多矣又何求案碑退字又何求三字皆旁増當是晁公武據蜀石經益之陳於軍中而疏行首司馬法曰凡陳行惟疏淮南子曰疏隊而擊之髙誘曰疏分也其卦遇復曰南國䠞射其元王中厥目子惠子曰此與僖十五年傳千乗三去三去之餘獲其雄狐皆夏商之易也或據周易以解之皆不得其義葢夏商占七八周易占九六其辭義各有異同不可强解也蹲甲而射之徹七札焉蹲古文作踆蹲猶立也羣經音辨云蹲才丸切鄭康成讀七札一甲之度也揚雄太𤣥曰比札為甲賈公產周禮疏云一葉為一札吕覽愛士篇云韓原之戰晉惠公之右路石奮投而擊繆公之甲中之者已六札矣言六札者惟一札未陷耳知甲以七札為數也徹七札者猶貫甲也楚子使工尹襄問之以弓穀梁傳云聘弓鍭矢麋信曰古者以弓矢相聘問故左傳云楚子問郤至以弓有韎韋之跗注詩瞻彼洛矣云韎韐有奭毛傳云韎韐茅蒐染草也鄭箋云茅蒐韎韐聲也又駁五經異義云韎草名齊魯之間言韎韐聲如茅蒐字當為韎陳留人謂之蒨韋昭國語注云昭謂茅草今絳草也急疾呼茅蒐成韎也鄭康成雜問志曰韎韋之不注不讀如跗跗幅也注屬也幅有屬也以淺赤韋為弁又裁韋如布帛之幅而連屬以為衣而素裳白舄也棟案不與跗古字通見詩箋以跗注為不注者鄭所受春秋異讀也識見不穀而趨棟案識當為適外傳作屬訓為適髙誘曰不穀不禄也人君謙以自稱也三肅使者而退子惠子曰為十七年欒書譛郤至張本好以暇唐石經初刻無以字展車馬注展陳也康成曰展整也子叔聲伯使叔孫豹請逆于晉師服虔以為叔孫豹先在齊矣此時從國佐在師聲伯令人就齊師使豹豹不忘宗國聞白國佐為魯請逆家君曰玩下召豹於齊及昭四年傳則服説為長公還待于鄆京相璠曰公羊作運字今東郡廩邱縣東八十里有故運城即此城也僑如曰不可以再罪奔衛唐石經曰遂奔衛今本皆脱遂字十七年傳匡句須吉應劭風俗通曰匡魯邑句須為之宰其後氏焉聲伯夢渉洹酈元曰許慎説文吕忱字林竝云洹水出晉魯之間御覽隋圖經曰洹水出隆慮縣西北俗謂安陽河即聲伯夢渉之所源出林慮山東平地盈其懐王逸楚辭章句曰在袖曰懐余恐死故不敢占也服虔曰聲伯惡瓊瑰贈死之物故畏而不言也皆尸諸朝康成論語注曰大夫於朝士於市昭十四年尸雍子與叔魚於市正義曰晉殺三郤皆尸於朝此尸於市者以其賤故也棟案論語尸諸市朝孟子若撻之於市朝索隱謂市之行列有如朝位故曰市朝王制謂刑人於市則此尸諸朝疑即市朝或云朝或云市隨文言之非有二所一朝而尸三卿韓非子載厲公語曰吾一朝而夷三卿予不忍盡也周禮凌人曰大喪其夷槃氷鄭氏云夷之言尸也尸之槃曰夷槃牀曰夷牀衾曰夷衾移尸曰夷于堂皆依尸而為說是夷與尸古字通又古夷字作􅊂與尸相近故或从尸或从􅊂也十八年傳周子有兄而無慧案大戴禮曰慧種生聖癡種生狂故昌邑王清狂不惠惠與慧古字通羊舌職子惠子曰說苑作芈殖殖為舌職合聲籍偃韋昭曰籍偃晉大夫籍季之子籍游也世本曰襄生司功大伯伯生候季子子生籍游游生談爵不踰徳荀卿子曰爵賞不踰徳是以為善者勸以塞夷庚注夷庚吳晉徃來之要道案繁欽辨惑曰吳人者以船樴為輿馬以巨海為夷庚臧榮緒晉書曰司徒王謐議曰夷庚未入乘輿旋館陸機辨亡論曰旋皇輿於夷庚然則夷庚者通謂車馬往來之大道以其在彭城故屬之吳晉也小尒疋曰庚通也襄元年經楚公子壬夫匡謬正俗曰楚公子王夫字子辛今之學者以其字子辛遂改王夫為壬夫按楚有公子午字子庚庚是十幹午是十二支法有相配辛壬同是十幹與庚午不類當依本字讀為王夫傳寘諸瓠丘注河東垣縣有壺丘亭案壺與瓠通見毛公傳二年傳正輿子子惠子曰荀子曰萊不用子馬而齊并楊倞曰或曰正輿子字子馬三年傳組甲三百被練三千注組甲漆甲成組文被練練袍馬融曰組甲以組為甲裏公族所服被練以練爲甲裏卑者所服賈逵曰組甲以組綴甲服虔同車士服之被練帛也以帛綴甲步卒服之凡甲所以為固者以盈竅而任力者半卑者所服組盈竅而盡任力尊者所服棟謹案禮說稱賈氏義為長少儀曰國家縻敝則甲不組縢逸周書曰年不登甲不纓縢孔晁曰縷繩甲不以組引見初學記葢組甲之工靡于被練故凶歲不組縢所以節財也考工圅人云凡察革之道眂其鑽空欲其惌也空惌則堅竅滿則固帛粗故任力者半組細故盡任力呂覽有始篇曰邾之故法爲甲裳以帛高誘曰以帛綴甲卽被練昰也公息忌謂邾君曰不若以組甲凡甲之所以爲固以滿竅也今竅滿矣而任力者半耳且組則不然竅滿則盡任力矣邾君以爲然高誘曰組甲以組連甲賈氏之說葢本於此乃盟於耏外京相璠曰今臨淄惟有澅水西北入泲即地理志曰如水矣耏如聲相似然則澅水即耏也其將來辭韋昭曰辭陳其辭狀也軍法有死無犯為敬韋昭曰有死其事無犯其令昰為敬命案晉語韓獻子為司馬趙孟使人以其乘車干行獻子執而戮之宣子召而禮之曰夫軍事無犯犯而不隱義也韋說頗勝於杜反役與之禮食韋昭曰反役自役反禮食公食大夫之禮士富為候奄晉語曰使范獻子為候奄韋昭曰獻子范文子之族昆弟士富也是范氏有兩獻子矣四年傳文王帥殷之叛國以事紂周書程典曰維三月旣生魄文王合六州之侯奉勤於商孔晁曰三分天下有其二以服事殷也季孫曰略注不以道取曰略匠慶請用蒲圃之木故季孫曰略正義言令匠慶略他木失之有窮后羿玉篇引作説文曰夏后時諸侯夷羿國也从邑窮省聲生澆及豷澆說文引作敖論語作奡尚書云無若丹朱傲劉向引作敖管子云若敖之在堯説文引書作傲云讀若傲論語奡蕩舟以上説文是敖與奡通今傳作澆者敖澆音相近師讀各異故也敗於狐駘禮記作臺駘淮南子墬形曰沂出臺駘術篆文臺壺字相似壺又與狐通故傳作狐駘杜氏以為卽番縣之目台山案目台即淮南子目駘山淄水所出杜說非也目台山今杜解本作目台亭非是劉昭補註亦引作目台山靡奔有鬲氏汲郡古文曰帝相廿八年寒浞使其子澆弑帝伯靡出奔鬲杜氏以爲夏遺臣事羿者案羿死于帝相八年言夏遺臣是也言事羿者非也六年傳甲寅堙之注堙土山也孫子謀攻篇曰攻城之法脩櫓轒輼三月而後成距堙杜牧云距堙者踊土稍高而前以附其城也環城傅於堞淮南子兵略曰設渠壍傅堞而守髙誘曰傅守也七年傳公登亦登注禮登階臣後君一等聘禮曰至於階三讓公升二等注云先賓升二等君行一臣行二韓非子載穆叔語曰今子不後寡君一等是其證也八年傳子國曰國有大命荀卿子引詩云國有大命不可以告人妨其躬身故下云童子言焉將為戮矣一介行李唐石經及釋文宋本皆作个徐鉉曰个字不合六書之體當作介九年傳陳畚局唐石經作梮正義曰其字從手此臆説也漢書引此傳云陳畚輂輂音菊與梮同音史記河渠書云山行則梮韋昭曰梮木器如今轝牀人舉以行也然則輂與梮音義皆同故孔氏書正義以為梮輂本一字古篆變易形字體改易說者不同未知孰是以出内火漢書引云以出入火案周毛伯鄭敦云毛伯内門立中庭内讀為入立讀為位古文春秋經公即位為公卽立出入火為出内火皆古文也尚書云九江内錫大龜史記内作入是古入字皆作内徐邈音内為納非也相土因之故商主大火汲郡古文曰帝相十五年商侯相士作乗馬遂遷於商邱鄭康成注周禮校人引世本亦云相士作乘馬古文士土相亂如盄和鐘以土為士牧敦以士為土之類詳見上土又與杜通故荀子云杜作乘馬左傳从古文故以土為杜遇艮之八服䖍曰爻在初六九三六四六五上九惟六二不變連山歸藏之占以不變者為占棟案易乾鑿度曰陽動而進隂動而退故陽以七隂以八為彖易一隂一陽合而為十五之謂道陽變七之九隂變八之六亦合於十五則彖變之數若之一也鄭康成注云彖爻之不變動者九六爻之變動者繫辭曰爻效天下之動也然則連山歸藏占彖本質性也周易占變者效其流動也彖者斷也如鄭此言連山歸藏占彖故下文雖引周易仍用二易以彖為占顧氏補正其說支離不可从也晉語曰公子筮之得貞屯悔豫皆八也筮史占之皆曰不吉閉而不通爻無為也葢以不變為占故云爻無為也司空季子曰是抂周易皆利建侯又董因曰臣筮之得秦之入曰是謂天地配亨小往大來是雖用周易而仍占彖夏殷之法也隨其出也虞翻注易隨卦曰隨隂隨陽謂隨卦三隂皆隨陽故卦名隨隂隨陽猶母隨子故随其出也門于剸門張揖廣雅曰門守也斬行栗毛詩國風東門之栗毛傳云栗行上栗也次於隂口而還服虔曰參南曰隂口者水口也國君十五而生子冠而生子賈服說皆以為人君禮十二而冠案髙誘淮南子注曰三十而娶者隂陽未分時俱生於子男從子數左行三十年立於己女从子右行二十年亦立於己合夫婦故聖人因是制禮使男三十而娶女二十而嫁其男自已數左行得寅故人十月而生於寅男子數从寅起女自已數左行得申亦十月而生於申故女數從申起歳星十二歳而周天天道十二而僃故國君十二歳而冠冠而娶十五生子重國嗣也故不从制説文曰元氣起于子子人所生也男左行三十女右行二十俱立於己為夫婦裹妊於己已為子十月而生男起已至寅女起已至申故男年始寅女年始申也案高注與説文同故宋人亦以淮南為許愼注也冠乎成公之廟服虔曰成公衛曾祖故以祧為曾祖廟時不冠于衛之始祖以非己廟故也祈以幣更吕覽二月紀是月也祀不用犧牲用圭璧更皮幣高誘曰更代也以圭璧代犧牲也管子四時篇曰除神位謹禱幣通幣梗周禮女祝掌以時梗襘禳之事注云鄭大夫讀梗為亢謂招善而亢惡去之杜子春讀梗為更𤣥謂梗禦未至也案此則更讀為梗杜元凱謂以幣更牲未之考也詳見禮説十年經會呉于柤注柤楚地京相璠曰柤宋地今彭城偪陽縣西北有柤水溝去偪陽八十里司馬彪郡國志曰彭城偪陽有柤水偪陽釋文云偪徐仙音甫目反棟案徐音是也古今人表作福陽知古皆作福音也傳士莊伯服本云云其將不免乎服䖍曰免脫也言将不脫罪禍不以壽終也傳舉此者為十九年齊殺其大夫髙厚二十五年崔杼弑其君光起本也郰人紇唐石經及宋本皆作郰酈元引作鄹論語同案聚字古或省文作取說文曰郰魯下邑孔子鄉建大車之輪而䝉之以甲以為櫓正義曰建立也立此大車之輪而覆之以甲以為櫓也子惠子曰甲覆楯非覆輪當云立之大車之輪右拔㦸以成一隊注百人為隊髙誘曰軍二百人為隊淮南司馬法云五人為伍十伍為隊見李衛公兵法是又以五十人為隊國語曰百人為徹行行頭皆官師賈逵云百人為一隊也官師隊大夫也故杜據以為説余羸老也高誘曰羸劣人也親受矢石後漢書堅鐔傳曰輒先當矢石注石謂發石以投人也墨子曰備城者積石百枝重十釣以上者桑林莊子湯有桑林之舞司馬彪曰桑林湯樂也崔撰曰宋舞樂名偪陽妘姓也使周内史選其族嗣納諸霍人禮也高誘淮南子注云天子不滅姓古之政也獻兆於姜高誘曰兆契龜之兆世所以占吉凶者也爾車非禮也唐石經曰爾車多非禮也案注當有多字尉止尉止尉翩以尉為氏謂之尉氏圈稱陳留風俗傳曰尉氏鄭國之東鄙弊獄官名鄭大夫尉氏之邑故欒盈曰臣將歸死于尉氏是也諸侯之師還鄭而南釋文曰還本亦作環棟案鄭氏士喪禮注云古文環作還哀三年傳道還公宫同公羊傳云以地還之也又云師還齊侯皆與環同篳門閨竇説文引云篳門圭窬康成禮記注云篳門荆竹織門也圭窬門旁窬也穿墻為之如圭矣王篇亦引作窬窬與竇同物同音十一年傳西濟于濟隧注濟隧水名京相璠曰鄭地也又曰滎澤在滎陽縣東南與濟隧合濟隧上承河水於卷縣北河南逕卷縣故城東又南逕衡雍城西同盟于亳案經云同盟于亳城北二傳皆云京城北公羊疏云服氏之經亦作京城北與此傳同棟案亳城當依服氏作京京鄭地在榮陽隐元年傳謂之京城是也亳無考非也司慎司盟服虔曰二司天神司盟司慎不敬者監司察盟者女樂二八王逸楚辭章句曰二八二列大夫有二列之樂韋昭曰八人為列備八音也書曰居安思危注逸書案周書程典曰於安思危於始思終於邇思備於逺思近於老思行不備無違嚴戒十二年傳同姓於宗廟毛萇詩傳云同姓同祖也楊梁京相璠曰楊梁宋地今睢陽東南三十里有故楊梁今曰楊亭也俗名之曰緣城非西北去梁國八十里劉昭引杜注云有地名楊亭與京相説同王使隂里結之先鄭有婚禮結言結字本此傳十三年傳什吏周書大聚曰十夫為什以年為長即什吏也窀穸孔宙碑作窀夕説文云窀𦵏之厚夕説文無穸字明不从穴也先王卜征五年而歲習其祥祥習則行國語引大誓曰朕夢協于朕卜襲于休祥禮記云卜筮不相襲注云襲因也棟案襲與習通周禮大司徒屬胥各掌其所治之政襲其不正者康成云故書襲為習是習為古文襲左氏从古文故以習為襲也哀十五年傳云卜不襲吉注云襲重也金縢云乃卜三龜一習吉又鄭注士喪禮云古文槢為襲是襲與習通十四年經衛侯出奔齊不脩春秋曰孫林父甯殖出其君仲尼脩之曰衛侯衎出奔齊臣逐君不可以訓猶召君也杜注謬諸侯失國名公榖皆有衎字左傳脱也傳執莒公子務婁徐邈云務莫侯反禮説云務與牟古音同莊子務光荀子作牟光徐音是也君義嗣也王肅曰義宐也嫡子嗣國得禮之宐周書曰王義嗣徳蘧伯玉高誘吕覽注曰伯玉衛大夫遽莊子無咎之子瑗諡曰成子庸知愈乎司馬彪莊子注曰庸猶何用也厚成叔釋文曰厚本或作郈世本曰魯孝公生惠伯革其後為厚氏陸淳曰郈成叔孝公八世孫外傳曰魯文公欲弛郈敬子之宅韋昭云郈敬子魯大夫郈恵伯之後元孫敬伯同也昭廿五年傳云季郈之雞鬬徐廣史記注曰一本作厚世本亦然棟案吕氏春秋有郈成子與右宰榖同時以傳考之即厚成叔也厚與郈通世本作厚内傳作郈禮記又作后左傳或作厚或作郈字異而實同説文曰厚古作垕从后土或从邑或省文高誘曰郈氏惠伯華之後世本作惠伯革鄭氏禮記注革作鞏高作華未詳孰是以字為氏因為郈氏郈成子郈敬子國之子國疑同字之誤郈青孫也皆據世本而言然則厚成叔乃敬伯同之子也高氏曰以字為氏則郈非采邑古今人表有厚昭伯師古曰即郈昭也成國不過半天子之軍高誘吕覽注云成國成千乗之國也師曠王逸楚辭章句曰師曠聖人字子壄生無目而善聴纂乃祖考無忝乃舊棟案舊謂祖考之舊法也管子牧民篇云恭祖舊詩曰行歸于周萬民所望服虔曰逸詩也都人士首章有之康成緇衣注云此詩毛氏有之三家則亡案西漢毛詩不列于學官故服氏謂之逸詩猶鄭氏尚書古文二十四篇也十五年經秋八月丁巳日有食之隋志曰推合丁巳朔傳王及公侯伯子男甸采衛大夫各居其列所謂周行也左氏説詩此古訓也詩云古訓是式漢時謂之故訓天謂之詁訓詁訓者雅言也魯語曰詩書執禮皆雅言也周之古訓仲山式之子之雅言門人記之爾雅以觀于古故又謂之爾雅俗儒不信爾雅而仲山之古訓夫子之雅言皆不存矣後之學者省諸爾雅釋故釋訓乃周公所作以敎成王故詩曰古訓是式十六年傳戰于湛阪京相璠曰昆陽縣北有蒲城蒲城北有湛水者是酈元曰湛水出犨縣北魚齒山西北東南流厯魚齒山下為湛浦今水北悉枕翼山阜於父城東南湛水之北山有長阪葢即湛水以名阪故有湛阪之名方城之外戰國䇿曰楚不守方城之外高誘曰方城楚寒也外北也十七年傳遂幽其妻漢書幽作就瘈狗説文引作狾从犬折聲云狂犬也澤門之晳詩正義引云皋門之晳陸氏釋文云本或作皋者誤棟案古皋澤字相同孫叔敖碑云收九睪之利婁壽以為澤字但皋為白下本土刀切睪為四下㚔本一字漢碑从四下羊者誤今馬援傳注亦誤羊服虔漢書注云皋澤也詩鶴鳴于九皋王仲任薛夫子薛漢父撰韓詩章句皆以為九折之澤諸侯本有皋門何獨宋不然也晏嬰麤衰斬鄭康成曰麤衰斬者其縷在齊斬之間謂縷如三升半而三升不緝也斬衰以三升為正微細焉則屬於粗也唯卿為大夫鄭康成曰此平仲之謙辭也言己非大夫故為父服士服耳王肅聖證論曰喪禮自天子以下無等故曽子云哭泣之衰齊斬之情饘粥之食自天子達且大國之卿與天子上士俱三命故曰一也晉士起大國上卿當天子之士也平仲之言唯卿為大夫謂諸侯之卿當天子之大夫非謙辭也春秋之時尊者尚輕簡喪服禮制遂壞羣卿専政晏子惡之故服麤衰枕草於當時為重是以平仲云唯卿為大夫遜辭以避害也杜氏从王説十八年傳跪而戴之李登聲類曰跪跽也齊侯禦諸平隂塹防門而守之廣里京相璠曰平隂齊地也枉濟北盧縣故城西南十里杜氏云抂縣東北非也平隂城南有長城東至海西至濟河道所由名防門去平隂三里司馬彪郡國志曰濟北盧縣有平隂城有防門有光里京相璠曰防門北有光里齊人言廣音與光同杜氏以為平隂城南有防防有門於門作塹横行廣一里皆臆説也巫山京相璠曰巫山在平隂東北必斾而疏陳之淮南子曰疏隊而擊之高誘曰疏分也司馬法曰凡陳行惟疏戰惟密有班馬之聲注夜遁馬不相見故鳴班别也棟案班還也郭璞引作殷齊師夜遁馬鳴聲漸逺故云班馬之聲尚書班瑞于羣后史記班作還古字通戊戌及秦周子惠子曰吕覽慎大篇曰齊達子帥其餘䘚以軍于秦周高誘曰秦周齊城門名也案秦周當是齊地名杜氏以為魯大夫失之伐雍門之萩戰國䇿孫子謂田忌曰使輕車鋭騎衝雍門髙誘曰雍門齊西門名也萩酈元引作荻案玉篇音且留切云蒿也當从萩又七肖反釋文云本又作秋斬其槆以為公琴棟案公琴頌琴也頌與公古字通焚申池之竹木淮南子墬形訓曰申池在海隅髙誘曰海隅藪劉逵據以注齊都賦京相璠言申門即齊城南面第一門外為申池杜於文十八年傳依京氏為説非也以枚數闔注枚馬檛也案枚猶个也廿一年傳云識其枚數則枚不得為馬檛扣馬吕諶字林曰扣牽馬史記注甚雨及之甚古文湛字見詛楚文莊子天下篇云沭甚雨節疾風崔撰本甚作湛音淫湛雨猶久雨也或云檀弓云雨甚至甚當讀如字亦通吾驟歌北風又歌南風南風不競多死聲服虔曰北風夾鍾無射以北南風姑洗南吕以南南律氣不至故死聲多吹律而言歌風者出聲曰歌以律是候氣之管氣則風也故言歌風十九年傳先吴壽夢之鼎注以璧馬為鼎之先子惠子曰馬為庭實未聞以馬為先且馬不上堂安得先之先吴鼎亦不辭先吴猶言先秦先漢歟癉疽玉篇引作疽多但切作林鐘而銘魯功吕諶字林曰銘題勒也亡之道也唐石經云亡之之道也顔懿姬鬷聲姬杜此注全用服氏服氏又云傳家從後言之故舉諡也諸子注諸妾姓子者杜亦用服注此當从傳遜説以諸子為内官也屬諸戎子服虔曰戎子子牙養也棟案養謂養母也廢常不祥服虔曰立長為祥立而廢之為不祥也閒諸侯難服虔曰閒犯為光已列於諸侯難成是專黜諸侯服虔曰専獨也光比於諸侯列於㑹盟不可黜也而以難犯不祥也服虔曰以難成之事犯不善崔杼微逆光服虔曰微隐匿也棟案哀十六年傳其徒微之是微為隐匿也疾病而立之服虔曰立為太子子孔當罪鄭康成曰當謂值其罪音丁浪反問守備焉以無備告揖之乃登服虔曰彭仲博以為齊侯號衛衛慙而下云問守備焉問衛之守高唐者衛無恩信故令守者以無備告齊侯善其言故揖之乃命士卒登城此説近之棟案經典序錄曰汝南彭汪字仲博説先師竒説及舊注又昭廿七年傳云母老子弱是無若我何彭仲博云當言是無我若何我母無我當如何我字當在若上正義所載惟此二説廿年傳陳慶虎慶寅王符曰慶氏媯姓廿一年經漆閭丘注南平陽縣西兆有顯閭亭闞駰十三州記曰山陽南平陽縣有閭邱鄉伍氏從征記曰杜氏謂顯閭邱今案漆鄉狂縣東北漆鄉東北十里有邱鄉顯閭非也公姑姊子惠子曰成公同宗之女于公為姑姊故云公姑姊注及正義皆失考妬叔虎之母美而不使唐石經云而不使視寢二字旁增論衡引此傳與石經同深山大澤實生龍虵王充曰妖氣生美好故美好之人多邪惡火有光耀亦有容貎龍虵東方木舍火精故美色貌麗膽附於肝故生勇力火氣猛故多勇木剛强故多力也欒盈過於周周西鄙掠之唐石經云欒盈奔楚過於周又一本云欒盈出奔楚過於周周西鄙人略之得罪于王之守臣注范宣子為王所命故曰守臣子惠子曰守臣指晉君書匄同為上卿書稱陪臣匄稱守臣有是理乎范氏矯君命逐盈故盈以為得罪于晉君使候出諸轘轅棟案候候人也周禮夏官候人職云若有方治則帥而致于朝及歸送之于竟臣食其肉而寢處其皮矣鄭康成曰古者殺牲食其肉坐其皮春秋左傳補註卷三
