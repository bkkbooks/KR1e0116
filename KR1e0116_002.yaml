body:
  text: 春秋左傳補注卷二元和惠棟撰僖草二年傳蜂蠆有毒李翊夫人碑作蜂蜂古文蜂説文作云或從䖵又云蠇蚌屬從蟲萬聲非毒蟲也大司馬固諫曰顧炎武曰大司馬即司馬子魚也固諫堅辭以諫也杜以固為名謂莊公之孫公孫固者非朱鶴林案史記宋世家則前後俱子魚之言棟案晉語云公子過宋與司馬公孫固相善韋昭曰固宋莊公之孫大司馬固也公子過宋適當襄公之時韋杜皆據世本而言稱大司馬所以别下司馬也顧氏不見世本而曲為之説失之史記疏略不足取證大司馬與大宰不在六卿之列文七年穆襄之族殺公孫固時樂豫為司馬泓之戰子魚為司馬明大司馬是宋之孤卿也文七年正義云宋上公禮得有孤且春秋變周不必如禮晉有太師太傅僭為之明恥教戰求殺敵也注明設刑戮以恥不果案吳子曰凡制國治軍必教之以禮厲之以誼使有耻也夫人有耻在大足以戰在小足以守明恥以教戰者所以厲其勇周書曰明恥示教蓋當時之語如此杜解迂回則如勿傷何休曰如即不如齊人語也下同示之俘馘説文作俘聝云軍戰斷耳也從耳或聲或從首案呂諶字林截耳則作耳旁獻首則作首旁杜云馘所載耳明當從耳旁馘或作􆅧見漢碑或作國見周禮古國或字通鍾鼎文皆然草三年傳遂取焦夷注焦今譙縣也案焦譙古通用小黃門譙敏碑以焦贛為譙贛是也䇿名委質服虔曰古者始仕必先書其名於䇿委死之質於君然後為臣示必死節也棟案服讀質為贄晉語曰臣委質于翟之鼓韋昭曰質贄也士贄以雉委贄而退尚書稱二生一死贄故云委死之質服説頗勝於杜當從之既注此而考顧氏補正亦與余同但不引服注故仍存之杞成公譙周古史考云惠公生成公及桓公曹共公髙誘曰共公名襄昭公之子聞其駢脅説文作骿脅云并脅也從骨并聲論衡作仳脅既而揮之振去匜中之水故曰揮何承天曰振去為揮杜氏訓揮為湔正義謂以濕手揮之使水湔汚其衣疑非草四年傳軍于郇注解縣西北有郇城服虔曰郇國在解縣東郇瑕氏之虛也酈元案竹書紀年云晉惠公十有五年秦穆率師送公子重耳圍令狐桑泉臼衰皆降焉晉師狐毛與先軫禦秦至于廬栁秦穆公使公子縶來師言退舍次于郇盟于軍京相璠春秋土地名曰桑泉臼衰並在解東南不言解明不至解可知春秋之文與竹書不殊今解故城東二十四里有故城在猗氏故城西北鄉俗名之為郇考服虔之説又與俗符賢於杜氏單文孤證矣説文云郇讀若泓秦伯送衛于晉三千人實紀綱之僕韓非子曰穆公以疇騎二千輔公子重耳入之于晉禮記曰漢律民年二十傳之疇官各從其父學習騎射故謂之疇騎即所謂紀綱之僕也髙誘曰衛猶護助也服虔文七年注云衛從兵也以志吾過鄭康成曰志古文識識記也昭四年傳且曰志之十三年傳嵗聘以志業皆古文識蔡雍論語曰賢者志其大者今作識伯服史記作伯犕犕與服古字通詳易考昔周公弔二叔之不咸故封建親戚以藩屏周荀子儒效篇曰周公兼制天下立七十一國姬姓獨居五十三人而天下不稱偏焉召穆公詩正義曰依世本穆公是康公之十六世孫詳見服虔注好聚鷸冠子惠子曰鷸一作述逸周書曰知天文者冠述顔師古以為子華好與術士遊然案下文服之不衷則不必如顔説也石甲父廣韻引作甲石父省視官具于汜戰國䇿曰天子巡狩諸侯避舍納管鍵攝衽抱几視膳於堂下天子已食而退聽朝也草五年傳請隧杜依賈逵以為王之葬禮韋昭曰隧六隧之地事見周禮此可備一説未有代德而有二王周書芮良父曰觀天下有土之君厥德不逺罔有代德草六年經楚人滅夔古史考云滅歸太康地志曰歸鄉故夔子國尚書中侯曰伯禹稽首讓于益歸鄭康成注云益歸賢者堯臣歸讀曰夔傳公使展喜犒師外傳云以膏沐犒帥服虔曰以師枯稿故饋之飲食髙誘淮南子注曰酒肉曰餉牛羊曰犒芬其指犒也謹案禮記言犒非古字古文作稿或作稿張揖撰廣雅始從牛旁髙洪氏𨽻續載漢碑有勞之語與犒同公羊注云牛酒曰犒故其字一從牛一從酉漢𨽻皆然非古文也説文無犒字周禮小行人云若國師役則令稿禬之注云故書稿為稿鄭司農曰稿當為稿謂犒師也先鄭不言字誤明古犒字本作稿或作稿與服子愼枯稿之説合張有復古編云鎬餉也從金高别作犒非五經文字注勞師借稿字為之案説文鎬溫器也以鎬為犒勞字無據我先王熊摯有疾鬼神弗救而自竄于夔正義案鄭語孔朝注云熊繹玄孫曰熊摯有疾楚人廢之立其弟熊延熊摯自棄於夔子孫有功王命為夔子韋昭注同索隱據譙周古史考熊渠卒子熊翔立卒長子摯有疾少子熊延立草七年傳夏書曰注尚書虞夏書也正義曰此古文虞書益稷之篇漢魏諸儒不見古文因伏生之謬從堯典至胤征凡二十篇總名曰虞夏書棟案尚書二典皆夏史官所作故總謂之夏書此孔子刪書之本也故墨子明鬼篇曰尚書夏書其次商周之書伏生增為虞夏書梅賾又改為虞書皆非孔氏之舊孔穎達又以曲説扶之雅所不取傳引二典皆稱夏書惟文十八年云虞書數舜之功此必有誤欒枝韋昭曰欒共子之子杜注本賈逵荀林父世本曰晉大夫逝遨生桓伯林父案僖草八年林父始將中行故改中行氏草八年傳殺子叢以説焉謂楚人不卒戍也髙誘淮南子注云説解也一本謂楚人下有曰字衍文曹人凶懼説文云凶擾恐也從人在凶下乘軒毛公詩傳云大夫以上赤芾乘軒且曰獻狀案獻狀謂觀狀也先責其用人之過然後誅觀狀之罪以示非報惡也顔籀以為先責不用負羈而乘軒者衆因曰今我之來獻駢脅容狀耳斯蓋蚩弄之言猶言若云謂秦拜賜之師也其説亦通不有寧也劉炫規過以傷為寧不有寧謂不有損傷半農先生曰古人多反語如甘為苦治為亂皆是以傷為寧亦有理我曲楚直其衆素飽周書武稱曰直勝曲飽勝飢武之勝也子犯言背楚之惠則我曲楚直且楚強其衆又素飽不可為老也杜訓素為空言直氣盈飽恐非原田每每舍其舊而新是謀説文云每草盛土出也從屮母聲髙卬之田草盛土出故云舍其舊而新是謀周禮三卜一曰原兆兆之璺鏬有似原田故鄭氏注云原原田也楚子伏余仁仲曰楚子伏已而盬其腦此本伏字絶句嶽本伏已讀據此則已當音以據嶽本則已當音紀陸德明音義不云音紀則知當以楚子伏為絶句而已作以音不音紀淳祐九經本亦用伏已絶句更詳之請與君之士戲朱國禎曰戲者兵也三軍之號所云戲下是也若云以兵見云耳林堯叟謂得臣輕用民命便解作戲弄之戲夫得臣亦英雄豈有此失杜征南獨不下一字已得其解矣韅靷鞅靽説文引作從革顯聲棟案顯古文以為顯故傳作韅從古文省少長有禮其可用也子惠子曰應前欲用其民鄉役之三月説文引作嚮云不久也陸氏云本又作嚮糾逖王慝衛彈碑云糾剔王岱案魯頌狄彼東南鄭箋云狄當為剔剔治也逖與狄同古文作逖又與剔通故或訓為逺或訓為治此傳當從古文作逖訓為治淮南子云俞兒狄牙嘗淄澠之水而别之狄牙即易牙是狄與易通白虎通云狄者易也瓊辨玉纓説文引云璿辨玉纓張衡集同薛綜曰辨馬冠也義髦以璿玉飾之纓馬鞅也以玉飾之填諸深室荀卿子曰公侯失禮則幽故填諸深室晉侯作三行以禦狄鄭康成曰行謂軍列周禮有行司馬取名于此案獻公時已有左右行至此復立中行後改為三軍大夫卅年傳然鄭亡子亦有不利焉唐石經云雖然鄭亡云云案碑是書丹後改定必有所據焉用亡鄭以倍鄰唐石經及宋本皆作陪釋文仍作倍案注當作倍若不闕秦將焉取之新序引云不闕秦將焉取之唐石經初刻云不闕秦焉取之正義案沈文何云不闕秦家更何處取之案此則若字將字皆衍文俗儒從石經續刻增入當刪宋本云由不闕秦焉取之亦誤請無與圍鄭許之服虔曰晉善蘭不忘本國故也卅一年傳自洮以南酈元曰今甄城西南五十里有桃城或謂之洮案甄城漢屬濟陰卅二年傳將殯于曲沃鄭衆周禮注曰將葬朝于祖考之庿而後行晉宗庿在曲沃故曰曲沃君之宗也又丙午入于曲沃丁未朝于武宮孟子唐石經初刻作孟兮後改子釋文作孟子云本或作孟兮中壽三體石經作卅三年傳超乘高誘曰超乘巨踊車上也厲兵秣馬髙誘曰厲利其兵釋文曰秣音末穀馬也説文作秣云食馬穀也鄭之有原圃猶秦之有具囿髙誘曰原圃在今河南中牟具囿在馮翊池陽一名陽紆其為死君乎猶言不為死君乎君在殯故稱死君顧氏補正以死其君為解案成十三年絶秦書曰文公即世穆為不弔蔑我死君則顧之説未盡然也子墨衰絰賈逵曰墨變凶遂墨以葬文公服虔曰非禮也康誥曰父不慈子不袛兄不友弟不共不相及也昭草年傳在康誥曰父子兄弟罪不相及孔氏謂非康誥之全文引其意而言之棟謂此康誥之闕文也法言曰酒誥之篇俄空焉伏生引酒誥曰王曰封惟曰若圭璧今酒誥無此文故漢藝文云酒誥脫簡一梓材今王惟曰以下文義不屬蓋康誥三篇皆有脫誤孔以為引其意而言之非也外僕髠屯禽之以獻崔憬易注曰禽古擒字擒猶獲也陽子宣言曰高誘戰國䇿注曰宣遍也案高注本爾匹文元年經叔孫得臣世本曰桓公生僖叔牙牙生戴伯兹兹生莊叔得臣得臣生穆叔豹傳來錫公命唐石經及宋本錫作賜釋文同云本或作錫覲禮云天子賜舍注云今文賜作錫役夫管子曰處里為下陳處師為下通謂之役夫宜君王之欲殺女而立職也案韓非子作廢女上云黜商臣合作廢能行大事乎服杜皆以為弒君案高誘戰國䇿注云大事兵事傳曰國之大事在祀與戎故下云以宫甲圍成王二年傳秦伯猶用孟明鄭注儀禮云猶者守故之辭大事于太廟躋僖公逆祀也古文左氏説曰大廟周公之廟饗有禮義者也祀國之大事也惡其亂國之大事於大廟故言大事也躋登也登僖公於愍公上逆祀也夏父弗忌禮器云夏父弗綦鄭詩大叔于田云叔善射忌又良御忌鄭箋云忌讀如彼己之子之己案曹詩候人彼己之已作其其可讀為記則忌亦可讀為其古基字期字皆省作其與綦同音是弗忌讀為綦如厥憖為厥銀居吾語汝為姬魚語女字隨讀變從而辨之可識古音表記引候人云彼記之子不稱其服釋文云記本又作已然則鄭引曹風詩從三家説也廢六關家語云置六關王肅曰六關關名魯本無此關文仲置之以稅行者故曰不仁棟案廢與置古字通公羊傳曰去其有聲者廢其無聲者鄭志答張逸曰廢置也何休曰廢置也置者不去也齊人語以廢為置猶以亂為治徂為存故為今曩為嚮苦為快臭為香藏為去郭璞所謂詁訓義有反覆旁通美惡不嫌同名也杜氏云六關所以禁絶末遊而廢之周禮建國有門關關安可廢况後傳塞關陽關皆有明文豈旋廢之而旋復之與杜氏此説昧于義矣小爾匹亦以廢為置杜集解頗用孔鮒之説獨不及此何也上文云下展禽下猶去也見周禮司民注論語栁下惠為士師三黜廢六關廢猶置也廢與下文相對周語富辰曰小怨置大德韋昭曰置猶廢也彼此互訓三年傳取王官及郊括地志云王官故城在同州澄城縣西北九十里又云南郊故城在縣北十七里又有北郊故城又有西郊故城遂自茅津濟史記秦本紀云繆公元年自將伐茅津劉伯莊云戎號也司馬彪郡國志云河東大陽有茅津劉昭引杜注云在縣西南有茅亭即茅城括地志云茅亭及茅城在陜州河北縣西二十里水經注云茅亭茅戎號封殽尸而還賈逵曰封識之案易繫曰不封不樹虞翻注云穿土稱封封下窆字但殽尸多不能用葬禮故杜云埋藏之四年傳圍刓新城服虔曰秦邑新所作城也諸侯敵王所愾注愾恨怒也案説文引作鎎從金氣聲云怒戰也許氏所據多古文必得其實六年經季孫行父如陳注行父季孫友子案世本云公子友生齊仲齊仲生無逸無逸生行父穀梁疏云世本云季友生仲無佚佚生行父范寧云行父季友生行父生夙案文當云季友孫乙孫友衍子字傳寫誤也六年傳以子車氏之三子奄息仲行針虎為殉服虔曰殺人以葬璇環其左右曰殉道之以禮則案唐石經無以字俗儒所加後人遂以則字屬下句士會注隋季也世本曰范氏晉大夫隰叔之子士蒍之後蒍生成伯缺缺生武子會會生文叔燮燮生宣叔丐丐生獻子鞅鞅生吉射棟案范氏本陶唐氏之後襄草四年傳范宣子曰昔丐之祖在夏為御龍氏注云謂劉纍也又云在周為唐杜氏汲郡古文曰成王八年王師滅唐遷其民于杜杜伯之子隰叔違難奔于晉生子輿即士蒍也士蒍生士穀士缺缺生會食邑於范是為范武子故宣子曰晉主夏盟為范氏焦弱侯曰士穀士會士皆當作土傳訛耳讀為杜土姓杜伯之後土即古杜氏棟案古土字皆作士見牧敦史記曰有邦有士今呂刑作土周頌曰保有厥士義作土呂覽任地曰后稷曰子能吾士靖而甽浴士乎髙誘曰士當作土周牧敦亦以士為土焦氏以為傳訛非也土本古杜氏鄭康成周禮注校人職云世本曰相士作乘馬竹書亦作士荀卿子曰杜作乘馬楊倞案世本相土作乘馬今左傳亦作相土從古文毛詩自土沮漆齊詩作自杜又云徹彼桑土韓詩作桑杜毛詩左氏傳皆出孔壁中故多古文范氏在夏為劉氏周以前為唐氏昭元年傳云唐人是因以服事夏商是也周以後為杜氏春秋時為范氏是會之帑留秦者又為劉氏自虞以來世次秩然故宣子以為死而不朽焦氏讀士為土訓為杜其言亦卓余故存而論之晉語訾祐曰隰叔子違周難於晉國生子輿為理韋昭曰理士官也班固亦言晉主夏盟為范氏范氏為晉士師是范氏先以官為氏以士為杜恐未然也存考殺諸郫博物志云殺之郫邵云河東垣縣有郫邵之厄襄草三年云戍郫邵此其地也將焉置此服虔曰置置也此太子頓首于宣子少儀曰婦人吉事雖有君賜肅拜注云婦人以肅拜為正凶事乃手拜耳孔正義曰言肅拜婦人之常左傳穆嬴頓首於宣子之門有求於宣子非禮之正也愚謂穆嬴有襄子之喪以非喪次故用吉拜而頓首也此子若才吾受子之賜服虔曰如子為善教誨此子使之有賢才知人君之道也則吾受子之賜賜猶惠不才吾惟子之怨服虔曰才而受賜美其教也不才怨子惡其教不至也今君雖終言猶在耳服虔曰君沒未久而言聲語氣尚在耳宣子與諸大夫皆患穆嬴且畏逼服虔曰患穆嬴以君顧命之言責己也畏他公子相逼迫也叔仲惠伯世本曰桓公生僖叔牙叔牙生武仲休休生惠伯彭彭生皮為叔仲氏惠伯成之周禮調人職曰凡有鬭怒者成之鄭衆曰成之謂和之也猶今二千石以令解仇怒正德利用厚生賈逵曰正德人德利用地德厚生天德八年傳梁益耳東觀漢記曰其先與秦同祖出於伯益别封于梁九年傳秦人來歸僖公成風之襚注追贈僖公并及成風注非也成風者僖公之母莊公之妾母以子貴故上經書夫人風氏母以子氏故此經書僖公成風十年傳麇子麇亦作麏注不釋其地所在案盛宏之荆州記云當陽本楚之舊左氏傳云楚潘崇伐麏至于錫穴穎容釋例云麏在當陽十一年經承匡注在陳留襄邑縣西圈稱云襄邑本襄陵承匡鄉也宋襄公所葬故曰襄陵縣西三十里有承匡城傳錫穴司馬彪郡國志曰漢中錫縣春秋時曰錫穴摏其喉鄭康成引作舂子駒之門王符潛夫論曰魯之公族有子駒氏以人氏其門者猶哀十一年黨氏之溝敗狄于長丘張華博物志曰陳留封邱有狄溝春秋之長邱也十二年傳郕人立君服虔曰立君改立君不問天子也郕邽子惠子曰服虔以郕封為郕邦之家寶圭太子以其國寶與地夫鐘來奔也然則邽不從邑不有君子其能國乎呂覽云國不虛存必有賢者若使輕者肆焉服虔曰肆突言使輕鋭之兵往驅突晉軍案詩云是伐是肆鄭箋曰肆犯突也杜謂肆為暫往而退此釋輕非釋肆也裹糧坐甲昭草七年傳云吳王使甲坐于道荀卿子云庶士介而坐道故云坐甲入瑕京相璠曰今河東解縣西南有故瑕城十三年傳繞朝贈之以䇿服虔曰繞朝以䇿書贈士會劉協曰春秋聘繁書介彌盛繞朝贈士會以䇿子家與趙宣以書蓋用服説杜氏以䇿為馬檛韓非子曰繞朝之言當矣其為聖人於晉而為戮於秦也此不可不察是繞朝因贈䇿之言而戮也左氏不載似韓非據秦史而言吾謀適不用也白氏六帖引注云以有䇿而不用也其處者為劉氏宰相世系曰會適秦歸晉有子留於秦自為劉氏生明明生逺逺生陽十世孫戰國時獲於魏遂為魏大夫秦滅魏徙大梁生清徙居沛生仁號豐公名燸字執嘉生四子伯仲邦交邦漢高祖也家君曰處者為留謂留於秦者遂以為氏漢人改為劉以合卯金刀之説十四年傳王叛王孫蘇劉向九歌云始法言於廟堂兮信中塗而叛之王逸章句曰叛倍也倍與背同王初與王孫蘇後復背之文七年傳云乃背先蔑此其類也十五年傳齊人或為孟氏謀魯三家慶父叔牙季友慶父之後當云慶氏稱孟氏者鄭康成論語注云慶父輈死時人為之諱故云孟氏杜云慶父為長庶故或稱孟氏案公羊傳慶父曰吾不得入矣於是抗輈經而死疏云鄭氏云慶父輈死者正取此文又案禮緯舍文嘉曰文家稱叔質家稱仲嫡長稱伯庶長稱孟杜依此為説十六年經盟于郪丘釋文云郪音西賈逵云公羊曰災邱穀梁曰師邱今公羊作犀邱郪本有西音釋文是毛詩衡門云可以棲遲前發碑作西遲此其證也傳師于大林伍瑞休江陵記曰城西北六十里有林城春秋至于阜山師于大林即此城也御覽百濮劉伯莊史記地名曰濮在楚西南周書王會曰伊尹為四方獻令正南曰百濮爾匹云南至于濮鉛十七年傳畏首畏尾身其餘幾髙誘曰畏始畏終中身不畏凡有幾何言常畏也較杜注尤明晰十八年經六月癸酉葬我君文公冬十月子卒注先君既葬不稱君者魯人諱弒以未成君書之子在喪之稱家君曰杜預既葬稱君之説至此而辭窮矣傳申池杜氏依京相璠説言申池在齊城南非也申池在海隅齊之藪多竹木故云納諸竹中若近在城南不須言歸舍爵也詳見襄十八年既而復叔仲氏世本云桓公生僖叔牙叔牙生武仲休休生惠伯彭彭生皮為叔仲氏在九刑不忘棟案九刑謂刑書九篇也周書嘗麥解曰維四年孟夏王命太正正刑書王陟階在東序乃命太史尚太正即居于户西南向九州闕伯咸進在中西向宰乃承王中升自客階作策執策從中宰坐尊中于太正之前太祝以王命作策策告太宗王命闕祕作策許諾乃北向繇書于內楹之門衆臣咸興受太正書乃降太史策刑書九篇以升授太正乃左還自兩柱之門闕嵗太正曰欽之哉諸正敬功爾頌審三節無思民因順爾臨獄無頗正刑有掇夫循乃德式監不逺以有此人保寧爾國克戒爾服世世是其不殆惟公咸若太史乃降太正坐舉書乃中降再拜稽首太史乃藏之于盟府以為嵗典此周作九刑之事也案其文云毁則為賊掩賊為藏竊賄為盜盜器為姦其後李悝著法經六篇始盜賊次网捕其亦師九刑之意乎叨餮餮説文引作飻貪也從食殄省聲宣二年傳戎昭果毅以聽之之謂禮大戴禮論四代之政刑云祭祀昭有神明燕食昭有慈愛宗廟之事昭有義率禮朝廷昭有五官無廢甲胄之戒當作戎昭果毅以聽然則戎為句昭果毅以聽古語也下四句乃左氏益之耳杜注殊不的今日之事髙誘曰今日之事御事也文馬百駟説文引作馬云畫馬也周書王會曰犬戎馼馬金本文馬此馬當畫赤鬛縞身之形非真吉黃之乘也補正載邱光庭説文馬馬之毛色有文采者此臆説也于思于思注于思多須之貌賈逵曰白頭貌案毛詩瓠葉云有兔斯首鄭箋云斯白也今俗語斯白之字作鮮齊魯之間聲近斯正義曰服虔以于思為白頭貌字雖異蓋亦以思聲近鮮故為白頭也後漢書朱俊傳賊多髭者號于氏根注引杜注為證案此則于為須思為白于思為白須也從臺上彈人而觀其辟丸也髙誘曰從髙臺上引彈觀其走而避丸以為樂也置之畚何休曰畚草器若今市所量穀者也齊人謂之鍾三進及溜釋文曰溜屋霤也案熊氏經説云古有中霤禮蓋儀禮之逸而不傳者霤者屋有復穴開其上以取明雨則霤之因名中庭曰中霤鄉飲記有磬階霤即中霤也大記有東霤注云危棟上也雜記有門內霤即賓執脯賜鍾人之處民之主也髙誘曰大夫稱主因曰民之主案昭五年傳晏子謂子罕能用善人民之主也亦謂大夫曰主觸槐而死髙誘曰觸畜也杜氏云槐趙盾庭樹顧君以為麑退而觸槐則非趙盾庭樹棟案呂覽曰觸庭槐而死外傳云觸廷之槐而死韋昭曰廷外朝之廷也周禮王之外朝三槐三公位焉則諸侯之朝三槐三卿位焉此説得之蓋當時麑退而觸靈公之廷槐者歸死于君也遂扶以下公嗾夫獒焉釋文扶服虔注作跣嗾服本作㖩正義曰服虔本扶作跣注云趙盾徒跣而下走又云嗾㖩也夫語辭獒犬名公乃㖩夫獒使之噬盾是服讀嗾為㖩非作㖩此文宋本與今本有異故録之以視於朝毛詩鹿鳴曰視民不恌鄭箋曰視古示字士昏禮曰視諸襟鞶汪云視乃正字今文作示俗誤行之郭忠恕曰鄭君此説大與説文石經相乖郭氏不識古文其説非也我之懷矣自貽伊戚王肅曰此弼風雄雉之詩案今詩戚作阻惟小明詩作戚而上句又異王子雍或見三家之詩據以為衛詩三家惟齊詩亡于魏代自餘杜氏猶及見之為法受惡服虔曰聞義則服案聞義則服弟子職文也王肅曰為書法受弒君之名李厚菴曰此真非夫子之言也趙盾為旄車之族鄭氏詩箋旄作軞陸氏曰一本作軞服虔曰軞車戎車之倅三年傳觀兵于周疆服虔曰觀兵陳兵于周也定王使王孫滿勞楚子服虔曰以郊勞禮迎之也不逢不若張平子東京賦云禁禦不若以知神姦螭魅魍魎莫能逢旃爾匹釋詁云若善也郭景純注左傳曰禁禦不若今左傳作不逢不若案下傳云莫能逢之杜氏云逢遇也既云不逢又云莫逢文既重出且杜氏不應舍上句注下句此晉以後傳寫之訛當從張衡郭璞本作禁禦不若余為伯鯈説文作百䱔云黃帝之後姞姓釋文作倏非也楚人鴆之子惠子曰楚滅江惡其所出為害故鴆之四年傳圄伯嬴子惠子曰月令省囹圄蔡雍章句云囹牢也圄止也所以止出入皆罪人所舍也然則囹圄亦周時之獄焦氏答崇精曰囹圄秦獄恐未然汰輈唐石經作汏説文曰泰滑也從廾從水大聲徐鉉云音地達切左傳作汰非昭草六年傳云齊子淵射泄聲子中揗瓦繇朐汰輈匕八者三寸杜云汏矢激明汏為滑也楚人謂乳穀謂虎於菟唐石經云楚人謂乳為穀謂虎為於菟説文曰楚人謂虎為烏菟漢書又作於檡方言注云今江南夷呼虎為菟音狗竇鄭康成尚書注曰於者鳴聲則於為古文烏穀廣雅作㝅奴口反針尹髙誘呂覽注曰楚有針尹之官諫臣也王思子文之治楚國也戰國䇿曰穰侯之治秦也髙誘曰治猶相也改命曰生子惠子曰劉向改名更生本此更生出莊子六年傳以盈其貫注貫猶習也劉光伯據梅賾泰誓商罪貫盈以為紂之為惡如物在繩索之貫不得為習其説是也而所據之書非也案韓非子曰有與悍者鄰欲賣宅而避之人曰是其貫將滿也或曰子姑待之答曰吾恐其以我滿貫也遂去之此説與劉合可以規杜過矣王子伯廖注鄭大夫子惠子曰王子疑非鄭大夫十年傳崔杼正義曰何休膏肓以為公羊譏世卿而難左氏蘇氏釋云崔氏祖父名不見經傳則知非世卿云云案宰相世系曰崔氏出自薑姓齊丁公伋嫡子季子讓國叔乙食采於崔遂為崔氏濟南東朝陽西北有崔氏城是也季氏生穆伯穆伯生沃沃生野八世孫夭生抒為齊正卿云云又案僖草八年傳有齊崔夭蘇寬謂崔子祖父名不見經傳非也世系所云蓋見世本十一年經辰陵注潁川長平縣東南有辰亭酈元曰今此城在長平城西北長平城在東南或杜氏不謬傳寫之誤耳傳令尹蒍艾獵城沂服杜皆云蒍賈之子孫敖案世本艾獵為叔敖之兄又孫叔敖碑云君名饒字叔敖以艾獵為叔敖名此服杜臆説世本是也襄十五年傳蒍子馮為大司馬注云叔敖從子案世夲馮是艾獵之子此明文可據者正義曲説又以為世夲轉寫之誤非也使封人慮事注慮謀慮計功顧氏補正云慮籌度也解非棟案大司馬職云大役與慮事屬其植先鄭亦謂謀慮其事服虔曰封人司徒之屬官因縣陳廣韻縣郡縣也釋名曰縣懸也懸于郡也古作寰楚莊王滅陳為縣縣名自此始也家君曰縣不見周官似非自楚莊王始然古文作寰亦非無夲而説文無寰字似縣即寰也集韻云寰通作縣吾儕小人説文曰儕等輩也鄭康成曰儕猶輩類謂之夏州子惠子曰服虔曰言取討夏徴舒之州車武子撰桓溫集云夏口城上數里有州名夏州盛宏之荆州記曰史記蘇秦説楚威王東有夏州今江陵夏口城有州名夏州十二年傳卜臨于大宫且巷出車吉賈逵曰臨哭也巷出車陳于巷衛示雖困不降必欲戰也案下鄭復修城則賈説良是甲寅克之時鄭石制為內間故楚得以克鄭至于逵路注塗並丸軌曰逵詩正義曰爾匹九達謂之逵周禮經塗九軌不名曰逵杜意蓋以鄭之城內不應有九出之道故以為並九軌於爾匹不合今杜注塗方九軌兼弱攻昧武之善經也周書武稱曰闕強攻弱而襲不正武之經也篳路藍縷以啓山林方言引作襤褸又啓作啓説文曰裯謂之楹褸襤無緣也服虔曰言其縷藍藍然廣有一卒卒偏之兩服虔曰左右廣各十五乘百人為卒言廣有一卒為承也五十人為偏二十五人曰兩廣既有一卒為承承有偏偏有兩故曰卒偏之兩棟謹案禮説言杜氏據司馬法以釋偏兩之法司馬穰苴齊湣王時人其所論兵法與周制異且與左氏傳乖牾不合當從服虔之説摩壘而還鄭康成曰摩猶迫也軍壁曰壘左射以菆服虔曰凡兵車之法射者在左御者在中戈盾在右御下兩馬鄭康成引作􅧇徐仙民曰兩或作􅧇案此則兩本􅧇字故服杜訓為飾古文省故作兩邵寶以為掉兩馬之鞅非也挑戰李奇曰挑身獨戰不復須衆也挑音荼了反薛瓚曰挑戰擲嬈敵求戰古謂之致師楚人乘我賈逵國語注曰乘陵也陵亦侵也養由基為右髙誘戰國䇿注云養姓由基名楚之善射人也潘黨望其塵孫子曰塵髙而鋭者車來也使潘黨率遊闕四十乘注遊車補闕者棟案遊闕遊車闕車也外傳曰戎車待遊車之裂周禮車僕有闕車之倅駒伯注郤克棟案郤錡字駒伯克之子也大夫門子得從父于軍鄢陵之戰范丐從文子於軍此其證也屈蕩户之錢諡益曰家藏淳熙九經及長平遊御史夲巾箱夲俱作户字棟案淳熙正義以作户也楚人惎之注惎教説文引云楚人舁之云舉也黃皓説廣車陷楚人為舉之案此則惎當作畀傅遜謂楚人將毒害之而晉人乃脫扄拔斾投衡而出非也詳見定四年訓惎為教蓋本小爾匹趙叟在後叟與叟同見無極山碑説文作叟云叟或作知莊子案世本晉大夫逝遨生桓伯林父及莊子首本姓荀自林父將中行世本以為荀偃别為中行氏知邑名括地志云故智城在蒲州虞鄉縣西北四十里古今地名云解縣有智城蓋謂此也博物志云河東解縣有智邑每射抽矢菆注菆好箭案既夕禮云御以蒲菆鄭注云蒲菆牡蒲莖也古文菆作騶賈公彥云據左氏傳蒲非直得䇿馬亦為矢幹漢書鼂錯傳云材官騶發矢道同的如淳曰騶矢也小顏曰騶謂善矢也左氏傳作菆字其音同耳則知古菆字作騶屢豐年案説文無屢字當從毛詩作婁漢書皆以婁為屢今毛詩亦有作屢者俗作之取其鯨鯢説文引作鯨鯢云海大魚也從京漢書薛宣傳曰古者明王伐不敬取其鯨鯢小顔曰鯨古鯨字汗簡云鯨古作出馬日磾集羣玉古文古京字讀為疆歸于怙亂者也夫子惠子曰王荆公新經詩義本此十四年傳衛人以為成勞復室其子周禮司勳云事功曰勞室祿也周書有一室之祿謂祿其子襲父位自一室至千室卿之祿也周禮謂之宅田注謂以女妻之非是世本曰莊叔達生得閭叔穀穀生成叔蒸鉏鉏生項叔羅羅生昭叔起起生文叔圉圉生悝其子謂得閭叔穀也屨及於窒皇髙誘呂覽注引此傳作絰皇與莊十九年絰皇一也蒲胥之市呂覽作蒲疏胥疏古字通十五年傳髙下在心服虔曰髙下猶曲申也國君含垢淮南子云老子曰能受國之垢是為社稷主使解揚如宋劉向曰解揚霍人字子虎後世言霍虎登諸樓車服虔曰樓車所以窺望敵軍兵法所謂雲梯也使華元登子反之牀注兵法因其鄉人而用之必先知其守將左右謁者門者舍人之姓名因而利道之案此注皆見孫子用間篇曹公孫子注曰因敵鄉人知敵表裏虛實之情故舊而用之可使伺候守有官職在者謁告也上告事者也門者守門者也舍人守舍之人也又先知為親舊有急即呼之則不何止亦因以之知敵情虐我伯姬上云酆舒為政而殺之王符引作虐此云虐者案尚書呂刑惟作五虐之刑墨子引作五殺之刑論語不教而殺謂之虐又十八年傳云凡自內虐其君曰弒皆以虐為殺也論語隂嬉讖曰庚子之旦金版尅書出地庭中曰臣族虐王禽宋均云謂殺關龍之後庚子旦庭中地有此版異也龍同姓稱族五虐殺我必見禽也是虐為殺又一證敗赤狄于曲梁注云廣平曲梁縣回逺非也劉昭案上黨記曰潞濁漳也縣城臨潞晉荀林父伐曲梁在城西十里今名石梁此傳潞字漢書作路劉寬碑陰潞作路案三體石經仍作潞説文同羊舌職宰相世系表曰晉武公子伯僑生文文生突羊舌大夫也突生職職五子赤肸鮒虎季夙十六年傳禹稱善人玉篇引云禹稱善人云與稱同爾匹曰稱舉也與杜訓同當從人十七年傳晉師還家君曰晉未嘗出師而云晉師還者豈斷道討二之師歟似有闕文十八年傳自虐其君唐石經云自內虐其君案正義同今本皆脫內字袒括髮士喪禮曰主人髺髮袒鄭注云古文髺作括是括為古文髺也春秋左傳補注卷二
