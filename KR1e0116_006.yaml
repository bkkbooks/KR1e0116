body:
  text: 春秋左傳補註卷六元和惠棟撰廿五年經宋公佐卒于曲棘圈稱陳留志曰外黄於春秋為宋之曲棘里故宋之别都矣傳天地之經而民實則之案古文孝經實作是是即古寔字見尚書秦誓及詛楚文鄭康成詩箋云趙魏之東寔實同聲故此傳又作實生好物也死惡物也周書度訓曰凡民之所好惡生物是好死物是惡有鸜鵒來巢書所無也服虔曰鸜鵒不隃濟今隃宜穴而又巢故曰書所無也吾聞文武之世童謡有之唐石經作文成謂魯文公成公時也史記漢書論衡皆作文成舊本左氏傳亦有作成者若云周之文武上下數百年豈能逆知童謡為魯昭徴騐乎今本皆作文武俗誤行之久矣徴褰與襦方言曰袴齊魯之間謂之䙭郭璞云傳云徴褰與襦音騫郈氏為之金距服䖍曰金距以金踏距高誘吕覽注云以利鐡作鍛距沓其距上沓即踏也又淮南子注云金距施芒于距郈昭伯案世本昭伯名惡臧昭伯之從弟㑹賈逵曰昭伯臧伯賜也案世本臧㑹臧頃伯也宣叔許之孫與昭伯為從父昆弟也司馬貞曰為讒于臧氏史記為作偽月今云無或作為滛巧注云今月令無于時作為為詐偽左傳偽字亦有作為者定十二年傳云子偽不知釋文作為讀為偽拘臧氏老服䖍曰老臧氏家之大臣萬者二人其衆萬於季氏呉仁傑曰淮南書亦云禱于襄廟舞者二人案傳氏言四人為列尚不成樂況二人乎人當作八傳文誤也請以五椉亡服䖍曰言椉自省約以出日入慝作周禮環人察軍慝康成曰慝隂姦也謂軍中有為慝者司馬鬷戾鄭康成曰大夫家臣為司馬者大子欒黄伯思曰祕閣古寳器有宋公䜌餗鼎考汲冢師春書䜌乃宋景公名與鼎銘合董遇曰竹書有宋景公䜌而史為頭曼孫炎以䜌為頭曼合聲以辨周秦之語則䜌為古文欒也楄柎所以藉幹者説文引云楄部薦榦云楄部方木也幹脅也計於季氏上計也廿六年傳百兩一布先鄭云布泉也墨子曰商人用一布不敢繼苟而讎焉必擇良者齊子淵㨗王符曰齊子淵氏姜姓鑋而椉於它車注鑋一足行正義云說文云鑋金聲也棟案說文鑋讀若春秋傳曰􅚢而椉它車則傳本作􅚢五經文字亦誤作鑋故杜氏訓為一足行若从金輕聲與斷足無涉必傳寫之譌正義失考女寛韋昭曰女齊之子叔褒是亂國而惡君王也服䖍曰廢而不立是謂亂國追惡君王也國有外援不可黷也服䖍曰外援謂太子任秦之外孫黷易也秦為任外援不可易奉周之典籍以奔楚周之典籍盡在楚矣三墳五典八索九丘左史倚相觀射父讀之而楚檮杌之書頗可觀國語采之流及屈宋而楚騷比于周雅書之益人如是乎王愆于厥身汲郡古文云夷王八年王有疾諸侯祈于山川王陟諸侯釋位以閒王政服䖍曰諸侯釋其私政而佐玉政案閒氣為臣故云閒宣王有志鄭康成周禮注云志古文識有志謂長而有知識也王伯厚以為有撥亂之志恐非外傳曰宣王長而立之彘之亂宣王尚少至始有知識乃授之政猶周公復子眀辟也貫瀆鬼神説文引作摜訓與杜同君無違徳論衡引作囘徳回邪也與下文囘亂合廿七年傳與呉師遇於窮京相璠曰今安豐有窮水北入淮水經曰淮水又東北窮水入焉注云水出安豐縣窮谷窮音戎唐石經窮下有谷字酈元所引同正義曰此為定七年敗尹氏于窮谷涉彼而誤非也左尹郤宛王符曰郤氏之班有州氏祁氏伯宗以直見殺其子州黎奔楚郤宛直而和故為子常所妬受誅其子嚭奔呉為太宰懲祖禰之行仍正直遇禍也乃為謟諛而亡呉徐廣史記注云伯州犂者晉伯宗之子也伯州犂之子曰郤宛郤宛之子曰伯嚭宛亦姓伯又别氏郤司馬貞曰郤宛州犂子伯嚭郤宛子伯氏别族案定四年傳云楚之殺郤宛也伯氏之族出注云郤宛黨又云伯州犂之孫為呉大宰楚世家云宛之宗姓伯氏子嚭則嚭乃宛之族也與左傳合王符徐廣司馬貞皆以為郤宛子非也韋昭又以為伯州犂子尢誤趙長君又以郤宛即白州犂此時也服䖍曰時言可殺王時也不索何獲服䖍曰不索當何時得也我王嗣也注光呉王諸樊子也故曰我王嗣正義曰呉世家云餘昧之子僚公子光者王諸樊之子公芈云云世本云夷昧及僚夷昧生光服䖍云夷昩生光而廢之僚者夷昩之庶兄夷昩卒僚代立故光曰我王嗣也是用公羊為説也杜言光呉王諸樊子用史記為說也棟案司馬遷採世本為史記然亦有旁采諸國之書不與世本左傳合者今以左傳證之服氏之説是也襄公卅一年傳呉屈狐庸曰若天所啟其抂今嗣君乎有呉國者必此君之子孫實終之注云嗣君謂夷昧則光夷昧之子審矣世本左傳本出一人之手正義以世本多誤不足依馮豈其然乎母老子弱是無若我何正義曰彭仲博云當言是無我若何我母無我當如何我字當在若上案彭注說唐時已亡此當采自服氏解誼王使甲坐於道荀卿子曰庶士介而坐道楊倞曰庶士軍士也介而坐道被甲坐於道側以禦非常鈹交於胷唐石經初刻作匈古文胷以待天命服䖍曰待其天命之終也不足以辱令尹高誘吕覽注曰辱屈辱也吾無以酬之高誘曰酬報也或取一秉秆焉秆說文引作稈或从干邇無極也邇讀為爾燕禮曰公南鄉爾鄉爾大夫鄭注云爾近也移也揖而移之近之也使宰獻而請安注比公于大夫也案管子㓜官篇云三千里之外諸侯世一至置大夫以為延安齊君飲昭公酒故使宰獻而仍用延安之禮非卑公也杜氏以為比公于大夫失之廿八年傳憖使吾君聞勝與臧之死也以為快注憖發語之音棟案憖願也言鈞死耳願使吾君先聞二人之死以為快注言發語音非外傳云吾憖置之於耳以憖御人又云憖庇州犂韋昭皆訓為願大夫稱主今稱君者葢其臣三世仕於祁氏矣詩云不憖遺一老箋云憖者心不欲自彊之辭也釋文云憖尔疋願也彊也且也韓詩云憖誾也憖讀為銀與寧同音又讀為甯古寧甯同字說文寧與甯皆訓為願其母欲取其黨案論衡叔向之母姬姓吾懲舅氏矣列子曰北山愚公懲山北之塞出入之迂注韓詩外傳云懲苦也樂正后夔取之伏生書大傳曰樂正定樂名八伯貢樂九奏具成則自唐虞已有樂正之名尚書不詳耳成鱄曰昔武王克商光有天下其兄弟之國者十有五人姬姓之國者四十人案荀子以為天下立七十一國姬姓獨居五十三人與此異也心能制義曰度服䖍曰心能制事使得其宜言善揆度事也棟案自此至經緯天地曰文皆見周書諡法惟闕曰莫曰君張守節所引諡法云賞慶刑威曰君孔晁注云能行四者徳正應和曰莫注云正其徳應其和徳正應和曰莫服䖍曰抂己為徳施行為正發號施令天下皆應和之言皆莫然無讙譁也昭臨四方曰明服䖍曰豫見安危也教誨不倦曰長服䖍曰教誨人以善不懈倦言善長以道徳也慈和徧服曰順服䖍曰上愛下曰慈和中和也為上而愛下行之以中和天下徧服從而順之擇善而從之曰比服䖍曰比方損益古今之宜而從之經緯天下曰文服䖍曰徳能經緯順從天地之道故曰文閻没韋昭曰閻没閻明不夕食服䖍曰昨顧酒醉故不夕食案二人謂昨不夕食故始饋而恐不足耳杜注不及服氏之分明屬厭而已韋昭曰屬適也厭飽也已止也適小飽足則自節止廿九年傳主君服䖍曰大夫稱主豢龍氏御龍氏賈逵曰豢養也榖食曰豢乃擾畜龍應邵曰擾音柔擾馴也能順養得其嗜慾案玉篇擾當作犪尚書擾而毅徐廣曰擾一作柔字本作犪音柔今人字與音皆失之廣雅曰馴擾也其後有劉累後古文作后服䖍曰后劉累之為諸侯者夏后賜之姓以更豕韋之後史記更作愛夏本紀周禮巾車云嵗時受讀杜子春云受當為更儀禮燕禮及大射儀注皆云古文更為受是更與受古今字也汲郡古文云孔甲元年廢豕韋氏使劉累豢龍魯縣汲郡古文曰孔甲七年劉累遷於魯陽班固曰南陽魯陽縣有魯山古魯縣御龍氏所遷遂濟窮桑服䖍曰濟渡也言四叔子孫世不失職遂渡少暤之世遂賦晉國一鼓鐡以鐵刑鼎服䖍曰鼓量名也曲禮曰獻米者操量鼓取晉國一鼓鐵以鑄之禮記音義隠義曰東海樂浪人呼容十二石者為鼓以量米王肅曰三十斤謂之鈞鈞四謂之石石四謂之鼓與隠義合顧氏云葢用四百八十斤鐵卅一年傳十二月辛亥朔日有食之是夜也趙簡子夢童子臝而轉以歌旦占諸史墨曰吾夢如是今而日食何也對曰六年及此月也呉其入郢乎終亦弗克入郢必以庚辰日月在辰尾庚午之日日始有謫火勝金故弗克服䖍曰是嵗嵗在析木後六年在大梁大梁水宗十一月日在星紀為呉國分楚之先顓頊之子老童童子楚象行歌象楚走哭姬姓日日在星紀星紀之分姬姓呉也楚衰則呉得志呉世世與楚怨楚走去其國故曰呉其入郢呉屬水水數六十月水位故曰六年及此月也有適而食故知呉終亦不克後六年定四年十一月閏餘十七閏在四月後其十一月晦庚辰呉入郢在立冬後復此月也十二月辛亥日㑹月於龍尾而食庚午日初有適故曰庚辰一曰日月在辰尾尾為亡臣是嵗呉始用子胥之謀以代楚故天垂象午火庚金也火當勝金而反有適故為不克晉諸侯之霸與楚同盟趙簡子為執政之卿逺夷將伐同盟日應之食故夢𤼵簡子周禮占夢職以日月星辰占六夢之吉凶鄭注云日月星辰謂日月之行及合辰所在春秋昭三十一年史墨云云此以日月星辰占夢者其術則今八㑹其遺象也鄭志張逸問占夢注云云不知何術占之前問不了前問載鄭志今無考答曰日月在辰尾夏之九月辰在房末有尾星建戌厭寅建戌則辰抂夘前一次故厭寅寅與申對辰與戌對對酒衝也申近庚孝經援神契曰斗指申處暑指庚白露故知申近庚辰與戌對故知庚辰辰下為主人故知為主人翼奉曰辰為客時為主人金侵火故不勝雖不勝即復故云弗克日有適氣時九月節者以庚午在甲子篇辛亥在甲辰篇也古五字書每甲為一篇也中有甲戌甲申甲午成一月也從庚午以下四日從甲辰至辛亥八日并之十二日通同四十二日如是庚午之日當在八月十九日故言時得九月節也言雖不勝即復者以其庚金午火位相連故云雖不勝即復也言雖不勝者呉君臣爭官秦救復至不能定楚是其不勝不能損呉是明即復也問曰何知有此厭對之義乎答曰按堪輿黄帝問天老事云蓻文志堪輿金匱十四卷四月陽建於巳破於亥巳亥為對月建為破隂建於未破於癸是為陽破隂隂破陽故四月有癸亥為隂陽交㑹十月丁巳為隂陽交㑹言未破癸者即是未與丑對而近癸也援神契曰斗指癸小寒指丑大寒故知丑近癸為未所破也交㑹惟有四月十月也若有變異之時十二月皆有建厭對配之義也問曰周之十二月夏之十月夏體正應在析木而云在星紀何答曰據此月中有十一月節析木十月星紀十一月故舉言之成長以為誤也賈公彦曰今八會其遺象者按堪輿大㑹有八小㑹亦有八賈不疏八㑹者賈葢據鄭志唐時堪輿已亡故不詳也案越絶書言太嵗八會淮南天文曰北斗之神有雌雄十一月始建於子月從一辰雄左行雌右行五月合午謀刑十一月合子謀徳太隂所居辰為厭日雄為建雌為厭厭抂日前一次謂之隂建厭日不可以舉百事堪輿徐行雄以音知雌故為竒辰數從甲子始子母相求所合之處為合十日十二辰周六十日凡八合合於嵗前則死亡合於嵗後則無殃即八㑹法也葢六十日之中大合八小合八詳禮說卅二年傳史墨曰不及四十年越其有呉乎越得嵗而呉伐之必受其凶服䖍曰嵗在星紀呉越之分野蔡復之嵗嵗在大㑹距此十九年昭十五年有事於武宫之嵗龍度天門龍嵗星也天門在戌是嵗越過故使今年越得嵗龍東方宿天徳之貴神其所抂之國兵必昌向之以兵則凶呉越同次呉先與兵故凶也或嵗星在越分中故云得嵗史墨知不及四十年越有呉者以其嵗星十二年一周天存亡之數不過三紀三者天地人之數故嵗星三周星紀至𤣥枵哀二十二年越滅呉至此三十八年遲速衰序注衰差也案襄廿九年正義云衰者差也九章算術謂差分為衰分是衰與差通故訓衰為差士冠禮記云以官爵人徳之殺也注云殺猶衰也亦以衰為差定二年傳閽乞肉焉子惠子曰諸侯燕禮賓醉而出必取所薦脯重君賜也以所執脯賜鐘人于門内霤廣君惠也夷射姑私出無脯奪枝敲閽無禮甚矣三年傳閽以缾水沃廷韓非子云損水郎門霤下類溺者之狀有兩肅爽馬子惠子曰當用賈逵注載見正義漢注多舊典遺言杜預盡去之而益以臆說正義所載者千百之十一而已四年經許遷于容城地理志南郡華容縣應邵曰春秋許遷于容城是戰于柏舉高誘吕覽注云柏舉楚鄙邑京相璠曰柏舉漢東地夏有洰水或作舉疑即此也柏二傳皆作伯郭璞穆天子傳注云古伯字多从木傳社稷不動劉炫以社稷動為軍行是也杜注非君以軍行祓社釁鼓案即周禮大祝所謂設軍社也夏后氏之璜高誘曰半圭曰璜夏后氏之珍玉也封父之繁弱鄭康成曰封父國名荀卿子曰繁弱鉅黍古之良弓也繁亦作蕃古字通上林賦云彎繁弱文潁曰蕃弱夏后氏良弓之名備物典筴釋文云本又作册或作笧説文云冊符命也諸侯進受於王也象其札一長一短中有二編之形古文作笧从竹今作䇿从俗命以伯禽當用劉炫説伯禽唐誥百篇不載封伯禽事别見洛誥唐叔有歸禾故皆不載也孔子刪書亦用春秋一書不再書之例管蔡啟商惎閒王室注惎毒也棟案惎當訓為教宣十二年注訓惎為教言管蔡開商叛周之心而教之棄閒以圖王室張衡西京賦云天啟其心人惎之謀與傳意合左傳惎字凡四見宣十二年傳楚人惎之當依說文作卑哀元年傳少康惎澆當訓為毒説文云惎毒也廿七年傳趙襄子惎知伯當訓為忌小尒疋云惎忌也此傳當訓為教小尒疋云惎教也杜唯哀元年注得之餘皆非也無始亂賈逵曰無為亂始還塞大隊直轅冥阨案冥阨九塞之一高誘曰在楚史記蘇秦傳云塞鄳阨徐廣曰鄳江夏鄳縣棟謂鄳阨即冥阨也墨子非攻篇曰呉闔閭次注林出於冥隘之徑隘即阨傳亦作隘戰於柏舉中楚國而朝當子常不從司馬之計濟漢轉戰至於柏舉其時呉已出隘而西楚事不可為矣季芈畀我當用服䖍注申包胥服䖍曰楚大夫王孫包胥封豕長蛇高誘曰封大也豕蛇喻貪也虐始於楚高誘曰虐害也始先也言將以次至秦也五年傳陽虎將以璵璠斂高誘曰璵璠君佩玉也昭公在外平子行君事入宗廟佩璵璠故用之正義曰璵璠是一玉名案説文孔子曰美哉璵璠逺而望之奐若也近而視之瑟若也一則理勝一則孚勝明是兩王正義非也改步改玉周語襄王謂晉文公曰先民有言曰改玉改行韋昭曰玉佩玉所以節行步也君臣尊卑遲速有節案荀子王霸篇云國者世所以新者也是憚憚非變也改王改行也與周語同是玉從古文作王成二年齊侯朝于晉將授玉玉本作王故張平子誤以為尊晉侯為王乃知古文春秋玉字皆作王也公山不狃王符曰公山氏魯公族姬姓奔楚為堂谿氏王符曰堂谿谿名抂西平司馬彪郡國志云汝南呉房有堂谿亭廣韻引作棠古字通藍尹亹涉其帑廣韻引世本云楚大夫涉其帑則亹帑為二人然外傳云載其孥則孥非人名未知世本何據六年經仲孫忌賈逵曰公羊曰仲孫何忌公羊疏云賈經無何字案下經云仲孫忌當無何字傳小惟子吕覽云小帷子陸氏釋文云本又作帷八年傳士皆坐列案坐謂坐作列謂表正行列司馬法云徒以坐固又云行愼行列吾志其目也鄭康成云志意所擬度也商書曰若射之有志主人焚衝高誘淮南子注曰衝車大鐡著其轅端馬被甲車被兵所以衝於敵城也或濡馬褐以救之注馬褐馬衣高誘淮南子注曰褐毛布如今之馬衣捘衛侯之手及捥說文云捘推也捥唐石經初刻从定本後作腕腕俗字也經傳皆作掔郊祀志云海上燕齊之間莫不搤掔游俠傳云搤掔而游談師古曰掔古手腕字說文曰掔手掔也从手臥聲今傳作捥者儀禮士喪禮云設決麗于掔今作掔字之誤鄭康成注云古文掔作捥史記樊於期偏祖搤捥索隠曰捥古腕字史記多古文今人知者鮮矣高誘吕覽注云掔讀如棬椀之椀戒都車案戒讀為駴鄭康成云疾雷擊鼓曰駴易歸藏曰君子戒車小人戒徒林楚怒馬高誘曰怒讀如强弩之弩方言曰弩猶怒也匡謬正俗曰怒字古讀有二音今山東河北人讀書但知怒有去聲不言本有二讀曾不尋究失其真矣子言辨舍爵辨古文徧陽虎入于讙陽闗以叛讙應劭引作酄云今泰山鉅平縣陽闗亭是也九年傳兹陽貨所欲傾覆也韓非子載其語曰陽虎有寵於季氏而欲伐季孫貪其家也今君富於季而齊大於魯陽貨所以盡詐也載蔥靈賈逵云蔥靈衣車也尚書大傳云未命為士不得有飛軨鄭康成注云如今窻車也軨與靈古字通趙氏其世有亂乎此語非實事春秋後事左氏不及知故云然案韓非子曰陽貨逐於魯疑於齊走而之趙趙簡主迎而相之左右曰虎善竊人國政何故相也簡主曰陽貨務取之我務守之遂執術而御之陽貨不敢為非以善事簡主興主之强幾至於霸也吾從子如驂之靳毛詩小戎云游環脅驅傳云游環靳環也沈重曰靳者言無常處游在驂馬背上以驂馬外輿貫之以止驂之出猛葢言靳所以輔驂非相違也而相從也何仇難之有龜焦焦說文引作云龜不兆讀若焦哀二年龜同晳幘傅遜曰晳白晳幘以巾髪卑賤所服此説非也古者有冠無幘秦漢以來始有其制此傳幘字説文引作䶦云齒相值也故杜訓從之古省或以幘為䶦衣貍製注製裘也子惠子曰說苑呉赤市使於智氏假道於衞甯文子具紵絺三百製將以送之左傳貍製注云裘此云紵絺非裘也乃衣耳裘名為製不見經傳疑杜注誤棟案傳曰貍製故注云裘謂貍裘也哀廿七年陳成子救鄭及濮雨成子衣製杖戈注云製雨衣也杜皆望文為義然以製為裘似有脱文十年經鄆讙龜隂田服䖍曰三田汶陽田也龜山名隂之田得其田不得其山也傳步左右皆至劉熙曰徐行曰步步捕也如有所伺捕務安詳也叔孫氏之甲有物注物識也周禮閽人職云潛服賊器不入宫注云賊器盜賊之任器兵物皆有刻識棟案刻識之語出于漢時梁冀傳云刻其毛以為識是也十二年傳登武子之臺酈元曰曲阜上有季氏宅宅有武子臺王肅曰季孫宿所築十三年傳歸告其父兄服䖍曰午之諸父兄及邯鄲中長老戍也驕注戍文子之子世本曰衛獻公生成子當當生文子㧞傳作發㧞生朱為公叔氏鄭康成云朱春秋作戌十四年傳使死士戰國䇿蘇秦曰厚養死士高誘曰死士勇戰之士也先鄭司農曰死士欲以死報恩者大公六韜曰有貧窮忿怒欲快其志者聚為一卒名曰必死之士賈景伯以死士為死罪人非也哀元年傳如子西之素案功命日謂之素宣十一年令尹蒍艾獵城圻三旬而成不愆于素是也蔡人男女以辨辨讀曰班徐廣史記註曰辨音班漢書王莽傳辨社諸侯義作班襄廿五年傳云男女以班賂晉侯劉炫曰哀元年蔡人男女以辨與此同士虞禮曰明日以其班祔鄭康成云古文班或為辨是辨為古文班也敗越于夫椒賈逵曰夫椒越地杜氏云夫椒呉縣西南大湖中椒山司馬貞曰賈説得之杜以為大湖椒山非戰所夫椒與椒不得一且夫差以報越為志又伐越當抂越地何乃不離呉境近抂大湖中又案越語云敗五湖也大夫種高誘曰大夫種姓文字㑹楚鄞人樹徳莫如滋去疾莫如盡戰國䇿引書曰樹徳莫如滋除害莫如盡今在大誓與此異滅夏后相汲郡古文曰帝相九年居於斟灌廿六年寒浞使其子澆帥師滅斟灌廿八年寒浞使其子澆弑帝公羊傳云君死于位曰滅生少康焉服䖍曰后緍遺腹子而邑諸綸司馬彪郡國志曰梁國虞縣有綸城少康邑以收夏衆撫其官職服䖍曰因此基業稍收取夏遺民餘衆撫修夏之故官憲典祀夏配天不失舊物服䖍曰以鯀配天也物職也注猶言天與不取漢書蕭何曰書云天與不取反受其咎欲與楚者右此與絳侯右祖意同懷公意欲從呉故使與楚者右在軍孰食者分而後敢食案劉向説苑載此事云在軍食孰者半而後食故服䖍注云以其半分軍士而後自食其餘若簞醪注流也公羊傳曰師喪分焉分亦訓平杜訓為徧古訓之亡自杜始二年傳郢不足以辱社稷服䖍曰郢自謂己無徳不足立以汚辱社稷八人衰絰偽自衛逆者服䖍曰衰絰為若從衞來迎太子也較杜注為明上大夫受縣下大夫受郡周書作雒曰國方千里分以百縣縣有四郡郡有四鄙高誘曰周制天子地方千里分為百縣縣有四郡郡有四鄙故言上大夫受縣下大夫受郡周時縣大郡小秦始皇兼天下初置三十六郡以監縣耳志父注志父趙簡子之一名也杜意言趙鞅一名志父今俗本作改名誤桐棺三寸不設屬辟荀卿子曰罪人之𦵏棺椁三寸衣衾三領不得飾棺鄭𤣥引此傳作屬椑樸馬荀卿子云若馭樸馬楊倞曰未調習之馬羅無勇麋之廣韻引作八年傳云及潞麋之注云麋亦束縛疑麇麋字通無折骨無面傷鄭仲師引云無破骨無面夷案外傳晉惠公韓之誓曰將止無面夷死此求勝之辭故云無面夷大命不敢請晉語曰死不敢請韋昭曰言不敢請歸之神也三年傳鬱攸從之尒疋曰鬱氣也攸所也火氣出之所也襄九年傳云奔火所杜注欠分明命藏象魏曰舊章不可忘也服䖍曰象闕也法令縣之朝謂其書為象魏案象魏六官所縣之象如治政教刑之類繪為圖象唐虞所謂畫象是也此說本程大昌棟案風俗通云光武中興以來五曹詔書題鄉亭璧嵗補正多有闕謬永建中兖州刺史過翔箋撰卷别改著版上一勞而久逸漢之五曹猶周之六官又漢時教令皆奏可施行尚書掌之故謂之五曹詔書亦見應劭傳拾瀋注瀋汁也釋名曰宋魯人皆謂汁為瀋高誘引作瀋四年傳諸大夫恐其又遷也承注承音懲葢楚言正義曰懲創往年之遷也棟謂承讀為懲經傳無文詩魯頌曰戎狄是應荆荼是懲則莫我敢承毛傳曰承止也傳言承者謂諸大夫皆欲止之也五年傳范氏之臣王生惡張栁朔墨子所染篇云范吉射染於長栁朔王王即王孫也古張字省作長見楚相孫叔敖碑此古文也齊燕姬服䖍曰燕姬齊景公之嫡夫人昭七年燕人所歸諸子鬻姒之子服䖍曰諸子諸公子鬻姒景公妾淳于人所納案諸子内官傳氏遜據管子辨正杜沿服氏之譌耳淳于人所納未詳所出諸大夫恐其為子也言於公曰君之齒長矣未有太子若之何服䖍曰為子為太子也荼少故恐立之言君長未有太子一旦不諱當若之何欲齊侯早立長也案今本為子作為太子疑後人所增杜無注或杜所増也二三子閒於憂虞則有疾疢亦姑謀樂何憂於無君服䖍曰言二三子當國家閒暇無憂虞恐疾疹在其間今無疹疾何為不自謀樂何憂無君乎寘羣公子於萊服䖍曰寘置萊齊東鄙邑欲使逺齊萊人歌之曰景公死乎不與埋三軍之事乎不與謀師乎師乎何黨之乎服䖍曰萊人見五公子逺遷鄙邑不得與景公𦵏埋之事及國三軍之謀故愍而歌師衆也黨所也言公子徒衆何所適也六年傳楚子使問諸周太史服䖍曰諸侯皆有太史主周所賜典籍故曰周太史一曰是時往問周大史棟案楚靈王言齊衞晉魯皆有分而楚獨無有則楚不當有周所賜典藉葢自王子朝奉周之典藉以奔楚是時當有掌典藉之太史從子朝奔楚楚子在外而使問周太史也三代命祀祭不越望服䖍曰謂所受王命祀其國中山川為望冀方高誘淮南子注曰冀九州中謂今四海之内糓梁傳曰鄭同姓之國也在乎冀州詳顧炎武日知録闞止案吕覽以闞止為宰予高誘曰宰予字子我史記亦言宰我與田常作亂皆秦漢人相傳之語未必然也以安孺子如賴古今人表作晏孺子晏與安古文通今文尚書欽眀文塞晏晏今尚書文思安安司馬彪曰濟南管縣有賴亭君大訪於陳子而圖其小子惠子曰必欲殺孺子而先以政授陳子此齊之所以亡也一言喪邦朱毛之謂七年傳執玉帛者萬國今其存者無數十焉戰國䇿顔斶曰大禹之時諸侯萬國及湯之時諸侯三千今乃二十四邾茅夷鴻以束帛椉韋自請救於呉告請者無庭實此云椉韋者賈公彦曰求救非法故有椉韋為庭實也社宫鄭衆曰社宫中有室屋者乃背晉而奸宋賈逵曰以小加大八年傳所託也則隱所託也者謂所寄託之國則隱者隱本國之惡也杜注不明魯雖無與立必有與斃國於天地必有與立魯無與立言弱也必有與斃言公賓庚之屬拘鄫人之漚菅者鄭康成注考工記引作渥菅釋文渥烏豆反與漚同是渥為古文漚也何故使吾水滋說文引作兹云黒也釋文云本又作兹景伯負載鄭𤣥詩箋云載猶戴也謂負戴器物劉光伯說是也栫之以棘説文曰以柴木壅也从木存聲本又作存釋文作薦音在薦反非也遂殺之悼公弱安能殺鮑子必陳乞之謀也陳乞所畏者鮑高國耳乞既除高國所畏者鮑氏耳故希公意并除之而後行簒弑以并齊耳有馬千乘之言亦乞所搆十年傳呉子三日哭于軍門之外服䖍曰諸侯相臨之禮十一年傳黨氏之溝黨氏魯大夫猶云子駒之門也注有子冉求也正誤曰論語冉求稱冉子有若稱有子冉求字有亦稱冉有二者必有一誤春秋權衡曰案有子當為子有子有者冉求字也仲尼門人字多云字某者不得云有子也傳冩誤之矣見保者而泣王肅曰保縣邑小城也案晉語尹鐸曰抑為保障乎韋昭曰小城曰保禮記曰遇入保者後世作堡壤地同而有欲於我吕覽載子胥語曰夫呉之與越接土鄰境壤交通屬習俗同言語通我得其地能處之得其民能使之越于我亦然故云有欲於我得志於齊猶獲石田也無所用之吕覽載子胥語曰夫齊之與呉也習俗不同言語不通我得其地不能處得其民不得使故謂之石田也鳥則擇木服䖍曰鳥喻己木以喻所之國如是則以丘亦足矣丘賦作於前故云以丘亦足矣十二年傳呉人藩衛侯之舍注藩離案杜注非也藩藩盾扶胥之屬名為宿衛實因之也效夷言觀此則春秋時已重呉音矣不始于晉也十三年傳為二隧注隧道也軍法司空治軍隧道義見淮南子彌庸見姑蔑之旗墨子旗識篇曰建旗其署令皆明知之曰某子旗十四年經齊陳恒執其君寘于舒州史記齊世家云田常執簡公于俆州司馬貞曰俆字从人說文作䣄竝音舒續漢志云薛本國六國時曰徐州戰國䇿齊一篇曰楚成王戰勝于徐州高誘曰徐州或作舒州是時屬齊棟案徐舒古字通易困之九四曰來徐徐子夏傳作荼荼先鄭考工注云荼讀為舒舒徐也荼本古舒字是徐與舒同説文䣄讀若塗易釋文云荼音圖然則舒亦有塗音歟非也司馬貞得之傳諸御鞅世本曰陳桓子産子亹亹産子獻獻産鞅司馬貞曰鞅為僕御之官故曰御鞅子行舍於公宫服䖍曰止于公官為陳氏作内閒也成子兄弟四椉如公服䖍曰成子兄弟八人二人共一椉杜氏云成子之兄弟昭子莊簡子齒宣子夷穆子安廩丘子意兹芒子盈惠子得凡八人二人共一椉司馬貞案世本曰東僖子乞産成子常簡子齒宣子其夷穆子安廩丘子尚毉意與毉通兹子芒盈惠子得凡七人杜預又取昭子莊以充八人之數案世本昭子將來是桓子之子成子之叔父又不名莊强相証㑹言四椉有八人耳今按田完世家田常兄弟四人如公宫與此事同今此惟稱四椉不言人數知四椉謂兄弟四人椉車而入非二人共車也然其昆弟三人不見者葢時或不在不同入公官不可强以四椉為八人添叔父為兄弟之數服杜殊失之正義引世本云僖子生昭子莊云云豈亦因杜注而附㑹之歟太史子餘子餘陳氏黨侍人御之服䖍曰閹豎以兵御陳氏何以見魯衛之士服䖍曰子方將欲奔魯衛也公文氏攻之王符曰衛之公族有公文氏十五年傳寡君是以寒心高誘戰國䇿注曰寒心懼也二人䝉衣而椉服䖍曰䝉衣為婦人之服巾䝉其頭而共椉也孔氏之老欒寧問之服䖍曰家臣稱老問其姓名遂入適伯姬氏服䖍曰入孔氏家適伯姬所居孔伯姬杖戈而先服䖍曰先至孔悝所遂刼以登台服䖍曰於衛台上召衛羣臣使告季子子路二十字也季子五十字召獲駕椉車服䖍曰駕椉車不駕兵車也言無距父之意也行爵食炙王充曰車行酒騎行炙案古人皆以車騎行酒肉嘯堂集古録載周叔邦父簠云叔邦父作簠用征用行用従君王又叔夜鼎云叔夜釁其饋鼎以征以行用饘用羮知古人有行爵食炙之事故西都賦云陳經騎以行炰騰酒車而斟酌馬融廣成頌云清醪車湊燔炙騎將行爵食炙而行示無懼也正義以為此句顛倒辭氣不允葢未通於古奉衛侯輒來奔服䖍曰召獲奉衛侯弗及不踐其難賈逵曰言家臣憂不及國不得踐履其難鄭衆曰是時輒已出不及事不當踐其難子羔言不及以為季路欲死難也無入為也服䖍曰言輒已出無為復入必或繼之王肅曰必有繼續其後攻大子十六年傳旻天不淑不憖遺一老俾屏余一人以在位應邵曰憖且詞也言旻天不善於魯不且遺一老使羣蔽我一人也鄭𤣥所引與此同今不淑作不弔憖作憗王肅曰屏輔也㷀㷀余在疚鄭康成許叔重引此傳皆作嬛嬛嗚呼哀哉尼父鄭𤣥曰尼父因目字以為之諡孔氏駁之案字諡見糓梁非康成臆說以字為諡左傳有眀文孔氏之駁未為得也使貳車反祏於西圃魯語曰天子有虎賁習武訓也諸侯有旅賁禦災害也大夫有貳車備承事也士有陪椉告奔走也許叔重五經異義曰或曰卿大夫有主不答曰卿大夫非有土之君不得祫享昭穆故無主古春秋左氏傳曰衞孔悝反祏於西圃祏石主也言大夫以石為主謹案大夫以石為主禮無明文大夫士無昭穆不得有主今山陽民俗有石主𤣥之聞也以上鄭氏駁少牢饋食大夫祭禮也束帛依神特牲饋食士祭禮也結茅為菆主者神象也孝子既𦵏心無所依以虞而立主以事之唯天子諸侯有主卿大夫無主尊卑之差也卿大夫無主者依神以几筵故少牢之祭但有尸無主三王之代小祥以前主用桑者始死尚質故不相變既練易之遂藏於廟以為祭主孔悝祐主者祭其所出之君為之主耳以上皆鄭氏説鄭志張逸問許氏異義駁衞孔悝之反祏有主者何謂也答云禮大夫無主而孔獨有者或時末代之君賜之使祀其所出之君者諸侯不祀天而魯郊諸侯不祖天子而鄭祖厲王皆時君之賜也正義曰以為孔氏姞姓仕於衛已歴多世不知本出何國安得有所出公之主知是僭為之此說非也管子山至篇曰君人之主弟兄三世則昭穆同祖十世則為祏三世則同祀所出之公故不立主十世為祏所以别于宗也案世本莊叔達至孔悝凡七世上歴三世當在春秋之前至孔叔時合為祏主春秋以來兼國多矣未必皆書于經何得以所出之公無考而遂謂之僭耶鄭氏之言不為無本若以舊章放失追議先儒恐違闕疑之義昭十九年傳云懼隊宗主服䖍云祏主藏于宗廟故曰宗主市南有熊宜僚高誘曰熊宜僚勇士居楚市南請以戰備獻子惠子曰戰備猶家備備甲兵也齊管修風俗通曰管修自齊適楚為隂大夫高府淮南子曰闔閭伐楚五戰入郢燒高府之粟葢宫中府名圉公陽史記曰惠王從者屈固其徒微之説文曰微隱行也十七年傳戎州司馬貞曰陳留濟陽縣東南有戎城濟陽與衛相近故莊公登台望見戎州又隠七年云戎伐凡伯于楚邱是戎近衛酁般説文曰酁宋地也讀若讒疑殷采邑十八年傳宋殺皇瑗汲郡古文曰敬王四十三年宋殺其大夫皇瑗于丹水之上丹水雍不流廿年傳呉公子慶忌高誘曰慶忌呉王僚之子又淮南子注云呉王僚之弟子史黯高誘曰史黯史墨也廿一年傳使我高蹈吕覽曰子胥高蹶高誘曰蹶蹈也傳曰魯人之高使我高蹈瞋怒兒高與皋通見釋名廿二年傳甬東賈逵曰甬東越東鄙甬江東也廿三年傳其可以稱旌繁乎繁説文引作緐云馬髦飾也廿五年傳褚師聲子韈而登席注古者見君解韤東昌彭氏軏以為古無見君解韤之禮棟案燕禮云賓反入及卿大夫皆說屨升就席鄭志云凡燕坐必説屨屨不在堂也蕭山毛氏甡以為脱屨非解韤也棟又案少儀云凡祭於室中堂上無跣燕則有之鄭志云祭不跣者主敬也燕則有跣為歡也毛甡曰燕飲君但脱屨而臣必解韤記曰燕則有跣跣者解韤也閻百詩曰陳氏禮書謂漢魏以後朝祭皆跣韤又謂梁天監問尚書奏議案禮跣韤事由燕坐今極恭之所莫不皆跣清廟崇嚴既絶常禮凡有履行者應皆跣韤葢是時有不跣韤者故議者及之杜氏謂見君解韤見君字不確須易為古者燕飲解韤耳棟又案宣二年左傳云晉侯飲趙盾酒其右提彌明趨登曰臣侍君宴過三爵非禮也遂扶而下服䖍本作遂跣以下注云趙盾徒跣而下走此本書燕飲解韤之明文也左傳古本盡為杜預所改故學者毎有疑義莫能詳焉君將㱿之説文引作嗀云歐兒从口㱿聲玉篇同案釋文作嗀與説文合與石經異釋文是也君何所不逞欲説文引云何所不逞云楚人謂疾行為逞廿六年傳后庸唐石經作舌庸廿七年傳同呉語亦作舌庸掘褚師定子之墓掘玉篇引作搰云掘也釋文云本或作搰戰國䇿禽滑厘古今人表作禽屈厘公遊于空澤酈元曰獲水東南逕空桐澤北澤在虞城東南左傳公遊于空澤即此然則空澤者空桐之澤也今君無疾而死汲冢古文瑣語曰初刑史子臣謂宋景公曰從今以徃五祀日臣死後五年五月丁亥呉亡後五祀八月辛巳君薨刑史子臣至死日朝見景公夕而死後呉亡景公懼思刑史子臣之言將死日乃逃於𤓰圃遂死焉求得已蠱矣使祝為載書周禮詛祝作盟詛之載辭廿七年傳設椉車兩馬服䖍曰一曰兩飾及留舒鄭康成引作栁舒孔氏曰留栁不同葢所據書異棟案裴松之三國志注云古劉留聊栁同用卯字以从聲故也律厯志云留孰於夘吾乃今知所以亡子惠子曰恨其語不審惠定宇先生左傳補註六卷向在京師假閲未及録乾隆壬辰冬厯城周書昌寄副至羊城乃戴東原先生手挍本予覆挍其半將歸潮陽以付順徳胡先生常刻之明年癸巳三月胡生書至云刻未竣而病久之始知其是月已死其冬予再至羊城屬順徳張君錦芳蕆其事而胡生不及見矣胡能詩古文精六書予辛夘分挍鄉試所得士㑹試報罷與東原同舟行月餘慕其學歸益鑽研經義豁然有心得而天弗假以年惜哉甲午二月益都李文薻記春秋左傳補註卷六
