body:
  text: 左傳補注春秋類提要臣等謹按左傳補注六卷國朝惠棟撰棟有周易述已覺録是書皆援引舊訓以補杜預左傳集解之遺本所作九經古義之一以先出别行故九經古義刋本虛列其目而無書目作四卷此本實六卷則後又有所增益也其中最典確者如隱五年則公不射引周禮射人祭祀則贊射牲司弓矢供射牲之弓矢及國語倚相之言證旁引射蛟之誤案此朱子之説非杜注也蓋因補杜而類及之莊公十四年繩息媯引吕覽周公作詩以繩文王之德表記鄭注譽繩也證杜注訓譽之由二十八年臧孫辰告糴于齊禮也引周書糴匡篇年儉榖不足君親巡方卿告糴證為古禮僖五年虞不臘矣引太平御覽舊注及風俗通月令章句證臘不始秦十年七輿大夫引王肅詩傳證七當作王二十二年大司馬固諫曰引晉語公子過宋與司馬公孫固相善證固為人名二十七年夏書曰引墨子明鬼篇證尚書但有夏書商書周書本無虞書文十八年在九刑不忘引周書嘗麥解證為刑書九篇宣二年以視於朝引毛詩鹿鳴箋儀禮士昏禮注證視為正字郭忠恕作示為誤三年不逢不若引郭璞爾雅注作禁禦不若證以社注逢字在下文知今本訛寫六年以盈其貫引韓非子以我滿貫證貫字成十六年徹七札焉引吕覽愛士篇證鄭康成一甲七札之説襄二十三年娶于鑄引樂記鄭注證鑄即祝國又踞轉而鼓琴引許慎淮南子注證轉即軫二十五年慎始而敬終以不困引周書常訓解證不出古文蔡仲之命二十七年崔杼生成及強而寡引墨子辭過篇證無妻曰寡昭元年具五獻之籩豆於幕下引禮記正義證杜注五獻之誤十五年一嵗而有三年之喪二引墨子公孟非儒二篇證妻喪三年為春秋末造之禮十六年鑋而乘于他車引説文證􅚢誤作鑋二十五年襪而登席引少儀證燕必解襪皆根據昭然不同臆揣至文二年廢六關引公羊傳注證廢訓置則是又引韋昭國語注證置訓廢則非蓋置有二義一為建置之置公羊注所言是也一為棄置之置國語注所言是也此猶亂可訓治而亂離瘼矣不可訓治臭可訓香而逐臭之夫不可訓香古之設關在譏而不在征臧文仲廢六關以博寬大之譽而使姦究莫詰隂以厲民故誅其心而謂之不仁棟但執反覆旁通之義殊為偏駁又文十四年其處者為劉氏孔穎達疏明言漢儒加此一句則為劉氏無疑而必謂原作留字漢儒改為卯金刀宣二年文馬百駟當以邱光庭兼明書所辨為是而必引説文畫馬之訓成十七年澤門之晳謂古臯澤字通又謂諸侯有臯門其説固是然邑中澤門各指所居臯門非所居之地也二十一年公姑姊既謂注疏皆非斷為同宗之女然于姑可解于姊終無解也二十五年執簡而往引服虔説一簡八字證太史書崔杼事亦八字殊嫌牽合三十年亥有二首六身即指為孟子之亥唐尤為附會昭七年余敢忘髙圉亞圉引竹書紀年補杜預之闕不知汲郡古文預所目睹預既不引知原書必無此文未可以後來偽本證其疏漏案書中屢引竹書紀年蓋未及詳考今本之偽至于二十五年鄭翩願為鸛引陸佃埤雅之雜説案鸛井出酉陽雜爼非始于佃哀六年無疾而死引汲冡瑣語之野談十二年效夷言謂春秋時已重吳音不始于晉更非注經之體矣他如公即位之位必欲從古經作立屢豐年之屢必欲從説文作亦皆徒駴耳目不可施行蓋其長在博其短亦在于嗜博其長在古其短亦在于泥古也乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
