body:
  text: 春秋左傳補註卷五元和惠棟撰昭四年傳冀之北土馬之所生盧毓冀州論曰冀州北接燕代初學記後世謂代為馬郡故吕覽曰馬郡宜馬以亨神人注亨通也亨古文享字杜訓為通故古文獨存新序載此事作享冬無愆陽周書時訓曰草木不黄落是為愆陽秋無苦雨服䖍曰害物之雨民所苦夏啟有鈞臺之享汲郡古文曰夏啟元年帝即位于夏邑大饗諸侯于鈞臺歸蔵啟筮曰昔夏后啟筮亨神于大陵而上鈞臺枚占皋陶曰不吉連山易曰啟筮亨神于大陵之上酈元曰即鈞臺也魏大饗碑云夏啟均臺之亨均古鈞字亨古享字商湯有景亳之命汲郡古文云帝癸二十八年昆吾氏伐商商㑹諸侯于景亳遂征韋商師取韋遂征顧成有岐陽之蒐汲郡古文曰成王六年大蒐于岐陽晉語云昔成王盟諸侯于岐陽楚為荆蠻置茅蕝設望表與鮮牟守燎故不與盟康有酆宫之朝汲郡古文曰康王元年朝于豐宫服䖍曰酆宫成王廟所在也穆有塗山之㑹汲郡古文曰穆王三十九年㑹諸侯于塗山寡君将墮幣焉服䖍曰墮輸也子恵子曰墮幣謂祭也周禮肆師大祀用玉帛又守祧蔵墮大祝墮釁小祝賛墮特牲少牢又有墮祭然則禮神之幣亦曰墮謂祭後乃相見故曰敢謝後見如服杜解則與上文宗祧之事不相連屬而文亦不順葢楚之武城有先君之廟也服云将受宋之幣于宗廟謂薦陳之亦可備一説夏桀為仍之㑹有緡叛之汲郡古文曰帝癸十一年㑹諸侯于仍有緡氏逃歸遂滅有緡商紂為黎之蒐東夷叛之汲郡古文曰帝辛四年大蒐于黎韓非子曰紂為黎丘之蒐而戎狄叛之服䖍曰黎為子姓周幽為大室之盟戎狄叛之汲郡古文曰幽王十年春王及諸侯盟于大室明年申人繪人及犬戎入宗周弑王無或如齊慶封弑其君弱其孤以盟其大夫吕氏春秋載此事曰母或如齊慶封弑其君弱其孤以亡其大夫弱其孤謂弑崔成崔彊亡其大夫謂崔杼强而死哀六年傳云不必亡一大夫左氏傳世既久或先秦以來所據本異當以吕覽為正鄭子産作丘賦服䖍曰作丘賦者賦此一丘之田出一馬三牛復古法耳丘賦之法不行久矣今子産復脩古法民以為貪故謗之子恵子曰春秋作丘賦當久服説作丘甲當久穀梁説下引詩禮義不愆何恤于人言若依杜注加賦病民何不愆之有服注是也詩曰禮義不愆何恤于人言荀卿子載是詩云長夜漫兮永思騫兮大古之不慢兮禮義之不愆兮何恤人之言兮愆當作諐久籀文見尒疋疏作法于涼注涼薄也説文曰尒疋􅮓薄也从旡京聲廣雅曰􅮓禣也曹憲曰良音世人作􅮓禣之􅮓水旁著京失之矣䙏即薄字郭忠恕汗簡云古尔疋涼作􅮓姬在列者注在列國案列位也言姬姓之君僖十五年傳云入而未定列八棘櫟麻酈元曰汝水東逕櫟亭北春秋之棘櫟也今城抂新蔡故城西北半淪水杜預以為抂東北未詳司馬貞曰解者以麻即襄城縣故麻城是也曰唯皇侃禮記義疏曰唯謂人應爾是也饗大夫以落之服䖍曰釁以豭豕為落牛謂叔孫見仲而何正義曰牛謂叔孫曰以仲見君何問何故以仲見君其説非是案韓非子載此事云豎牛謂叔孫何不見壬于君乎叔孫曰孺子何足見也豎牛曰壬固已數見于君矣君賜之玉環已佩之矣玩傳義與韓非合夫子疾病不欲見人秦越人難經五十一難曰病有欲見人者有不欲見人者欲見人者病在府也不欲見人者病在蔵也府者陽也陽病者欲得寒之又欲見人蔵者隂也隂病欲得温又欲閉户獨處惡聞人聲牛弗進則置虗命徹張衡集舊注引傳云牛不進叔孫覆器空而選之示君已食葢增益傳文而為之或本左氏舊説意亦與杜注同也五年傳毁中軍于施氏成諸臧氏棟案臧氏為司寇古者兵獄同制故質成于臧氏葬鮮者自西門列子曰越東有輒木之國其長子生則鮮而食之張湛注引此為證云鮮謂鮮少也卿喪自朝注從生存朝覲之正路服䖍云言卿葬三辭于朝從朝出正門卿佐國之楨幹君之股肱必過于朝重之也案杜臆説當从服氏既葬而行注善杜洩能辟禍唐宰相世系曰杜洩避季子之難奔于楚生大夫綽綽生段段生赫赫為秦大将軍食采于南陽衍世稱為杜衍使亂大從注使從于亂服䖍曰使亂大和順之道案從順也服注是故有十時亦當十位古言時皆謂四時此十時謂分一日為十時以當王至臺之十位杜注用十二時與傳不合十時據日十二時據辰明而未融服䖍曰融髙也謂日髙也純離為牛荀九家序卦曰離為牡牛莵氏酈元曰野兎水上承兎氏亭北野兎陂鄭地也陂水東北入八里溝溝水南逕右倉城西又南逕兎氏亭東鄭伯勞屈生于兔氏即此子家羈注羈莊公𤣥孫懿伯也司馬貞曰子家駒魯大夫仲孫氏之族字懿伯楊倞曰子家羈公子慶之孫歸父之後名羈字駒案仲孫氏出自桓且懿伯為子家諡非字也司馬失之世本云述産子家歸父述與遂古字通楊氏謂羈為歸父之後則是桓公𤣥孫非莊公也世本已亡無可是正索氏索音栅故水經或作柵朝聘有珪案説文珪古文圭羊舌四族注四族銅鞮伯華叔魚叔虎兄弟四人案世本叔向兄弟有季夙故服氏數伯華叔向叔魚季夙正義以季夙即叔虎非也叔季兄弟之次且叔虎已死不得與四族之數劉氏以為别有季夙而規杜氏其言是也宰相世系曰羊舌職五子赤肸鮒虎季夙赤字伯華肸字叔向鮒字叔魚虎字叔罷號羊舌四族揚肸漢名臣奏載張衡説云晉大夫食采于揚為揚氏食我有罪而揚氏滅揚字从手不从木宰相世系曰晉公族食邑于羊舌凡三縣一曰銅鞮二曰揚氏三曰平陽六年傳昔先王議事以制不為刑辟李竒曰先議其犯事議定然後乃㫁其罪不為一成之刑著于鼎也聳之以行漢書引此傳作𢥠晉灼曰古悚字裴光遠集綴亦以𢥠為悚見汗簡案十九年傳云駟氏聳説文引作𢥠云懼也从心雙省聲説文耳部云生而聾曰聳从耳從省聲不得為懼因驗左氏古文為後人竄易者多矣商有亂政而作湯刑汲郡古文曰祖甲二十四年重作湯刑外傳云元王勤商十有四世帝甲亂之七世而隕祖甲賢君事見尚書止以改作湯刑故云亂之吕氏春秋孝行覽云商書曰刑三百罪莫大于不孝髙誘曰商湯所制法也荀子正名篇云刑名從商康誥云殷罰有倫葢自祖甲以後刑始頗矣周有亂政而作九刑注周之衰亦謂之刑書謂之九刑案九刑者刑書有九篇成王時所造見周書周衰重作之定為成科亦若祖甲之作湯刑也火未出而作火以鑄刑器蔵争辟焉火如漢書作而象之不火何為古春秋左氏説曰火星出于周五月而鄭以三月作火鑄鼎刻刑辟書以為民約是為刑器争辟故火星出于五行之火争明為災其象然也服氏解誼从其說棟案漢書五行志許叔重五經異義所載左氏説及古春秋左氏說皆前漢諸儒傳左氏者之言唐人正義以為賈逵非也顧君補正亦采五行志數條而不言左氏説没其義矣寡君以為驩也左氏懽字皆作驩此古文之異者髙誘戰國䇿注云懽猶合也見于左師子恵子曰向戍與寺人比而害太子華亥與寺人比而逐右師戍亥黨寺人則同而戍之罪浮于亥也戍不思前事而責亥此目睫之論耳其後元公并逐華向有以哉以其椉鄭氏引作良馬八匹私面鄭康成曰面亦見也其謂之面威儀質也又云私面私覿也主不慁賔鄭康成曰慁猶辱也杜訓為患从小尔疋七年傳天子經畧劉逵曰天子經畧土地定城國制諸侯略分畍也一曰遠界為經畧也願與諸侯落之庾蔚之禮記略解曰落謂與賔客燕㑹以酒食澆落之日月以冀案索隠冀亦作㡬讀曰冀使長鬣者相注鬣須也說文引作儠云長壯儠儠也子恵子曰杜訓鬣為須亦臆説正義汲冡書瑣語案御覽備引汲冡瑣語乃共工事非鯀也張叔皮論張姓叔名叔曽作反論引見御覽作皮誤也傳余敢忘髙圉亞圉注二圉周之先也為殷諸侯亦受殷王追命者正義曰二圉之受殷命無文也子恵子曰二圉受命見竹書紀年棟案杜氏此注葢本汲郡古文外傳云髙圉大王能帥稷者也周人報焉故服䖍注此傳云周人不毁其廟報祭之馬融曰周人所報而不立廟杜氏以經傳無報亞圉之文故異説孟僖子病不能禮今本禮上有相字下云苟能禮者從之則相字衍葢襲上文相儀之誤當从釋文聖人有明徳者若不當世王肅曰武仲謂弗父何殷湯之後而不繼世為宋君或憔悴事國漢書引此傳作盡顇與詩同如淳曰顇古悴字何謂六物對曰嵗時日月星辰是謂也服䖍曰嵗星之神左行于地十二嵗而一周時四時也日十日也月十二月也星二十八宿也辰十二辰也是為六物八年傳或馮焉子恵子曰漢書引云神或馮焉案注當有神字莫保其性宋淳化元年本保作信案漢書五行志引此傳亦作信顔籀曰信猶保也戰國䇿甘茂曰以曾子之賢與母之信也而三人疑之則慈母不能信也髙誘曰信猶保也商衛子恵子曰宋衛稱商衛踊為定公諱也昭公事當紀于定公時也寘徳于遂世本曰陳舜後宋忠曰虞思之後箕伯直柄中衰殷湯封遂于陳以祀舜自幕至于瞽瞍無違命賈逵曰幕舜後虞思也至于瞽瞍無聞違天命以廢絶鄭衆曰幕舜之先也裴駰从賈侍中説杜用先鄭説九年傳以夷濮西田益之京相璠曰以夷之濮西田益也暴蔑宗周唐石經及宋本皆如此俗本蔑作滅非辰在子夘謂之疾日賈逵曰桀以乙夘亡紂以甲子喪惡以為戒張晏曰云夏殷以亡不推湯武以興此說非也翼奉曰北方好行貪狼申子主之東方怒行隂賊亥夘主之貪狼必待隂賊而後動隂賊必待貪狼而後用二隂竝行是以王者忌子夘也禮經避之春秋諱焉孟康曰北方水水生于申盛于子東方木木生于亥盛于夘李竒曰北方夘也夘又隂賊故為二隂王者忌之不舉樂翼奉又言師法用辰不用日甲乙為日子夘為辰故云辰在子夘孟僖子如齊殷聘大行人職云凡諸侯之邦交嵗相問也殷相聘也鄭氏注云小問曰問殷中也久無事又于殷朝者及而相聘也先鄭引此傳以證之服䖍云殷中也自襄二十年叔老聘于齊至今積二十年故中復脩盛聘之禮十年傳邑姜晉之妣也李厚菴曰䢴應韓皆無國矣武之穆惟晉存故曰邑姜晉之妣也然不自齊者以出于婺女故推本邑姜齊恵欒髙氏棟案恵公子欒堅髙祈後皆為氏故云欒髙詳襄廿七年注正義作子欒子髙盖欒髙字堅祈名也彊于陳鮑氏尔疋曰彊當也言其族盛與陳鮑相當值請㫁三尺焉而用之服䖍曰㫁三尺使至于較孤斬焉在衰絰之中注既葬未卒哭故猶服斬衰家君曰預既葬除喪之説至此乃窮故復作遁辭下云喪禮未畢如預説則卒哭而喪禮遂畢乎葬與卒哭為時無㡬諸大夫何不少待十一年經厥憖釋文云憖魚靳反徐五巾反棟案公羊作屈銀是憖讀為銀徐音是也説文云憖从心猌聲又犬部云猌从犬來聲讀又若銀是古音皆以憖為銀傳擇子莫若父擇臣莫若君管子大匡云鮑叔曰先人有曰知子莫若父知臣莫若君五大不在邉五細不在庭此當用賈逵鄭衆之注鄭京櫟實殺曼伯注厲公得櫟又幷京案楚語范無宇曰叔段以京患嚴公鄭㡬不封櫟人實使鄭子不得其位明京屬叔段櫟屬厲公左氏約舊史而為傳取其文勢之便兼舉京櫟而單舉曼伯此傳之漏義得櫟幷京既無明文何必遷就而曲為之説也十二年傳司墓之室有當道者家君云周官墓大夫帥其屬而巡墓居其中之室以守之故云司墓之室有當道者請免喪而後聴命此與下六月葬鄭簡公杜二注繆戾皆當刪之李厚菴曰未葬而朝晉有是理乎李以傳為未可信棟謂非傳之誤乃杜以免喪之語而移其傳之次也六月葬鄭簡公杜注云經書五月誤此謬耳古文左傳當在齊侯衛侯鄭伯如晉之前鄭伯欲如晉故速葬而往杜預欲附㑹短喪之説而移其次于後耳亂左氏者非預而誰供養三徳為善董遇注本為共養解云盡其所以養成三徳棟謂古供字作共董季直本是也訓為盡共恐未然三徳謂黄裳元也注亦誤且可飾乎漢儒言易以黄裳元吉為坤五降乾二乾二升坤五故曰且可飾乎司馬裻唐石經作督釋文音篤云本亦作裻棟案督與裻通説文云裻背縫莊子養生云縁督以為經亦謂背縫也方言云繞䋸謂之裺郭氏云衣督脊也王孫牟注衛康叔子康伯世本云衛康伯名髠宋忠曰即王孫牟也事周康王為大夫司馬貞曰牟髠聲相近故不同耳譙周古史考無康伯而云子牟伯立盖以不宜父子俱諡康故因其名曰牟伯也棟案馬融王肅尚書傳皆云康國名在千里之㡬内既滅管叔更封為衛侯其子始以康為諡索隠之説未盡然鏚柲髙誘曰鏚音七摩厲以須説文曰摩研也从手麻聲祗宫子恵子曰祗宫在南鄭見竹書祈招之愔愔韓詩章句曰愔愔和悦兒李登聲類曰愔愔和静兒形民之力家語作刑案古刑字皆作形王肅曰形以刑傷民力十三年傳将欲入鄢服䖍曰鄢别都卜尹服䖍曰卜尹卜師大夫官康王跨之服䖍曰兩足各跨璧一邉再拜皆厭紐王充曰後共王死招為康王傳作昭至子失之圉為靈王當作圍及身而殺子千為王當作干十有餘日子晳不立又懼誅死皆絶無後棄疾立竟續楚祀如其神符城外屬焉史記云方城外屬焉故杜注云城方城也苛慝不作釋文云苛音何本或作荷棟案古苛字本作荷檀弓曰泰山婦人曰無苛政釋文曰苛本亦作荷毛詩序云哀形政之荷今本作苛漢書酈食其傳云好荷禮師古曰荷與苛同漢張表碑亦以荷為苛齊桓晉文不亦是乎服䖍曰皆庶子而出奔鄭伯男也董仲舒春秋繁露云周爵五等春秋三等合伯子男為一爵故云伯男外傳作伯南古南男字通公羊桓十一年鄭忽出奔衛傳云忽何以名春秋伯子男一也辭無所貶何休云春秋改周之文從殷之質合伯子男為一子服湫從湫徐邈音椒案湫本與椒同音説文湫从水秋聲荀卿子引詩曰鳳凰秋秋其翼若干其聲若簫秋與簫協韻明秋亦作椒音恵伯名椒獨此作湫者聲之誤也晉以來唯徐仙民識古諸儒皆不及也文九年經楚子使椒來聘穀梁椒作萩五經文字云萩子遥反見穀梁及春秋左氏傳史記伍子胥列傳云夫差二年敗越于夫湫注云湫音椒今傳作椒古今人表有楚湫舉師古云即椒舉周語亦作湫舉及中人注中山望都縣西北有中人城杜此注本京相璠春秋土地名酈元謂望都城東有一城名堯始城本無中山之傳璠或以為中人未詳張華博物志曰中山在唐縣西四十里十四年傳司徒老祁慮癸當用服䖍注然丹簡上國之兵鄭康成曰簡謂比數之收介特注介特單身民也馬融廣成頌察滛侈之華譽顧介特之實功注介特謂孤介特立也杜氏以為單身民非馬義也蔽罪刑侯先鄭引曰弊獄邢侯鮒也鬻獄周書酆保曰十敗六曰佞説鬻獄韋昭曰鬻賣也乃施邢侯服䖍曰施罪于邢侯施猶劾也邢侯亡故劾之韋昭曰施捕也周禮卿士云辨其獄訟異其死刑之罪而要之鄭氏云要之為其罪法之要辭如今劾矣晉語云秦人殺冀芮而施之韋昭云陳尸曰施愚謂施陳也謂殺而陳其罪哀廿七年傳云周人施公孫有山氏是羅泌曰施者殺而肆之也内則施羊亦如之施麋施鹿施麕皆如牛羊秦施冀芮晉施邢侯與叔魚于市山海經殺而施之晉語入從欒氏者大戮施莊子云萇𢎞胣史拖陳餘盖同也開元五經文字作弛云廢亦非十五年傳吾見赤黒之祲非祭祥也喪氣也祲説文引作祲云精氣感祥从示侵省聲王逸楚辭章句云祲惡氣貌韋昭曰氛祲氣象也凶曰氛吉曰祥叔氏顔籀曰叔父之使故謂之叔氏闕鞏之甲説文引作䂬从石巩聲定四年傳封唐叔以闕䂬同及辛有之二子董之晉晉語曰秦伯納公子董因迎于河韋昭曰因晉大夫周太史辛有之後也引此傳為證王一嵗而有三年之喪二焉子恵子曰喪妻三年春秋之末造也事見墨子棟案墨子公孟篇云子墨子謂公孟子曰喪禮君與父母妻後子死三年喪服伯父叔父兄弟期族人五月姑姊舅甥皆有數月之喪後子為後之子猶太子也又非儒篇云儒者曰親親有術尊賢有等言親疎尊卑之異也其禮曰喪父母三年妻後子三年伯父叔父弟兄庶子其戚族人五月若以親疎為嵗月之數則親者多而疎者少矣是妻後子與父同也若以尊卑為嵗月數則是尊其妻子與父母同而親伯父宗兄而卑子也逆孰大焉墨子所據喪禮與傳合與喪服傳異喪服傳云父必三年然後娶達子之志也又云為妻何以期也妻至親也必三年然後娶不得為三年喪服也且天子絶期安得引以為證公孟子即公明儀三年之喪雖貴遂服注天子諸侯除喪當在卒哭今王既葬而除故譏其不遂雖貴遂服指后世子之喪若父母之喪無貴賤一也安得為此抑揚之語乎預邪説亂經孔氏扶非皆不足取十六年傳㡬為之笑而不陵我當用服注刑之頗類服䖍曰類讀為纇頗偏也纇不平也宣子有環其一在鄭商注玉環同工共樸自共為雙淮南子曰元玉同工髙誘曰二玉為一工故云同工昭公三十二年傳云賜子家雙琥倉頡篇云雙玉為珏是共樸也不亦銳乎注銳細小也正義曰説文云鋭芒也鋒芒尖故為細小言得利小也服䖍云鋭拆也鋭是鋒芒不得為拆自説文云至鋭拆也二十四字今本脱去宋本有之故備錄焉執政弗義髙誘戰國䇿注云弗義不以為義也庸次比耦庸傭也廣雅次比代也言代為傭代為耕也習實為常周書曰習實為常闕美惡一也十七年傳唯正月朔至庶人走古文左傳説曰正月謂周六月夏四月正陽純乾之月也慝謂隂爻也冬至陽爻起初故曰復至建巳之月為純乾亡隂爻而隂侵陽為災重故伐鼓用幣責隂之禮降物素服也不舉去樂也移時避正堂須時移災復也嗇夫掌幣吏庶人其徒役也少暤氏鳥名官何故也子恵子曰周書嘗麥曰乃命少暤清司馬鳥師以正五帝之官昭子見周志有是言而未之詳也故問之棟案史記言黄帝二子其一曰元囂是為青陽降居江水張衡集條上司馬遷所叙與典籍不合者十餘事其一事曰帝系黄帝産青陽昌意周書曰乃命少暤清清即青陽也今宜實定之故世本及春秋緯皆言青陽即是少暤黄帝之子代黄帝而有天下號曰金天氏史記言青陽降居江水不為帝故張平子正之汲郡古文云或曰少暤名清不居帝位帥鳥師居西方以鳥紀官盖本周書之説律厯志引考徳曰少昊曰清清者黄帝之子清陽也考徳者考五徳之書也九扈説文作雇或作籀文作鳸請有事于雒與三塗髙誘曰三塗之山陸渾之南故假道于周萇𢎞淮南子曰萇𢎞周室之執數者也天地之氣日月之行風雨之變律厯之數無所不通天事恒象先鄭司農曰象謂災變雲物如衆赤鳥之屬有所象似易曰天垂象見吉㓙夏數得天周書周月曰萬物春生夏長秋收冬蔵天地之正四時之極不易之道夏數得天百王所同商周改正以垂三統至于敬授民時巡守祭亨猶自夏焉故易乾鑿度曰三王之郊一用夏正若火作其四國當之唐石經此下又云六物之占御覽八百七十五卷所引有此四字盖據賈服本如此案石經四字滂増當是晁公武據蜀石經増入晁曾以蜀石經校唐石經碑中所増疑皆出晁氏之手學者詳焉盖蜀時或服䖍左氏猶存也水火之牡也其以丙子若壬午作乎水火所以合也子恵子曰水為夫火為妻夫從妻所好故以合日為災十八年傳毛得以濟侈于王都薛綜曰濟謂度也度于奢侈謂僭也是謂融風火之始也注東北曰融風淮南子墜形曰東北曰炎風髙誘曰艮氣所生也一曰融風張晏曰融風立春木風也火之母也火所始生也七日其火作乎張晏曰火以七為紀使司寇出新客禁舊客勿出于宫髙誘曰有新客􅊧出之為觀釁也禁舊客為露情也屏攝韋昭曰周氏云屏者并攝主人之位昭謂屏屏風也攝形如要扇皆所以分别尊卑為祭祀之位近漢亦然先鄭司農曰攝束茅以為屏祭神之處草易然故巡行之案周氏者漢儒説春秋者周仲文也祈于四鄘案鄘水庸也十九年傳許悼公瘧服䖍曰悼公靈公之子許男買瘧寒疾也書曰弑其君服䖍曰禮醫不三世不使君有疾飲藥臣先嘗之親有疾飲藥子先嘗之公疾未瘳而止進藥雖嘗而不由醫而卒故國史書弑告于諸侯若大城城父而寘太子焉以通北方王收南方髙誘曰城父楚北境之邑今屬沛國北方宋鄭魯衛也南方謂吴越也駟氏聳説文引作愯云懼也廣韻引作𢥠詳六年注諺曰無過亂門吕覽引詩云無過亂門所以遠之也髙誘曰逸詩沈尹戍注莊王曾孫葉公諸梁父也王符潛夫論曰左司馬戍者莊王之曾孫也葉公諸梁者戍之第三弟也髙誘吕覽注曰沈尹戌莊王之孫沈諸梁葉公子髙之父也三説不同廿年傳自以為猶宋鄭也髙誘吕覽注曰猶如也其事集矣髙誘曰集合也棠君尚風俗通作堂云堂楚邑大夫伍尚為之其後氏焉廣韻案堂與棠古字通見魯峻碑賔将掫杜子春引作趣讀為造次之造謂擊鼓夜戒守也又云趣與造音相近造與遭同故云與趣音相近故曰終夕與燎賈公彦曰賈服讀字與子春異棟案子春受學于劉歆歆傳左氏春秋以趣為掫必有據依史記亦以趣為掫賈服後于劉杜唐人咸所尊尚故不從其説終夕與于燎於字衍當从釋文刪古本無於字杜子春注可據若琴瑟之専壹董遇本作搏司馬貞曰搏古専字管子内業篇史記樂書皆以搏為専蒲姑氏亦作薄姑古文通闞駰曰周成王時薄姑與四國作亂周公滅之以封太公陸澄地理書曰吕尚封于齊郡薄姑故城在臨菑縣西北五十里近濟水取人于萑苻之澤唐石經初刻作雚蒲後改萑苻案韓非子内儲説引此事作雚詩小弁曰萑葦渒渒韓詩作雚外傳古字通也遺愛賈逵曰愛恵也廿一年傳天子省風以作樂應邵曰風土地風俗也有中和之風以作樂然後可移惡風易惡俗也小者不窕髙誘吕覽注云窕不滿密也窕則不咸釋文云本或作感漢書同唐石經初刻作咸後作減愚案咸本古文感故下云心是以感从咸為是也王心弗堪漢書作􅨹孟康曰古湛字尚書西伯戡黎説文引作􅨹郭璞尒疋注又作堪黎釋文本又作􅨹古字􅨹堪通詳見尚書考張匄尤之小尒疋云尤怪也杜訓從之是何物也注物事也子恵子曰嵗時日月星辰謂之六物是何物也謂六物之占當何屬也注未詳鄭翩願為鸛陸佃引舊説江淮為羣鸛旋飛為鸛井則鸛善旋飛盤薄霄漢與鵞之成列正異故古之陳法或願為鸛也不死伍椉衛詩曰死生契濶與子成説鄭箋云從軍之士與其伍約死也尉繚子云凡伍臨陳若一人有不進死于敵則教者如犯法者之罪軍之大刑也周禮條狼氏職曰凡誓執鞭以趣于前且命之誓僕右曰殺誓馭曰車轘廿二年傳盟于稷門之外劉向别錄曰齊有稷門齊城門也齊地記曰齊城西門側系水出故曰稷門古側稷音近耳司馬貞云棟案稷齊地名昭十年傳云戰于稷顧炎武曰七國時齊有稷下館鄩肸伐皇肸周大夫水經注作肹食采于鄩因氏焉説文鄩周邑焚諸王城之市焚如之刑周法也敗績于前城服䖍曰前讀為泉周地也京相璠曰今洛陽西南五十里伊闕外前亭毁其西南顧炎武曰唐石經此下有子朝奔郊四字棟案碑四字非初刻當是晁公武據蜀石經增入非杜本也案下傳云二師圍郊郊鄩潰杜氏云二邑皆子朝所得是杜本無奔郊之文廿三年經狄泉注時在城外京相璠曰今大倉西南地水名狄泉舊説狄泉本在洛陽北萇𢎞城成周乃繞之傳尹辛敗劉師于唐司馬彪郡國志云洛陽有唐聚去備薄威尉繚子曰兵有去備徹威而勝者以其有法故先君之力可濟也服䖍曰獻公亦欲立子猛不欲令子朝得國今南宫極震死為天所弃先君之功事可成也薳澨注楚地酈元曰服䖍或謂之邑又謂之地京相璠亦云水際及邉地名也禹貢曰道漢水過三澨春秋傳有句澨雍澨及此而三水經注作蓬澨明其伍候注使民有部伍為候望正義曰賈服王董皆作五候賈逵曰五侯五方之侯也敬授民時四方中央之侯也王肅云五侯山侯林侯澤候川候平地候也董遇云五候四方及中國之姦謀也杜作伍候棟案周書程典曰協其三族固其四援明其伍候習其武誡依其山川通其舟車利其守務古伍字皆作五傳本文也杜氏依周書為説故从人旁廿四年傳今王室實蠢蠢焉説文引作云亂也三體石經作尚書蠢字説文引作古蠢字皆作俗作蠢日過分而陽猶不克孟康曰謂春分後隂多陽少為不克陽勝則盛故言甚王子朝用成周之寳珪于河漢書曰湛于河釋文云本或作沈于河與之東訾注鞏縣西南訾城是也司馬彪曰縣有東訾聚今名訾城王隠晉書地道記曰在縣之東吴踵楚依説文當作㣫㣫相迹也春秋左傳補註卷五
