body:
  text: 春秋左傳補注卷一元和惠棟撰棟曾王父朴菴先生幼通左氏春秋至耄不衰常因杜氏之未備者作補注一卷傳序相授於今四世矣竊謂春秋三傳左氏先著竹帛名為古學故所載古文為多晉宋以來鄭賈之學漸微而服杜盛行及孔穎達奉敕為春秋正義又專為杜氏一家之學值五代之亂服氏遂亡嘗見鄭康成之周禮韋宏嗣之國語純采先儒之説末乃下以己意令讀者可以考得失而審異同自杜元凱為春秋集解雖根本前修而不著其説又其持論間與諸儒相違於是樂遜序義劉炫規過之書出焉棟少習是書長聞庭訓每謂杜氏解經頗多違誤因刺取經傳附以先世遺聞廣為補注六卷用以博異説袪俗議宗韋鄭之遺前修不掩效樂劉之意有失必規其中於古今文之同異者尤悉焉傳之子孫俾知四世之業勿替引之云爾戊戌冬日東吳惠棟定宇序隱元年經公及邾儀父盟于蔑蔑本姑蔑定十二年傳費人北國人追之敗諸姑蔑是也隱公名息姑而當時史官為之諱猶定公名宋哀草四年傳宗人釁夏曰孝惠取于商不云宋也古人舍故諱新故哀為定諱定不為隱諱汲郡古文云魯隱公及邾莊公盟于姑蔑魏史不為魯諱則此經為隱諱明矣傳都城過百雉國之害也管子曰國小而都大者弒先王之制大都不過參國之一中五之一小九之一周書作雒云大縣城方王城三之一小縣立城方王城九之一不舉中者從可知此周公相成王作雒所定之制故云先王之制公入而賦大隧之中徐齊民北征記曰菀陵縣東南有大隧澗鄭莊公所闕其樂也融融融古文作肜張衡思玄賦展泄泄而肜肜舊注云泄泄肜肜皆和貌李善云左傳曰鄭莊公入而賦大隧之中其樂也肜肜融與肜古字通案殽阮碑陰亦以肜為融注不皆與今説詩者同余仁仲左傳字辨曰不皆與今説詩者同不皆相臺嶽氏本作皆不誤也贈死不及尸弔生不及哀注諸侯已上既葬則衰麻除無哭位諒暗終喪朴菴子惠子曰荀卿云貨財曰賻輿馬曰賵衣死也送死不及柩尸弔生不及悲哀非禮也贈弔及事禮之大也荀卿所稱乃時王之禮故左氏依以為説杜元凱遂借以文其短喪之説誕之甚妄之甚衛侯來會葬注諸侯會葬非禮也諸侯五月同盟至先王之禮也杜以卅年傳文為據明同盟惟大夫有是理乎棟聞諸家君云二年傳修惠公之好兩國有前好而會盟者謂之修好亦謂之尋高誘戰國䇿注曰溫故曰修溫亦訓尋禮記中庸溫故而知新鄭注云溫讀如尋溫之溫亦作燖哀十二年傳云若可尋也亦可寒也賈陸曰尋溫也是尋與修其義一爾三年經春王二月己巳日有食之隋志曰推合己巳朔傳且夫賤妨貴少陵長逺間親新間舊小加大淫破義所謂六逆也君義臣行父慈子孝兄愛弟敬所謂六順也子惠子曰此所據古亦云然而栁子厚有駁六逆之説蓋唐以來始有不信古者棟案管子五輔篇曰聖王飭八禮以道民八者各得其義則為人君者中正而無私為人臣者忠信而不黨為人父者慈惠以教為人子者孝弟以肅為人兄者寬裕以誨為人弟者比順以敬為人夫者敦懞與厖同以固為人妻者勸勉以貞夫然則下不倍上臣不殺音弒君賤不踰貴少不陵長逺不間親新不間舊小不加大淫不破義凡此八者禮之經也周語富辰亦云夫禮新不間舊則八禮之説古矣石碏止舉六者禮諫有五風諫為上碏為君陳古義倍弒之事非所宜言又公方昵嬖人夫婦之際所宜深諱是純臣之義也四年傳敝邑以賦服虔曰賦兵也以田賦出兵故謂之賦正謂以兵從也朱子注論語用其説五年傳則公不射此指祭祀射牲夏官射人云祭祀則贊射牲司弓矢共射牲之弓矢外傳左史倚相曰天子禘郊之事必自射其牲諸侯宗廟之事必自射其牛刲羊繫豕是也朱子據傳曰則君不射是以弓矢射魚如漢親射蛟江中之類恐未然鄭人侵衛牧詩靜女云自牧歸荑王質以為即春秋之牧邑郕人侵衛注東平剛父縣西南有郕鄉羅蘋曰郡有剛縣晉為東平國之剛平無剛父棟案京相璠春秋土地名曰東郡廩邱縣南三十里有故郕都使曼伯與子元潛軍軍其後案荀子議兵篇曰王者不屠城不潛軍不留衆潛軍之法公羊所謂詐戰非偏戰也六年經鄭人來渝平注渝變也案渝讀為輸二傳作輸廣雅曰輸更也與懌悛改同釋秦詛楚文變輸盟刺謂變更盟刺耳渝更也平成也故經書渝平傳曰更成杜注自明而獨訓渝為變必俗儒傳寫之訛服虔曰公為鄭所獲釋而不結平於是更為約束以結之故曰渝平是服亦訓渝為更桓元年渝盟乃訓為燮古文渝輸通此經輸作渝乃古文之僅存者納諸鄂注鄂晉别邑案世本居篇云唐叔虞居鄂宋忠曰鄂地今在大夏釋例云晉大鹵大原大夏參虛五名然則大夏即晉地故杜以為晉别邑七年傳歃如忘説文引云歃而忘服虔曰如而也臨歃而忘其盟載之辭古如而皆通用莊七年經夜中星隕如雨昭六年傳大如象之皆讀為而八年傳因生以賜姓王充曰因其所生賜之姓也若夏吞薏苡而生則姓苡氏商吞燕子而生則姓子氏周履大人迹則姓姬氏十年傳以王命討不庭爾匹釋詁庭直也謂諸侯之不直者十一年傳爭長服虔曰爭長先登受玉工則度之爾匹釋器木謂之度亦作剫廣雅云剫分也桓元年經公即位鄭衆曰古文春秋經公即位為公即立云古位立同字也棟案古鼎銘位皆作立見朱氏彞尊吉金貞石志傳目逆而送之服虔曰目者極視精不轉也二年經孔父注孔父稱名者內不能治其閨門外取怨於民身死而禍及其君棟案孔父孔子之先也傳云孔父嘉為司馬是嘉名孔父字古人稱名字皆先字而後名蔡仲足是也鄭有子孔名嘉説文曰孔從乙從子乙請子之鳥也乙至而得子嘉美之也古人名嘉字子孔説文此訓蓋指宋鄭兩大夫故先儒皆謂善孔父而書字杜輒為異説不可從也傳立華氏也立立證周法也立華氏為證乃佐成孔父之罪下文所云是也言桓公受賕枉法鞶厲遊纓遊李善引作斿顔籀同以為當從偃聲案説文無斿字有遊字云旌旗之流從偃汓聲汓與泅同上形下聲不當音偃顔説非也蔡雍石經論語子遊之遊亦作斿斿當從偃汓省聲遊與旌旗字皆在偃部偃本音偃故子遊名偃惠之二十四年唐石經草四年下惠之三十年唐石經卅年棟案石經凡經傳中二十字皆作草三十字皆作卅此古文春秋左氏傳本文也説文草二十并􅧁三十並也古文省説文所以謂古文乃孔壁中文也蔡雍石經論語云卅而立又云年卌而見惡焉又云凡草六章考工輪人云輪人為蓋部長二尺桯長倍之四尺者二十分寸之一謂之枚鄭注云故書十與上二合為二十字鐘鼎文如秦權微欒鼎二十字作草石鼓文周陽侯鐘三十字作卅此又金石文之可為左證者今九經二十三十字皆當從石經改正四年經渠伯糾注渠氏案渠周邑昭草六年傳劉子以王出次于渠注云周地然則伯糾蓋氏于邑者五年經城祝丘司馬彪郡國志曰琅邪即邱春秋時曰祝邱闞駰十三州記曰即祝魯之音蓋字承讀變蔡人衛人陳人從王伐鄭服虔曰言人者時陳亂無君則三國皆大夫也故稱人傳蔡衛不枝戰國䇿曰魏不能支髙誘云支猶拒也支與枝同項羽傳莫敢枝梧如淳曰猶枝扞也旝動而鼓賈逵曰旝發石一曰飛石范蠡兵法曰飛石重十二斤為機發行二百步説文旝建大木置石其上發以機以追敵也從偃會聲詩云其旝如林三國志太祖為發石車擊袁紹注引魏氏春秋曰以古有矢石又傳言旝動而鼓説曰旝發石也于是造發石車所云説者即賈侍中説也杜以旝為旃蓋本馬融追古文磓注鄭志在苟免王討之非也劉氏權衡曰此言不可以訓於世奈之何以其解經且是使亂臣賊子喜也何謂懼乎六年經子同生子惠子曰榖梁子曰疑故志之案桓三年夫人薑氏至自齊十八年公與夫人薑氏遂如齊始與齊侯亂中間文薑未有如齊之事而于六年始書子同生明同為桓公子此聖人筆削之微意莊四年冬公及齊人狩于禚齊有猗嗟之詩為莊公狩而作也其詩云展我甥兮亦嫌文薑之亂而證其為齊之甥夫子刪詩存之與書子同生一例公羊傳曰同非吾子齊侯之子也名教大間聖人于此安得而不愼乎知此則知聖人刪定六經之意矣三傳惟榖梁得聖人之旨其真子夏之門人歟此論始于朱子近日汪鈍翁朱竹垞亦有論説與此略同傳薳章王符曰蚠冒生蒍章者王子無鈞也令尹孫叔敖者蒍章之孫也薳與蒍同奉牲以告周禮充人曰碩牲則贊是也瘯蠡説文曰痤小腫也一曰族絫張有復古編云族從偃矢昨木切絫從厽糸力軌切别作瘯非釋丈云瘯本又作蔟蠡説丈作嘉栗旨酒劉光伯以栗為穗貌詩云實穎實栗接以太牢服虔曰接者子初生接見于父與杜異與吾同物物謂六物嵗時日月星辰是也與桓公同日故云同物古稱六物唐稱祿命八年傳無與王遇遇敵也戰國䇿曰盻子復整其士卒與王遇髙誘云遇敵也敵猶當也故少師以為不當王十年傳齊人餼諸侯餼説文引作氣云饋客芻米也十有一年經宋人執鄭祭仲注祭氏仲名不稱行人聽迫脅以逐君罪之也劉光伯以祭仲是字鄭人嘉之又云祭仲本非行人棟案五年傳云祭仲足為左拒此年傳云祭封人仲足世本載姓氏皆先字後名此與孔父嘉一例則仲字足名確然無疑杜於五年傳注云祭足即祭仲之字是專欲違舊法以就其曲説劉氏規之是也左氏無貶仲之文仲為宋所迫脅雖死無益于忽故公羊以為行權釋例斥其挾偽以篡其君過矣傳君多內寵服虔曰言庶子有寵者多雍氏宗有寵于宋服虔曰為宋正卿故曰有寵十二年傳坐其北門注坐猶守也案兵法有立陳坐陳見尉繚子立陳所以行也坐陳所以止也傳曰裹糧坐甲又云王使甲坐于道又云士皆坐列司馬法曰徒以坐固荀子曰庶士介而坐道及此傳坐其北門皆坐陳也杜訓坐為守蓋未通于古義十三年傳舉趾髙趾漢書引作止髙誘曰止足也鄭注士昏禮曰古文止作趾賴人注賴人仕於楚者案賴即厲也楚與國詳見後盧戎習鑿齒曰中盧縣古盧戎也釋文作廬莫敖縊于荒谷羣帥囚于冶父盛宏之荆州記曰荒谷今竹林是也又云汪陵縣東三里餘有三湖湖東有水名長谷又西北有小城名曰冶父酈元曰湖水東通荒谷荒谷東岸有冶父城十六年傳使盜待諸莘服虔曰莘衛東地京相璠曰今平陽陽平縣北一十里有故莘亭道厄限蹊要自衛適齊之道也十七年傳疆埸之事慎守其一古文作疆易周禮有疆地易地呂君碑曰慎守疆易蓋用此文隸釋諱慎改為謹説文曰疆界也從畕三其界畫也或從強土復惡已甚矣案韓非子亦載此事復惡作報惡鄭注大司寇云復猶報也杜訓為重失之十八年傳齊侯通焉服虔曰旁淫曰通莊元年傳不稱薑氏絶不為親服虔曰夫人有與殺桓之罪絶不為親得尊父之義善莊公思大義絶有罪故曰禮也此説與杜異案莊草二年肆大眚然後書葬我小君文薑則服氏之説為有據矣説苑曰絶文薑之屬而不為不愛其母正與此同屬謂不稱薑氏也八年傳戌葵丘京相璠曰齊西五十里有葵邱若是無庸戍之僖公九年齊桓會諸侯于葵邱宰孔曰齊侯不務德而勤逺略葵邱不在齊也胡公廣言汾陰有葵邱或山陽西北葵城宜在此瓜時而往曰及瓜而代服虔曰瓜時七月及瓜謂後年瓜時請代弗許尉繚子曰兵戍邉一嵗遂亡不候代者法比亡軍故二人謀作亂也九年髙傒宰相世系表曰齊太公六世孫文公赤生公子髙孫傒為上卿與管仲合諸侯有功桓公命傒以王父字為氏食邑於盧諡曰敬仲世為上卿敬仲生莊子虎虎生傾子傾子生宣子固固生厚厚生子麗子麗生止奔燕十年經公敗宋師于乘丘注魯地案應邵地理風俗記曰濟陰乘氏縣故宋乘邱邑也張華博物志亦云古乘邱杜以齊宋次于郎故指為泰山之乘邱縣但轉戰所及乘勝逐北豈必盡屬魯地杜氏望文為義非遂實有所據如十一年傳宋侵我公敗之鄑説文以為宋魯間地杜則直云魯地矣十一年傳禹湯罪己子惠子曰禹哭罪人湯禱桑林皆罪己之事臧孫達世本孝公生僖伯彄彄生哀伯達達生伯氏瓶瓶生文仲辰此傳先載文仲之言不應後録哀伯之語達當為辰字之誤也桓二年傳先稱臧哀伯後云臧孫達與此一例陸淳纂例以臧孫辰為哀伯子蓋未考世本十二年經宋萬弒其君捷賈逵曰公羊穀梁曰接案捷與接古字通易晉卦曰晝日三接鄭注云接勝也禮內則接以太牢注云接讀為捷捷勝也音義皆同傳批而殺之玉篇引作􅔊云手擊也與杜注同張有曰􅔊反手擊也從手别作批非匹齊切玉篇别有批字云擊也不云見左傳遇太宰督于東宫之西又殺之注殺督不書宋不以告家君曰督乃弒君之賊豈可與仇牧同書杜氏之謬也十四年傳大陵京相璠曰潁川臨潁縣東北二十五里有故巨陵亭古大陵也其氣焰以取之余仁仲左傳字辨曰其氣焰以取之陸德明音義本云炎以音艷案王符潛夫論漢書五行志皆云其氣炎以取之釋文傳作炎注仍作焰尋洛誥焰焰字亦當作炎炎故杜氏引以為證揚雄解嘲炎炎者滅尚書多俗字鄭學已亡無可是正梅福引書云無若火始庸庸此今文尚書繩息媯呂覽四月紀曰周公旦作詩以繩文王之德孔鮒云繩之譽之也杜注本此表記曰君子不以口譽人鄭注譽繩也釋文説文作譝今説文闕廣雅云譝譽也音繩十有八年經春王三月日有食之隋志曰推合壬子朔有蜮服杜皆以為短狐王伯厚曰沙隨春秋例目云有蜮或考隸古春秋作音特棟案亦作蟘説文云吏冥冥犯法即生螟蟘即詩之螟螣也唐公碑又作蟘與蜮字相似呂覽任地曰大草不生又無螟蜮髙誘曰蜮作螣食心曰螟食葉曰螣兖州人謂蜮為螣音相近也螟蜮皆害苗者故書于春秋若是短狐不須記也傳閻敖遊涌而逸盛宏之荆州記曰江津東十餘里有中夏州州之首江之汜故屈原云經夏首而西浮夏首東二十餘里有涌口所謂閻敖遊涌而逸二水之間謂之夏州首尾七百里十九年傳鬻拳鄭針膏肓曰鬻拳楚同姓草一年傳鄭伯享王于闕西辟服虔曰西辟西偏也毁敦銘云繼治我西偏東偏草二年傳弛於負擔案漢碑負擔字皆作儋説文曰儋何也從人詹聲然則負儋猶負何也五世其昌並于正卿服虔曰言完後五世與卿並列遇觀之否案之字義訓變漢髙祖諱邦荀悅曰之字國惠帝諱盈之字滿亦此類王充曰卜曰逢筮曰遇尚書金縢曰乃逢是吉今尚書作並庭實旅百奉之以玉帛韋昭曰庭實庭中之實百舉成數也棟謂庭實車馬之屬玉帛束帛加璧呂覽曰荀息以屈産之乘為庭實而加垂棘之璧是也草三年傳會以訓上下之則制財用之節朝以正班爵之義帥長幼之序又云諸侯有王王有巡守以大習之注大習會朝之禮案管子幼官篇曰千里之外二千里之內諸侯三年而朝習命二千里之外三千里之內諸侯五年而會至習命所謂大習者蓋習會朝之教命也草四年傳女贄不過榛栗棗修正義曰先儒以為栗取其戰栗也棗取其早起也修取其自修也説本范寧唯榛無説棟案榛説文引作亲從木辛聲云果實如小栗呂堪字林榛木之字亦從辛木云實如小栗曲禮釋文曰榛古本又作亲然則亲與栗同義故先儒不釋亲音壯巾反正義以為榛聲近虔失之外傳魯語云夫婦贄不過棗栗以告虔也不及榛修明亲不訓虔字林曰榛木叢生也非果實草八年經冬築郿京相璠曰公羊傳謂之微在東平壽張縣西北三十里有故微鄉魯邑也棟案公羊釋文云築微左氏作麋麋古文眉眉與微古今字特牲饋食禮眉夀萬年鄭注云古文眉為微蒲與二屈君之疆也韋昭曰疆竟也二屈屈有南北河東有北屈則是時復有南屈酈元案汲郡古文曰魏襄王十一年翟章救鄭次于南屈鄭人將奔桐丘注許昌縣東北有桐丘城京相璠曰今國無而城見存西南去許昌城可三十五里俗名之曰隄其城南即長隄因洧水之北防也西面桐邱其城邪長而不方蓋慿邱之稱即城之名矣諜告曰注諜間也案周禮環人云摶諜賊注云諜賊反間國賊郭璞曰諜今之細作也臧孫辰告糴于齊禮也子惠子曰周書糴匡篇年儉穀不足君親巡方卿參告糴故外傳臧文仲曰國有飢饉卿出告糴古之制也辰也備卿辰請如齊凡稱禮皆周制也草九年傳水昏正而栽蔡雍月令章句引傳曰水昏正而栽築即營室也昏正者昏中也栽築者栽木而始築也卅二年傳臨黨氏釋文云黨音掌郭忠恕曰黨氏之黨音之仰反與鄉黨字别襄草九年傳黨叔定七年公族黨氏哀十一年黨氏之溝同音掌圉人犖家君曰圉猶扈也公羊作扈文異義同能投蓋于稷門服虔曰能投千鈞之重過門之上杜氏曰蓋覆也走而自投接其屋之桷反覆門上劉炫規過曰公言犖有力焉如杜此説徑捷耳非有力也當謂投車蓋過於稷門棟謂杜説鑿劉説淺服説近之成季奔陳服虔曰季友內知慶父之情力不能誅故避難出奔閔元年傳親有禮因重固説文引云種有禮因重固因就也從口大能大者衆圍就之服虔曰重不可動因其不可動而堅固之杜氏從許君説趙夙注趙衰兄案世本公明生孟及趙夙夙生成季衰史記以衰為夙之孫晉語以為夙之弟無緣繆戾至此且夙與衰世次相縣不應為弟兄必傳寫之訛史記所見異辭當以世本為正焦氏易林云伯夙奏獻衰續厥緒則非見弟明矣畢萬注畢萬魏犫祖父世本曰萬生芒季季生武仲州禮記正義引世本云萬生芒芒生季恐非州生莊子降降生獻子荼荼生簡子取取生襄子多多生桓子駒駒生文侯斯禮記正義州即犫也降即絳也荼即舒也多即曼多也宰相世系曰犫生悼子悼子生昭子絳史記索隱曰系本云武仲生莊子絳無悼子又系本居篇曰魏悼子徙霍則是有悼子系本卿大夫代自脫耳昭子徐廣曰世本曰莊子索隱曰世本錯也居篇又曰昭子徙安邑與此文同愚案左傳亦作莊子先為之極服虔曰言其祿位極盡於此為吳大伯子惠子曰穆天子傳云大王亶父之始作西土封其元子吳大伯于東吳詔以金刃之刑賄用周室之璧上文分之都城而位以卿是以大伯之地處之但曲沃在近地故欲使逃之以順父志也以是始賞天啓之矣服虔曰以魏賞畢萬是為天開其福辛廖注晉大夫劉炫曰若在晉國而筮何得云筮仕於晉又辛甲辛有並是周人何故辛廖獨為晉大夫服氏以為畢萬在周筮仕於晉是也二年經齊人遷陽正義曰杜世族譜土地名闕不知所在棟案地理志東海郡陽縣注應劭曰春秋齊人遷陽是又城陽國陽都縣注應劭曰齊人遷陽故陽國是一國兩屬未詳孰是傳虢公敗犬戎于渭汭服虔本作渭隊注云隊謂汭也鶴有乘軒者服虔曰車有藩曰軒遂滅衛詩載馳序云衛懿公為狄人所滅鄭箋云滅者懿公死也君死於位曰滅閻百詩曰下文狄入衛方是入其國都孔疏傳言滅而經書入引釋例為從齊桓告諸侯之文殊不然衛侯不去其旗胡渭生曰去藏也古人以藏為去棟案鄢陵之戰乃納旌於韜中胡説是立戴公以廬于曹注廬舍也案公劉詩曰于是廬旅毛傳云廬寄也小爾匹同管子中匡篇曰狄人攻衛衛人出旅於曹外傳作廬訓為寄故詩序亦言東從渡河野處漕邑詩序漕字從水旁曹傳作曹古文省與門材周禮掌舍為壇壝宫棘門杜子春云棘門或為材門正義云衛文公居楚邱國家新立齊桓共門材先令豎立門户以材木為門也東山皋落氏劉昭案上黨記曰東山在壺關城東南晉申生所伐今名平皋服虔曰赤狄之都也有守則從服虔曰有代太子守則從君從曰撫軍服虔曰助君撫循軍士君其舍之服虔曰舍之置申生勿使將兵也不對而退服虔曰里克不對公衣之偏衣服虔曰偏衣偏裻之衣偏異色駮不純裻在中左右各異故曰偏衣此説詳於杜裻即督也莊子緣督以為經尨涼説文引作牻㹁云㹁牻牛也牛之雜色者不中為犧牲衣之不純者不得為太子若以尨為涼義無所取古文省少或借涼為㹁補正引林氏説亦未當金玦不復應劭曰復反也金玦猶決去不反意也荀卿子曰絶人以玦昔辛伯諗周桓公注諗告也案説文曰諗深諫也外寵二政棟案二讀為王二于虢之二韓非子引此正作二與其危身以速罪也服虔曰速召也疾也言太子不去自必危疾召罪狐突知其亂本既成而太子拘於一節不達至孝之義與皋落雖戰勝而歸猶不能免於難而使父有悖惑殺子之罪故傳備衆賢之言以迹太子所以死也經在僖公五年晉侯殺其世子申生大帛之冠鄭康成引作白云大白冠大古之布冠也注蓋用諸侯諒暗之服家君云此杜預自造之語俗語杜撰本此棟案服虔曰戴公卒在於此年故杜彌縫其説耳僖元年經次于聶北説文引作嵒北云讀與聶同邢遷于夷儀注夷儀邢地司馬彪郡國志曰東郡聊城有夷儀聚薛瓚曰今襄國西有夷儀去襄國百餘里傳諸侯救邢注實大夫也而曰諸侯總衆國之辭家君曰實大夫也何得稱為諸侯此預之妄也二年傳保於逆旅案逆旅亦作御旅見荀子御與迓通周官有掌訝先鄭云訝讀為跛者訝跛者之訝案公羊訝作御尚書迓字皆為御御迎也與逆通四年經齊人執陳轅濤塗釋文作袁穀梁傳同云本多作轅案國三老袁良碑云周之興滿為陳侯至元孫濤塗立姓曰袁法言曰齊桓公欲徑陳陳不果內執袁濤塗皆不從車旁今本及唐石經皆作轅王伯厚曰轅與袁同傳唯是風馬牛不相及也賈逵曰春秋正義作服虔風放也牝牡相誘謂之風案呂覽曰乃合纍牛騰馬遊牝於牧髙誘曰纍牛父牛也騰馬父馬也皆將羣遊從牝於牧之野風合之其説與賈侍中蓋同漢儒相傳有是語也尚書云馬牛其風爾貢包茅不入子惠子曰韓非子外儲説曰是時楚之菁茅不貢於天子三年矣無以縮酒案説文引作莤酒云禮祭束茅加于祼圭而灌鬯酒是為莤象神歆之也鄭少贑説同一曰莤榼上塞也鄭大夫讀莤為縮詩伐木云有酒湑我毛傳曰湑莤之也是先鄭以來皆作莤讀為縮也周伯琦六書正訛云莤從草酉酉即酒字會意左傳無以莤酒俗用縮非汗簡云古文尚書縮作􅛄案丣為古文酉是􅛄即莤也説文酉部有莤字而草部又有􅛄字以為鳬葵此必茒字之誤周禮醢人有茒菹詩薄采其茒皆從卯徐邈音栁是混􅛄茒而為一非也昭王南征而不復唐石經云昭王南征沒而不復案碑沒字後增或據古本益之髙誘呂覽注引此傳與石經同死王事加二等於是有以衮斂賈逵曰死王事謂朝天子以命用師衮斂上公九命服衮也且其繇曰服虔曰繇抽也抽出吉凶也五年傳遂登觀臺五經異義云古春秋左氏説曰天子靈臺在大庿雍之靈沼謂之辟雍諸侯有觀臺皆以望嘉祥也服虔曰人君入大庿視朔天子曰靈臺諸侯曰觀臺在明堂之中凡分至啓閉必書雲物為備故也服虔曰分謂春秋分至謂冬夏至啓立春夏也陽氣用事為啓閉立秋冬也隂氣用事為閉雲五雲也物風氣日月星辰也分至啓閉天地之大節陰陽之分也故遂登觀臺望氣以審妖祥變亂之氣先見於八節審其雲物之形言其所致務為之備也虞不臘矣朱子曰秦時始有臘祭而左氏謂虞不臘矣是秦時文字分明案御覽引舊注云臘祭名也日月會于龍尾百物備合因于是祭羣神也正義云月令孟冬臘門閭及先祖五祀臘之見於傳記者唯月令與此二文而已秦本紀惠王十二年初臘始皇三十一年更改臘曰嘉平應劭風俗通曰案禮夏曰嘉平殷曰清祀周曰大蠟漢改曰臘此之虞不臘者明當時有臘祭周時臘與大蠟各為一祭言漢改曰臘不蠟而為臘耳又案蔡雍月令章句曰夏曰清祀殷曰嘉平周曰蠟秦曰臘棟案如應蔡之説則三代本有清祀嘉平蠟臘之祭厯代因革故秦惠十二年改蠟為臘始皇三十一年更改臘曰嘉平是臘與嘉平皆三代祭名朱子以秦始有臘祭考之不審耳丙之晨子惠子曰師法用辰不用日丙日也子辰也言丙不言子者日在尾故舉日不舉辰辰為客時為主人故言丙之晨均服振振服虔曰均服黑服也古戎服尚黑戰國䇿左師觸龍曰老臣賤息舒祺最少不肖而臣衰竊愛憐之願令補黑衣之數以衛王宫注云黑衣戎服漢書作袀劉逵注吳都賦引此傳亦作袀儀禮士冠禮云兄弟畢袗玄鄭注曰袗同也古文袗為均司馬彪輿服志云郊祀之服皆以袀玄淮南子曰尸祝袀袨髙誘云袀純服袨黑齋衣也袀袨猶袗玄袗字篆書與袀相似上下皆玄故謂之黑服謂均服為黑服失之袀古文皆作均杜氏謂戎事上下同服是也管子大匡篇云四年修兵同甲十萬同甲者均服之謂也呂覽王孫滿謂秦師曰今初服回建左不軾而右之髙誘曰初同也兵服上下無别故曰初服初當作袀傳寫之誤而修虞祀子惠子曰終宫之奇之言六年傳許男面縛子惠子曰漢書項羽傳馬童面之張晏曰背之也師古曰面之謂背之不面向也面縛之亦謂反偝而縛之杜元凱以為但見其面非也七年傳若總石經作惣孫愐曰此俗字當作總其罪人以臨之戰國䇿曰楚請道以臨韓魏髙誘曰臨猶伐也定二年傳以師臨我同會而列姦注列姦用子華當云用子華為內臣昭四年傳云姬在列者言姬姓為君者也子華欲以鄭屬齊為附庸之君齊若許之是列姦也故下云記姦之位位謂君位杜下注云會位失之如杜説何以經仍書鄭世子華乎必不然矣君盟替矣三體石經作替説文云暜廢一偏下也從並白聲或從曰或從兟從曰子華由是得罪於鄭服虔曰鄭伯罪之也八年傳不殯於廟服虔曰廟謂殯宫鬼神所在謂之廟服知周法不殯于廟故以為殯宫九年經晉侯詭諸卒案唐石經及釋文皆作佹惟穀梁傳作詭釋文云左傳作佹又案鄭固碑云造膝佹辭是佹與詭通傳王使宰孔賜齊侯胙服虔曰胙膰肉周禮以脤膰之禮親兄弟之國不以賜異姓敬齊侯比之賓客以是藐諸孤注言其幼賤與諸子縣藐案吕諶字林曰藐小兒笑也文選注顧君訓藐為小亦未當公家之利髙誘吕覽注云公家公之朝也齊隰朋王符曰隰氏薑姓能鬭不過棟案此即外傳所謂怒不及色也韋昭曰無色過臣聞之唯則定國子惠子曰呂覽愼大覽引以為詩詞蓋逸詩也十年傳狐突適下國服虔曰晉所滅以為下邑一曰曲沃有宗廟故謂之國在絳下故曰下國余得請於帝服虔曰帝天帝請罰有罪七輿大夫注侯伯七命副車七乘服虔曰下大夫輿師七人屬申生者棟案服杜二説皆非也晉國之法上大夫二輿二乘中大夫二輿一乘下大夫專乘專乘謂一輿見韓非子文公作三行景公時改為三軍大夫一司馬三行為六輿司馬專乘合七輿之數後遂以為官名故襄草三年傳云七輿大夫與欒氏蓋自文公以後始有七輿獻公時止有二行一尉不得為七輿七當為五古五字如七見王肅詩傳遂訛為之叔堅以下舉里丕之黨不必皆在七輿之數杜以七人為七輿則左右行又何説與十一年傳賜晉侯命注諸侯即位天子賜之命圭為瑞家君曰命圭世世守之未聞新君再賜古禮新天子輯瑞諸侯薨還圭若國易一君亦易一瑞則古無是禮十二年經春王三月庚午日有食之隋志曰推合庚午朔傳若節春秋杜從賈逵訓節為時案王肅曰春秋聘享之節也應乃懿德應讀曰膺言膺受女美德也古文皆以應為膺尚書康誥曰應保殷民亦古文膺字故徐邈音於甑反後人以為應對之應失之廣雅釋言云應受也十四年經諸侯城緣陵薛瓚曰北海營陵縣春秋謂之緣陵十五年經夏五月日有食之隋志曰推合癸未朔齊師曹師伐厲注厲楚與國義陽隨縣北有厲鄉案桓十三年傳云楚子使賴人追之杜注與此略同昭四年經云楚伐吳遂滅賴公羊傳于此年賴作厲釋文云厲如字又音賴公羊僖十五年釋文云厲舊音賴則知厲與賴本一國古音通故或作厲或作賴也論語云未信則以為厲己也康成注云厲讀為賴司馬彪曰汝南褒侯縣有賴亭故賴國傳秦穆姬屬賈君注晉獻公次妃案獻公取于賈則是正妃為惠公之適母何須穆姬之屬唐尚書曰賈君申生妃故僖十年傳云夷吾無禮此為近之東盡虢略司馬郡國志云宏農陸渾西有虢略地夫狐蠱必其君也狐無喻君之理齊詩有雄狐謂襄公也齊襄通于文薑晉惠通于賈君故以狐為君寇深矣戰國䇿三國攻秦入函谷秦王謂樓緩曰三國之兵深矣髙誘曰深猶盛也步揚御戎注郤犫父世本曰郤豹生義義生步揚步揚生州州即犫也孫愐曰食采于步後因氏焉亂氣狡憤鄭康成曰憤怒氣充實也曰上天降災使我兩君匪以玉帛相見而以興戎若晉君朝以入則婢子夕以死夕以入則朝以死唯君裁之以上四十二字釋文云四十七字案文當作四十二字孔氏正義從定本刪宋以來又從唐石經采入北宋本五經正義不載經注南宋以後始增入也公子贄韋昭據禮記云贄字子顯盧植曰古者名字相配顯當為韅無始禍髙誘曰始首也其卜二圉也注二代也棟謂二副也坊記曰孝以事君弟以事長示民不二也故君子有君不謀仕惟卜之日稱二君鄭氏曰卜之日謂君有故而為之卜也唯卜之時辭得曰君之二謀爾又引此傳以證之周禮有卜立君之文外傳云其改置以代圉故杜訓二為代兩傳異文似不必牽合晉於是乎作爰田注分公田之稅應入公者爰之於所賞之衆服虔曰爰易也賞衆以田易其疆畔棟謂爰田者猶哀公之用田賦也下文作州兵者猶成公之作邱甲也外傳爰作轅賈逵曰轅車也以田出車賦説文曰爰籀文以為車轅字春秋左傳多古字古言故以爰為轅服訓爰為易易田之法本是周制何云作也漢書地理志曰秦孝公用商君制轅田豈亦賞衆以田邪外傳所云賞衆是一時之事爰田州兵是當日田制兵制改易之始故特書之其後文公作執秩而官制又變晉之所以強者未必不由乎此然其後六卿分晉而晉先亡君子于是知舊章之不可易也敗于宗丘案曲禮注邱與區同音故與上姬旗為協顔師古曰今江淮田野之人猶謂區為邱亦古之遺音也蛾析釋文曰本或作蟻婁夀曰古蛾與蟻通漢書白蛾羣飛扶服蛾伏陳球後碑蜂聚蛾動仲秋下旬碑蛾附皆與蟻同析釋文作晳與石經異十六年經是月也六鷁退飛過宋都釋文曰鷁本或作鶂案説文引春秋傳亦作鶂或從二傳之文左氏當不爾也公子季友卒注稱字者貴之杜以為季字友名劉炫以季為氏云季友仲遂皆生賜族非字也傳吉凶由人漢書由作繇是也由訓為生古文甹字吉凶生乎人故云由人十七年傳齊侯好內服虔曰內婦言也因內寵以殺羣吏服虔曰內寵如夫人者六人羣吏諸大夫也十八年傳無以鑄兵棟案楚金利鄭刀良故云無以鑄兵禹貢荆揚二州貢金三品鄭康成曰銅三色考工記云鄭之刀遷乎其地弗能為良是也高誘曰鑄讀作祝鑄祝屬注古皆同音辨見詩古義史記秦本紀云始皇二十六年收天下兵聚之咸陽銷以為鍾鐻金人十二重各千石應劭曰古者以銅為兵杜氏之注本此十九年傳次雎之社張華博物志曰琅邪臨沂縣東界次雎有大叢社民謂之食人社即次雎之社退修教而復之注復往攻之今唐石經及宋本皆云復伐之陸氏以伐為衍字草一年經盟于鹿上注宋地案司馬彪郡國志曰濟陰乘氏縣有鹿城鄉酈元曰春秋之鹿上也春秋左傳補注卷一
